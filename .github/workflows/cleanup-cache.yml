name: cleanup-cache

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch:      # Enable manual triggering

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete caches older than today
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          while true; do
            # Retrieve oldest cache IDs created before today in UTC (up to 1000 at a time)
            ids=$(gh cache list --limit 1000 --sort created_at --order asc --json id,createdAt --jq '.[] | select(.createdAt < (now | strftime("%Y-%m-%dT00:00:00Z"))) | .id')
            if [ -z "$ids" ]; then
              echo "No more caches older than today found."
              break
            fi
            
            count=$(echo "$ids" | wc -l | tr -d ' ')
            echo "Deleting $count old caches in parallel..."
            echo "$ids" | xargs -P 16 -n 1 gh cache delete
            
            # Give a small pause to avoid rate limiting
            sleep 1
          done
