# WP-003: CI runs the exact same devbox scripts as local dev — if it isn't
# runnable via devbox, it doesn't exist (CLAUDE.md / plan.md §3.5).
name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Cache Devbox
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/devbox
            .devbox
          key: devbox-${{ runner.os }}-${{ hashFiles('devbox.json', 'devbox.lock') }}
          restore-keys: |
            devbox-${{ runner.os }}-

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: "true"
          skip-nix-installation: "true"

      - name: Get package manager cache paths
        id: cache-paths
        run: |
          echo "pnpm_store=$(devbox run -- pnpm store path --silent)" >> $GITHUB_OUTPUT
          echo "uv_cache=$(devbox run -- uv cache dir)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.cache-paths.outputs.pnpm_store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache uv cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.cache-paths.outputs.uv_cache }}
          key: ${{ runner.os }}-uv-${{ hashFiles('packages/sdk-py/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Bootstrap (pnpm install + uv sync)
        run: devbox run bootstrap

      - name: Lint (eslint + ruff check/format)
        run: devbox run lint

      - name: Typecheck (tsc + pyright)
        run: devbox run typecheck

      - name: Test (vitest + pytest)
        run: devbox run test

      - name: Smoke (hello-world Temporal workflow)
        run: devbox run smoke
