# WP-003: CI runs the exact same devbox scripts as local dev — if it isn't
# runnable via devbox, it doesn't exist (CLAUDE.md / plan.md §3.5).
name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: "false"
          skip-nix-installation: "true"

      - name: Bootstrap (pnpm install + uv sync)
        run: devbox run bootstrap

      - name: Lint (eslint + ruff check/format)
        run: devbox run lint

      - name: Typecheck (tsc + pyright)
        run: devbox run typecheck

      - name: Test (vitest + pytest)
        run: devbox run test

      - name: Smoke (hello-world Temporal workflow)
        run: devbox run smoke
