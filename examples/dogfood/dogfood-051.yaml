    description: >
      The live agent loop feeds REAL per-step token usage into the pure
      `decideContextWindowPacing` decision and journals a durable, replay-safe `pacing`
      entry each step (idempotent under replay, payload carries action + projected/
      remaining tokens + utilization), and `chikory trace` surfaces a `pacing events N`
      count, additive on the no-pacing path. The agent-loop wire calls the REAL decision
      and the `recordPacingEvent` activity (both grep-pinned in source, dogfood-047
      F-49), the journal-write idempotency + renderer assertions pass, and the SDK stays
      type- and lint-clean.
    check: cd packages/sdk-ts && grep -Eq 'pacing events 1' test/cli/trace.test.ts && grep -Eq 'toHaveLength\(1\)' test/runner/pacing-journal.test.ts && grep -Eq 'recordPacingEvent' src/workflow/agent-loop.ts && grep -Eq 'decideContextWindowPacing' src/workflow/agent-loop.ts && grep -Eq 'recordPacingEvent' src/runner/activities.ts && grep -Eq '"pacing"' src/runner/activities.ts && pnpm exec vitest run test/cli/trace.test.ts test/runner/pacing-journal.test.ts && pnpm exec tsc --noEmit && pnpm exec eslint .
