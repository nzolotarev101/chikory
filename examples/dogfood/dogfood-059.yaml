name: dogfood-059-wp215-dependency-scan
goal: >
  Land the pure new-dependency scan primitive for the Agent-as-a-Judge security/architecture rubric
  (WP-215): a self-contained function that inspects a unified diff and returns the external package names
  the diff NEWLY imports — the dependency analog of the already-landed secret scan (`scanDiffForSecrets`),
  the evidence a judge uses to flag "this change pulls in a new dependency". This is an ADDITIVE pure slice —
  do NOT change `scanDiffForSecrets`, `scanDiffForRealSecrets`, `collectEvidence`, the judge
  prompt/harness/rubric, `buildVerdict`, `types.ts`, the journal payloads, or any verdict/evidence logic; the
  live judge-evidence wire that consumes this scanner is a SEPARATE follow-up (WP-215 S5), NOT part of this
  run.

  Change exactly these THREE files (one new source module, the judge barrel, one new test file); change no
  other file, add no new dependency, and make no I/O, network, clock, or randomness call (the scanner is
  PURE — it reads only its `diff` argument).

  1. packages/sdk-ts/src/judge/scan-dependencies.ts  (NEW)
     - Export one pure function with a doc comment citing WP-215:
         export function scanDiffForNewDependencies(diff: string): string[]
     - Consider ONLY added unified-diff lines: a line that starts with "+" but NOT "+++" (the exact
       `getAddedDiffLines` discipline `scan-secrets.ts` uses — added lines only, file headers excluded).
     - From each added line, extract every module specifier introduced by an import or require:
         * an ES import/re-export with a source: the specifier captured by `/\bfrom\s*["']([^"']+)["']/`
           (covers `import x from "pkg"`, `import { y } from "pkg"`, `export { z } from "pkg"`);
         * a side-effect import: the specifier captured by `/\bimport\s*["']([^"']+)["']/`
           (covers `import "pkg"`);
         * a CommonJS require: the specifier captured by `/\brequire\(\s*["']([^"']+)["']\s*\)/`
           (covers `const a = require("pkg")`).
       (A single line may match more than one pattern; collect every captured specifier.)
     - Classify + normalize each captured specifier to a bare PACKAGE NAME, IGNORING non-external ones:
         * IGNORE a specifier that starts with "." (relative: "./x", "../x"), "/" (absolute), or the
           "node:" prefix (Node builtins) — these are NOT external dependencies;
         * otherwise normalize to the package name: a SCOPED specifier (starts with "@") keeps its first
           TWO "/"-separated segments (`@scope/pkg/sub` -> `@scope/pkg`); an UNSCOPED specifier keeps its
           first segment only (`lodash/merge` -> `lodash`, `express` -> `express`).
     - Return the package names SORTED, DE-DUPED, empty-safe (no matches / empty diff -> `[]`). Pure — reads
       only its `diff` arg. Named export only, no default, strict TS / ESM.

  2. packages/sdk-ts/src/judge/index.ts
     - Add a re-export block for the new module, mirroring the existing blocks
       (e.g. `export { scanDiffForNewDependencies } from "./scan-dependencies.js";`). ESM `.js` specifier.
       Change nothing else in the barrel.

  3. packages/sdk-ts/test/judge/scan-dependencies.test.ts  (NEW)
     - A new Vitest file importing `scanDiffForNewDependencies` from `../../src/judge/scan-dependencies.js`.
       It must encode AT LEAST these cases (build each `diff` as a string of newline-joined unified-diff
       lines; use a leading "+" for added lines and "-"/" " for context where a case needs them):
       - an external default import is reported: an added `+import express from "express";` line yields
         `["express"]`.
       - a relative import is IGNORED: an added `+import { x } from "./local";` line yields `[]`.
       - a `node:` builtin is IGNORED: an added `+import { readFile } from "node:fs";` line yields `[]`.
       - a SCOPED package subpath is normalized to its first two segments: an added
         `+import { z } from "@scope/pkg/sub";` line yields `["@scope/pkg"]`.
       - an UNSCOPED subpath is normalized to its first segment: an added `+import merge from "lodash/merge";`
         line yields `["lodash"]`.
       - a CommonJS require is reported: an added `+const a = require("axios");` line yields `["axios"]`.
       - a side-effect import is reported: an added `+import "zod";` line yields `["zod"]`.
       - only ADDED lines count: a diff whose `+++ b/file.ts` header names a package-like path AND that
         contains a REMOVED `-import old from "removed-pkg";` line, plus one added
         `+import good from "good-pkg";` line, yields `["good-pkg"]` (the `+++` header and the `-` line are
         both excluded).
       - the result is SORTED and DE-DUPED: a diff adding `+import a from "zebra";`, `+import b from "alpha";`,
         and a second `+import c from "alpha/x";` yields `["alpha", "zebra"]`.
       - an empty diff yields `[]`.
       Do not weaken or loosen any assertion.

  Follow AGENTS.md and the sdk-ts conventions: strict TypeScript, ESM, named exports only, no default
  export, no new dependency. Run all Devbox verification commands sequentially. If a verification step
  reports a failing test or type error, READ the failure, fix the code, and continue — do NOT weaken,
  rephrase, or remove any mandated assertion (a grep enforces them), do NOT change `scanDiffForSecrets`/
  `scanDiffForRealSecrets`/`collectEvidence` or any verdict/evidence/journal logic, and do NOT touch
  `types.ts`.
