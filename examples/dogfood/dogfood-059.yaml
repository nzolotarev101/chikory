    writable: true
acceptance_criteria:
  - id: AC-1
    description: >
      the pure new-dependency scan primitive lands and is re-exported from the judge barrel —
      `scan-dependencies.ts` exports `scanDiffForNewDependencies`, `src/judge/index.ts` re-exports the new
      module, and the new focused test proves external-import detection, the relative / absolute / `node:`
      exclusions, scoped + unscoped subpath normalization, the require + side-effect import forms, the
      added-lines-only (`+`/`+++`) discipline, and the sorted/de-duped/empty-safe output
    check: >
      cd packages/sdk-ts &&
      grep -q "scanDiffForNewDependencies" src/judge/scan-dependencies.ts &&
      grep -q "scan-dependencies.js" src/judge/index.ts &&
      pnpm exec vitest run test/judge/scan-dependencies.test.ts
  - id: AC-2
    description: >
      the SDK stays type- and lint-clean and the full existing suite remains green — proving the dependency
      scanner is additive and the secret-scan / evidence / verdict logic is unchanged
    check: cd packages/sdk-ts && pnpm exec tsc --noEmit && pnpm exec eslint . && pnpm exec vitest run
