      cd packages/sdk-ts &&
      grep -q "scanDiffForSecrets" src/judge/evidence.ts &&
      grep -q "secretScanLabels" src/judge/evidence.ts &&
      grep -q "secretScanLabels" src/judge/prompt.ts &&
      grep -q "secretScanLabels" src/judge/harness.ts &&
      grep -q "deterministic secret scan" src/judge/prompt.ts &&
      pnpm exec vitest run test/judge/secret-scan-evidence.test.ts
