name: dogfood-055-wp215-s2-judge-secret-evidence
goal: >
  Wire the existing WP-215 secret scanner `scanDiffForSecrets` (already on HEAD at
  `packages/sdk-ts/src/judge/scan-secrets.ts`) INTO the real-time judge's evidence
  collection, so every judge pass mechanically extracts the secret-kind labels from
  the workspace diff it already collects and surfaces them to the judge. This is an
  ADDITIVE evidence wire â€” do NOT add or change any rubric item, verdict, override,
  or destructive-rollback logic; the LLM still decides `no_secrets_introduced`.

  Change exactly these THREE existing files plus ONE new test file; change no other
  file (do not edit `rubric.ts`, the verdict/override logic, `index.ts` barrels
  beyond what a new export trivially needs, `types.ts`, configs, or unrelated code),
  add no new dependency, and make no new I/O, network, clock, or randomness call.

  1. packages/sdk-ts/src/judge/evidence.ts
     - Import `scanDiffForSecrets` from `./scan-secrets.js` (ESM `.js` relative import).
     - Add a NEW REQUIRED field to the `CollectedEvidence` interface:
         secretScanLabels: string[];
       with a short doc comment citing WP-215 (deterministic secret-kind labels the
       judge sees alongside the diff).
     - In `collectEvidence`, populate it by calling `scanDiffForSecrets` over the FULL
       collected diff string (the same `diff` already read via `git diff`, BEFORE the
       `bound(...)` excerpt truncation, so a secret beyond the prompt cap is still
       detected) and assign the result to `secretScanLabels` in the returned object.

  2. packages/sdk-ts/src/judge/prompt.ts
     - Add a NEW REQUIRED field `secretScanLabels: string[]` to the `JudgePromptInput`
       interface.
     - In `buildJudgeMessages`, render a NEW evidence section in the user message,
       placed immediately AFTER the "## EVIDENCE â€” workspace diff since last verdict"
       block and before the "## EVIDENCE â€” CHECK RESULTS" block, with this EXACT header
       line:
         ## EVIDENCE â€” deterministic secret scan (added diff lines)
       followed by, when `secretScanLabels` is non-empty, the labels rendered one per
       line as `- <label>`; and when it is empty, the literal line `(none)`.

  3. packages/sdk-ts/src/judge/harness.ts
     - In the existing `buildJudgeMessages({ ... })` call, pass the new field through:
         secretScanLabels: collected.secretScanLabels
       (no other change to the harness).

  4. packages/sdk-ts/test/judge/secret-scan-evidence.test.ts â€” a NEW Vitest file
     importing `buildJudgeMessages` from `../../src/judge/prompt.js`. It must encode AT
     LEAST these cases (build any secret-like strings by CONCATENATION so no contiguous
     secret literal appears in this file's added diff lines â€” see the header):
       - given a `JudgePromptInput` with `secretScanLabels: ["aws-access-key", "openai-key"]`,
         the rendered user message (the `role: "user"` content) CONTAINS the exact header
         `## EVIDENCE â€” deterministic secret scan (added diff lines)` AND both
         `- aws-access-key` and `- openai-key` lines.
       - given the same input with `secretScanLabels: []`, the rendered user message
         contains the header followed by the literal `(none)` (and neither label line).
     Construct the rest of the `JudgePromptInput` minimally (empty `goal`, an `evidence`
     object with empty `criteria`/`stepSummaries`/`criteriaHistory` as the existing
     types require, empty `rubric`, empty `diffText`, empty `checkRuns`) â€” reproduce the
     shapes the current interfaces demand; do not weaken or loosen any assertion.

  Follow AGENTS.md and the sdk-ts conventions: strict TypeScript, ESM, named exports
  only, no default export, no new dependency. Because `CollectedEvidence` and
  `JudgePromptInput` gain a REQUIRED field, `tsc` will flag every construction/call
  site until it is threaded â€” update `collectEvidence` (the only `CollectedEvidence`
  constructor) and the `harness.ts` `buildJudgeMessages` call accordingly. Run all
  Devbox verification commands sequentially. If a verification step reports a failing
  test or type error, READ the failure, fix the wiring, and continue â€” do NOT weaken,
  rephrase, or remove any mandated assertion (a grep enforces them).
