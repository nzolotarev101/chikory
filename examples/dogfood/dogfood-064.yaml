#     port — extends the existing pacing module + barrel + the existing suite.
#   * §1.2 Product-progress: ✅ — the landed diff is REAL open plan.md §6 WP-254 (🟡) product code on
#     the context-rot / pacing named thesis pillar. It directly attacks F-56, the most-reinforced
