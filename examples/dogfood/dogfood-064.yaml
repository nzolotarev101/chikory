# Dogfood-064: WP-254 pacing-numerator fix — the pure LIVE-occupancy estimator half.
# Launch with `chikory run` (single durable run). NO seam env.
#
# WHY THIS IS NEXT (2026-06-29): dogfood-063 landed the WP-210 PAIRWISE pure primitive
# (`aggregatePairwise`), the documented sibling of the G-Eval half (dogfood-058) — so BOTH pure
# primitives of "Pairwise + G-Eval scoring modes" now exist and the pure scoring-modes surface is
