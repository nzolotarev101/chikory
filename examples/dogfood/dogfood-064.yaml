# `pacing.ts:29`) is correct given its inputs, and the DENOMINATOR clause is already done
# (`resolveContextWindowForSpec` → `lookupContextWindow` keys `gpt-5.5`→400k, `context-window.ts`).
# The OPEN defect is the NUMERATOR: `agent-loop.ts:350-352` feeds `currentInputTokens: spentTokens`
# (the run's CUMULATIVE token total across all steps) AND `estimatedNextStepTokens: recordTokens`
# (the same just-finished step) → `projectedTokens = spentTokens + estimatedNextStepTokens ≈ 2× the
# step`, and `spentTokens` itself is a codex SUBPROCESS's cumulative cross-internal-turn throughput,
# not what is RESIDENT in our orchestration window going into the next step. The fix must measure the
# step's LIVE resident orchestration-context occupancy (the fixed system/instruction preamble + only
# the recent-step summaries STILL retained in the verbatim window after folding), not cumulative
# throughput.
#
# This run lands the PURE half (the pure-first shape every recent slice landed in): a
# `ResidentContextParts` input type and a pure `estimateResidentContextTokens(parts)` that sums the
# system preamble + the retained tail of `recentSummaries`, excluding folded-out summaries — the value
# the agent-loop SHOULD feed as `currentInputTokens`. The non-pure agent-loop wire that swaps
# `agent-loop.ts:350` from `spentTokens` to `estimateResidentContextTokens(...)` is the SEPARATE §4
# follow-up (a frozen-runtime edit, operator-landed) — exactly as `aggregateGEval`/`aggregatePairwise`
# preceded their harness wires and `recallPointerExcerpt` preceded its agent-loop wire.
#
# This is a CROSS-FILE pure slice on real WP-254 product code, NOT a deterministic 1-file port — a
# legitimate failable headline: the "last-N retained, not first-N" tail slice (folding drops the
# OLDEST summaries), the `retainedSummaryCount` clamp to `[0, length]`, the exclusion of folded-out
# entries from the sum, the empty path, the negative-input clamp, and not mutating the input are all
# real ways to get the live-occupancy math subtly wrong.
#
# Gate verdicts (applied inline, dogfood-review §5, on this candidate):
#   * §1.1 Failure-surface: ✅ — cross-file (`src/runner/pacing.ts` extend + `src/index.ts` barrel +
#     `test/runner/pacing.test.ts`), 1–3 steps plausible; real numeric failure surface (retained-tail
