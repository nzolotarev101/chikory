name: dogfood-064-wp254-resident-occupancy
goal: >
  Land the pure LIVE-RESIDENT-OCCUPANCY estimator half of WP-254 (the context-rot / pacing pillar).
  The pacing decision is already pure and correct (`decideContextWindowPacing` in
  `src/runner/pacing.ts`) and the denominator is already model-keyed (`resolveContextWindowForSpec`);
  the OPEN defect is the NUMERATOR — the agent-loop feeds the pacing decision the run's CUMULATIVE
  token total as `currentInputTokens`, over-reading window occupancy ~2× and falsely PARKING/compacting
  on trivial tasks (F-56). This adds the pure value the agent-loop SHOULD feed instead: the live
  resident orchestration-context size (the fixed preamble + only the recent-step summaries still
  retained in the verbatim window after folding). Change exactly these THREE files; change no other
  file, add no new dependency, and do NOT touch `types.ts` or any contract. Do NOT modify
  `decideContextWindowPacing` or the existing `ContextWindowUsage`/`ContextWindowPacingDecision`/
  `ContextWindowPacingPolicy` exports.

  1. packages/sdk-ts/src/runner/pacing.ts  (extend — do not alter the existing pacing exports)
     - Add an exported input type (LOCAL to this module — do NOT add it to `types.ts`):
         /** WP-254: the parts of the LIVE resident orchestration-context window going into the next
          * step. `systemTokens` is the fixed system/instruction preamble carried into every step;
          * `recentSummaryTokens` is the per-summary token count of the retained recent-step summaries,
          * MOST-RECENT LAST (the agent-loop's `recentSummaries`); `retainedSummaryCount` is how many of
          * the most-recent summaries actually stay in the verbatim window after folding. */
         export interface ResidentContextParts {
           systemTokens: number;
           recentSummaryTokens: number[];
           retainedSummaryCount: number;
         }
     - Add the pure estimator with the same short JSDoc shape the existing pacing helper carries:
         export function estimateResidentContextTokens(parts: ResidentContextParts): number
       Semantics (exact):
         * Resident occupancy = `systemTokens` + the sum of the LAST `retainedSummaryCount` entries of
           `recentSummaryTokens` (the TAIL — folding drops the OLDEST summaries first, so only the
           most-recent `retainedSummaryCount` remain verbatim; the older ones are folded out and do NOT
           count). It measures LIVE occupancy, NOT cumulative cross-step/cross-turn throughput.
         * Clamp `retainedSummaryCount` into `[0, recentSummaryTokens.length]` before slicing: a
           negative count retains 0 summaries; a count larger than the array length retains all of them.
         * Clamp the final result to be at least 0 (never return a negative occupancy even if a caller
           passes a negative `systemTokens`).
         * Empty / degenerate: `recentSummaryTokens` empty (or `retainedSummaryCount` ≤ 0) →
           `Math.max(0, systemTokens)`.
         * Pure: do NOT mutate `parts` or `recentSummaryTokens`; read only.

  2. packages/sdk-ts/src/index.ts  (extend the existing pacing re-export only)
     - The barrel already re-exports `decideContextWindowPacing, type ContextWindowPacingDecision,
       type ContextWindowPacingPolicy, type ContextWindowUsage` from `./runner/pacing.js`. Add
       `estimateResidentContextTokens` and `type ResidentContextParts` to that SAME export statement.
       Change nothing else in the barrel.

  3. packages/sdk-ts/test/runner/pacing.test.ts  (extend — do not weaken existing cases)
     - Add focused cases proving: (a) the retained TAIL is summed with the preamble — e.g.
       `systemTokens: 100`, `recentSummaryTokens: [10, 20, 30, 40]`, `retainedSummaryCount: 2` →
       `100 + 30 + 40 = 170` (the last two, NOT the first two); (b) `retainedSummaryCount` larger than
       the array retains ALL summaries (sum of every entry + preamble); (c) `retainedSummaryCount: 0`
       (and a negative count) returns just `systemTokens`; (d) empty `recentSummaryTokens` returns
       `systemTokens`; (e) a negative `systemTokens` clamps the result to 0; (f) the input array (and
       the `parts` object) is NOT mutated (snapshot `recentSummaryTokens`, call the estimator, assert
       `toEqual` the snapshot). Follow the existing `pacing.test.ts` structure; do not remove or weaken
       any existing `decideContextWindowPacing` assertion.

  Follow AGENTS.md and the sdk-ts conventions: strict TypeScript, ESM, named exports only, no default
  export, no new dependency, no `types.ts`/contract change. Run all Devbox verification commands
  sequentially. If a verification step reports a failing test or type error, READ the failure, fix the
  code, and continue — do NOT weaken, rephrase, or remove any mandated assertion (a grep enforces the
  symbols), and do NOT change the existing `decideContextWindowPacing` export or its types.
