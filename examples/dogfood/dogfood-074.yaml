name: dogfood-074-wp264-judge-check-tree-reap
goal: >
  Make the judge-check runner wall-clock-safe — WP-264, the dogfood-073 F-78 fix. Today `runCheck` in
  `packages/sdk-ts/src/judge/evidence.ts` executes each acceptance `check` with
  `execFileAsync("/bin/sh", ["-c", criterion.check!], { cwd, timeout, maxBuffer, env })`; Node's `timeout`
  kills ONLY the direct `/bin/sh` child, so a check whose grandchildren hold the stdout/stderr pipes (e.g.
  vitest tinypool workers) runs FAR past the cap — dogfood-072's AC-2 logged `[check timed out after
  120000ms]` yet ran 695,853 ms (5.8× the 120 s cap), and the infra hang read as a substantive red AC. Port
  the already-landed WP-255(a) process-group kill to this call-site: replace the `execFileAsync` invocation
  inside `runCheck` with `runBounded` from `../executors/process.js`, which spawns `detached: true` and
  signals the WHOLE group (`process.kill(-pid, "SIGTERM")` then SIGKILL after a grace window). Change exactly
  ONE existing file and ONE new test file. Add no new dependency, and do NOT touch
  `src/executors/process.ts`, `types.ts`, any contract, `DEFAULT_CHECK_TIMEOUT_MS`, the `CheckRun` interface,
  the `git()` helper (its `execFileAsync` STAYS), `collectEvidence`'s signature, or any other existing file.
  Use strict TypeScript, ESM `.js` relative imports, named exports only. Run verification sequentially with
  bare `pnpm exec`. If a verification step reports a failing test or type error, READ the failure and fix the
  IMPLEMENTATION so every mandated assertion passes — do NOT weaken, rephrase, or remove any mandated
  assertion.

  FILE 1 — packages/sdk-ts/src/judge/evidence.ts (EDIT — the `runCheck` function ONLY). Add the import (top
  of file, next to the other relative imports):

    import { runBounded } from "../executors/process.js";

  Rewrite `runCheck`'s body to call:

    const bounded = await runBounded("/bin/sh", ["-c", criterion.check!], {
      cwd: workspaceDir,
      env: scrubExecutorEnv(process.env, []),
      maxSeconds: timeoutMs / 1000,
    });

  and derive the returned `CheckRun` fields from `bounded`:
    * `exitCode` — `bounded.exitCode ?? 1` normally, but ALWAYS nonzero when `bounded.timedOut` is true
      (a timed-out check must NEVER read as a pass: `const exitCode = bounded.timedOut ? 1 :
      (bounded.exitCode ?? 1);` — killed-by-signal `null` also maps to 1).
    * `output` — `bounded.stdout + bounded.stderr`, appending the EXACT existing marker
      `` `\n[check timed out after ${timeoutMs}ms]` `` when `bounded.timedOut` is true, then passed through
      the EXISTING `bound(output, 64 * 1024)` truncation exactly as today.
    * `durationMs` — `bounded.durationMs`.
    * `criterionId` and `command` — unchanged.
  The try/catch around the old `execFileAsync` may be removed (runBounded resolves with an exit code instead
  of throwing on nonzero/kill); keep the JSDoc line on `runCheck` and extend it with one sentence citing
  WP-264 / dogfood-073 F-78 (the group-kill port from WP-255(a)). Do NOT change `DEFAULT_CHECK_TIMEOUT_MS`,
  the `CheckRun` shape, `bound`, `scrubExecutorEnv` usage, the `git()` helper, or anything outside `runCheck`
  + the one import line.

  FILE 2 — packages/sdk-ts/test/judge/check-timeout-reap.test.ts (NEW Vitest file). Mirror the workspace
  harness of `test/judge/new-dependency-scan-evidence.test.ts` (mkdtemp + `git init` + config user + one base
  commit; `rm -rf` cleanup in `afterEach`) and drive the PUBLIC `collectEvidence` from
  `"../../src/judge/evidence.js"` with `createMemoryArtifactStore()` from `"../../src/artifacts/index.js"`.
  Two `it` cases:
    * "a check whose grandchild holds the pipe is reaped at the cap, not at the grandchild's leisure" — call
      `collectEvidence` with `criteria: [{ id: "AC-HANG", description: "hang-grandchild",
      check: "sleep 60 & sleep 60" }]` and `checkTimeoutMs: 1000` (the backgrounded `sleep 60 &` inherits
      the stdout pipe — pre-fix, `runCheck` settles only when it exits, ~60 s). Assert on
      `collected.checkRuns[0]`: `exitCode` not `0`; `output` `.toContain("[check timed out after 1000ms]")`;
      and `durationMs` `.toBeLessThan(10_000)` (the reap bound — generous vs the 60 s pre-fix hang, tight
      enough to prove the group kill). Give this test a vitest timeout of 30_000 ms so a regression FAILS
      fast instead of hanging the suite.
    * "a fast green check still passes through unchanged" — `criteria: [{ id: "AC-OK", description: "ok",
      check: "echo reap-ok" }]` (default timeout). Assert `exitCode` is `0`, `output` `.toContain("reap-ok")`,
      and `output` does NOT contain `"check timed out"`.
  Compose through `collectEvidence` (the real call-site path) — do NOT re-export or reach into the private
  `runCheck`.

  Keep everything else byte-identical. The infra-vs-substantive check-failure marking (the WP-263 residual)
  is a SEPARATE follow-up; do not add it here.
repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true
acceptance_criteria:
  - id: AC-1
    description: >
      `runCheck` now runs checks through the group-killing `runBounded` (ms→seconds conversion, timedOut ⇒
      nonzero exit, exact timeout marker preserved), the old direct-`/bin/sh` `execFileAsync` call is gone,
      and the new behavioral test proves via the public `collectEvidence` that a pipe-holding grandchild is
      reaped near the 1 s cap instead of running ~60 s
    check: >
      cd packages/sdk-ts &&
      grep -q 'from "../executors/process.js"' src/judge/evidence.ts &&
      grep -q "runBounded(" src/judge/evidence.ts &&
      grep -q "maxSeconds: timeoutMs / 1000" src/judge/evidence.ts &&
      grep -q "check timed out after" src/judge/evidence.ts &&
      ! grep -q 'execFileAsync("/bin/sh"' src/judge/evidence.ts &&
      grep -q "collectEvidence(" test/judge/check-timeout-reap.test.ts &&
      grep -q "sleep 60 & sleep 60" test/judge/check-timeout-reap.test.ts &&
      grep -q "check timed out after 1000ms" test/judge/check-timeout-reap.test.ts &&
      grep -q "toBeLessThan(10_000)" test/judge/check-timeout-reap.test.ts &&
      grep -q "reap-ok" test/judge/check-timeout-reap.test.ts &&
      pnpm exec vitest run test/judge/check-timeout-reap.test.ts
  - id: AC-2
    description: >
      the SDK stays type- and lint-clean and the full existing suite remains green — proving the port is
      behavior-preserving for every green check (exit codes, output, marker, truncation) and nothing outside
      `runCheck` + the import changed
    check: cd packages/sdk-ts && pnpm exec tsc --noEmit && pnpm exec eslint . && pnpm exec vitest run
