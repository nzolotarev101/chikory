name: dogfood-099-wp308-limit-response-execution
goal: >
  Complete WP-308 in the Chikory TypeScript SDK: EXECUTE the work-conserving limit response instead of only
  journaling it. dogfood-098 landed `decideLimitResponse` (the ordered plan: declared failover → limit-independent
  work → park last) and the `CHIKORY_LIMIT_AT_STEP` seam, but the seam path in the run activity currently fabricates
  a completed step (`claimsComplete: true`, zero tool calls, empty diff) without acting on the plan (F-136). Land a
  net-new `applyLimitResponse` that takes the chosen decision and ACTS: deliver in SIX ordered increments, ONE per
  durable step, each adding DISTINCT non-trivial working code + tests (non-hollow horizon, F-100/WP-270):

    * PART 1 — HONEST STEP RECORD: the seam path stops fabricating completion. An injected limit no longer yields
      `claimsComplete: true` with zero work — the throttled step's plan item is DEFERRED (the loop will still do it),
      never silently skipped. The `limit_signal` journal row stays (additive fields allowed, no reshape). Tested:
      an injected limit at step N does not mark step N's plan item complete.

    * PART 2 — FAILOVER EXECUTION: net-new `applyLimitResponse` — when the chosen decision is `declared-failover`,
      the run activity RE-DISPATCHES the throttled stage against the failover target's endpoint (reusing the
      existing per-stage routing/failover machinery; invariant #2 already guaranteed by the plan) and the step
      produces a REAL record (real adapter call, real diff/transcript refs). Tested with the scripted adapter
      registry: an injected limit with a legal failover target yields a step that actually ran.

    * PART 3 — LIMIT-INDEPENDENT WORK EXECUTION: when the chosen decision is `limit-independent-work`, the loop
      actually performs conserving work it can do without the throttled endpoint (the decision's target names it —
      e.g. a judge pass on the other family, a compaction fold, a checkpoint) BEFORE the throttled item resumes.
      Tested: the conserving action observably happened (journal entry) and the throttled plan item was deferred,
      not dropped.

    * PART 4 — DURABLE PARK: when the chosen decision is `park-until-reset`, the park honors the classified
      signal's `retryAfterMs`/`retryAtMs` via the EXISTING durable delay machinery (soak/park path — a workflow-side
      durable timer, never an activity sleep), journaled replay-safe. Tested deterministically (no real waiting in
      unit tests; F-115 — no wall-clock asserts).

    * PART 5 — MEASURED TOTALS: `limitSleptMs` / `limitSleepConservedMs` derive from what actually happened
      (executed failover / conserving work / actual park) rather than plan bookkeeping; `chikory trace` renders as
      today; a no-signal run renders byte-identically. Tested both ways.

    * PART 6 — END-TO-END LIVE PROOF + DOCS + REGRESSION: ONE live in-memory/Temporal proof that a forced
      `CHIKORY_LIMIT_AT_STEP` run seals SUCCESS with `conserved > 0` in totals AND every plan item genuinely done
      (no fabricated claims); update `docs/components/router.md` (the one sanctioned doc edit); prove the ENTIRE
      `packages/sdk-ts` suite (tsc + eslint + vitest) green.

  CONSTRAINTS: additive — NO frozen-contract shape change; a run that never receives a limit signal behaves and
  renders EXACTLY as before; existing `limit_signal` journals stay readable. NO new dependency. Injection stays the
  deterministic `CHIKORY_LIMIT_AT_STEP` seam only (off by default). NO key material or secret-shaped fields. A
  failover swap MUST preserve invariant #2 (judge family ≠ executor family). Writes ONLY inside `packages/sdk-ts/`
  plus the single PART-6 `docs/components/router.md` edit — nothing else (not plan.md). Each PART lands its own
  tests and does NOT break an earlier PART's tests; do NOT front-load a later PART (the judge compares the diff
  footprint against the active PART and WILL roll back). If a verification step reports a failing suite, READ the
  failure and fix the IMPLEMENTATION — never weaken or delete an assertion, and never assert a wall-clock duration
  to prove a structural fact (F-115).

repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true

bounded_work_unit:
  min_durable_steps: 6
  directive: >
    Advance EXACTLY the ONE numbered PART named by this step's chunk — implement it and its tests, then stop and let
    the durable checkpoint seal. Do NOT front-load a later PART. Do NOT declare the whole run complete until every
    PART has landed with passing tests.
  work_chunks:
    - name: part-1-honest-step-record
      directive: "PART 1 ONLY: the CHIKORY_LIMIT_AT_STEP seam path stops fabricating completion — no claimsComplete:true with zero work; the throttled plan item is deferred, never skipped; limit_signal row preserved (additive only). Tests."
    - name: part-2-failover-execution
      directive: "PART 2 ONLY: net-new applyLimitResponse executes a declared-failover decision — re-dispatch the throttled stage against the failover target via existing routing machinery; real adapter call, real record. Tests on the scripted registry."
    - name: part-3-limit-independent-execution
      directive: "PART 3 ONLY: a limit-independent-work decision performs real conserving work (per the decision's target) before the throttled item resumes; deferred, not dropped. Tests via journal evidence."
    - name: part-4-durable-park
      directive: "PART 4 ONLY: a park-until-reset decision honors retryAfterMs/retryAtMs via the existing durable delay machinery (workflow-side timer, never an activity sleep), replay-safe. Deterministic tests, no wall-clock asserts."
    - name: part-5-measured-totals
      directive: "PART 5 ONLY: limitSleptMs/limitSleepConservedMs derive from executed actions, not plan bookkeeping; no-signal runs render byte-identically. Tests both ways."
    - name: part-6-liveproof-docs-regression
      directive: "PART 6 ONLY: one live proof — a forced CHIKORY_LIMIT_AT_STEP run seals SUCCESS with conserved > 0 and every plan item genuinely done; update docs/components/router.md; FULL packages/sdk-ts suite (tsc + eslint + vitest) green; fix implementations, never weaken tests."

acceptance_criteria:
  - id: AC-1
    description: >
      The net-new limit-response EXECUTOR function exists in the SDK source. (OUTCOME symbol the goal NAMES —
      `applyLimitResponse` — absent on HEAD so a recursive grep cannot false-green, F-90. F-114-SAFE: a FUNCTION
      symbol, not a type name. Layout is the executor's, F-82/F-83.)
    check: >
      cd packages/sdk-ts &&
      grep -rq 'applyLimitResponse' src/
  - id: AC-2
    description: >
      The executor is CONSUMED, not just defined — `applyLimitResponse` appears at least twice across the source
      (definition + a consumption site in the run loop). (F-119-SAFE: occurrence count via `grep -roh … | wc -l`.)
    check: >
      cd packages/sdk-ts &&
      test "$(grep -roh 'applyLimitResponse' src/ | wc -l)" -ge 2
  - id: AC-3
    description: >
      A test proves the hands against the landed brain — a `test/` file references BOTH the net-new
      `applyLimitResponse` AND dogfood-098's `decideLimitResponse`, so execution is verified against the real
      ordered-plan shape, not a toy. (F-97-SAFE co-reference. Filename is the executor's.)
    check: >
      cd packages/sdk-ts &&
      for f in $(grep -rl 'applyLimitResponse' test/ 2>/dev/null); do
        grep -q 'decideLimitResponse' "$f" && { echo ok; break; };
      done | grep -q ok
  - id: AC-4
    description: >
      The SDK stays type- and lint-clean and the FULL existing suite is green, proving the change is additive and
      nothing regressed (no frozen-contract shape change; limit-signal-free runs behave exactly as before).
    check: cd packages/sdk-ts && pnpm exec tsc --noEmit && pnpm exec eslint . && pnpm exec vitest run

