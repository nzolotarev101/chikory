name: dogfood-063-wp210-pairwise-scoring
goal: >
  Land the pure PAIRWISE scoring-mode aggregation half of WP-210 (the Agent-as-a-Judge scoring-modes
  pillar). The G-Eval half is already landed in the SAME module — `normalizeGEvalScore(raw, scaleMin,
  scaleMax)` and `aggregateGEval(scores, opts)` in `src/judge/scoring.ts`. This adds the comparative
  sibling: aggregate a set of pairwise candidate comparisons into a per-candidate win/loss/tie tally,
  a win-rate, a stable ranking, and a single clear winner (or null when ambiguous). Change exactly
  these THREE files; change no other file, add no new dependency, and do NOT touch `types.ts` or any
  contract.

  1. packages/sdk-ts/src/judge/scoring.ts  (extend — do not alter the existing G-Eval exports)
     - Add an exported input type (LOCAL to this module — do NOT add it to `types.ts`):
         /** WP-210: one pairwise comparison between two judged candidates. `a` and `b` are the two
          * candidate ids; `winner` names which side won, or "tie". */
         export interface PairwiseOutcome {
           a: string;
           b: string;
           winner: "a" | "b" | "tie";
         }
     - Add the exported result types (LOCAL — not in `types.ts`):
         /** WP-210: a single candidate's pairwise record. `winRate` counts a tie as half a win:
          * `(wins + 0.5 * ties) / (wins + losses + ties)`. */
         export interface PairwiseTally {
           id: string;
           wins: number;
           losses: number;
           ties: number;
           winRate: number;
         }
         export interface PairwiseResult {
           tallies: PairwiseTally[];
           winnerId: string | null;
         }
     - Add the pure aggregator with the same short JSDoc shape the G-Eval helpers carry:
         export function aggregatePairwise(outcomes: PairwiseOutcome[]): PairwiseResult
       Semantics (exact):
         * Tally every candidate id that appears as `a` or `b` in any outcome. For each outcome:
           on `winner: "a"` the `a` id gets +1 win and the `b` id +1 loss; on `winner: "b"` the `b`
           id gets +1 win and the `a` id +1 loss; on `winner: "tie"` BOTH ids get +1 tie.
         * `winRate = (wins + 0.5 * ties) / (wins + losses + ties)` for each tally; a candidate that
           appears always has at least one comparison, so the denominator is never 0.
         * `tallies` is sorted by `winRate` DESCENDING, ties broken by `id` ASCENDING (lexicographic
           `<`), so the order is deterministic.
         * `winnerId` is the single top candidate's `id` — but `null` when there is no clear winner:
           either `outcomes` is empty (→ `{ tallies: [], winnerId: null }`) OR the top two tallies
           share the same `winRate` (an ambiguous top → `null`).
         * Pure: do NOT mutate `outcomes` or any element; build fresh arrays/objects.

  2. packages/sdk-ts/src/judge/index.ts  (extend the existing scoring re-export only)
     - The barrel already re-exports `aggregateGEval, normalizeGEvalScore, type GEvalAggregateOptions,
       type GEvalCriterionScore, type GEvalScore` from `./scoring.js`. Add `aggregatePairwise` and
       `type PairwiseOutcome`, `type PairwiseResult`, `type PairwiseTally` to that SAME export
       statement. Change nothing else in the barrel.

  3. packages/sdk-ts/test/judge/scoring.test.ts  (extend — do not weaken existing cases)
     - Add focused cases proving: (a) a clear winner — a candidate that wins all its comparisons sorts
       first with `winRate` 1 and is the `winnerId`; (b) the tie arithmetic — a single `"tie"` outcome
       gives both ids `winRate` 0.5 and `winnerId` `null` (top-tie); (c) a mixed three-candidate set
       ranks by `winRate` descending with the `id`-ascending tiebreak, and `tallies` length equals the
       number of distinct ids; (d) empty input returns `{ tallies: [], winnerId: null }`; (e) the input
       array (and its elements) is NOT mutated (snapshot it, call `aggregatePairwise`, assert
       `toEqual` the snapshot). Follow the existing `scoring.test.ts` structure; do not remove or
       weaken any existing G-Eval assertion.

  Follow AGENTS.md and the sdk-ts conventions: strict TypeScript, ESM, named exports only, no default
  export, no new dependency, no `types.ts`/contract change. Run all Devbox verification commands
  sequentially. If a verification step reports a failing test or type error, READ the failure, fix the
  code, and continue — do NOT weaken, rephrase, or remove any mandated assertion (a grep enforces the
  symbols), and do NOT change the existing `normalizeGEvalScore`/`aggregateGEval` exports.
