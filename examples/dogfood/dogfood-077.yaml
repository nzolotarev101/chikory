name: dogfood-077-wp206-hitl-suspend-resume
goal: >
  Give the OPERATOR first-class HITL suspend/resume for a durable run — the ability to durably PARK a healthy,
  RUNNING run at ZERO compute and later continue it, closing the WP-206 gap. Today a run only ever enters the
  existing `SUSPENDED` state on a budget breach (`src/workflow/agent-loop.ts:215`,`:242`:
  `status = "SUSPENDED"; await condition(() => pendingTopUps.length > 0 || cancelRequested)` — a durable
  zero-compute wait until a top-up signal); there is NO operator-initiated way to pause a healthy run and resume
  it. Close that gap by mirroring the EXISTING durable-signal pattern (the sibling of `cancelSignal`/`injectSignal`/
  `approveSignal`/`topUpSignal`), not by inventing a second mechanism.

  OUTCOME (what "done" means — the HOW is yours to design):
    * A NEW operator command `chikory suspend <run-id>` — its handler `cmdSuspend` in `src/cli/commands.ts`
      (mirroring `cmdCancel`/`cmdInject`: resolve the durable handle, send the suspend request, close the runner)
      and a `case "suspend"` dispatch + help line in `src/cli/main.ts`. Missing run-id → actionable stderr +
      nonzero exit; success → an ack + exit 0.
    * A durable SUSPEND SIGNAL on the workflow — a `SIGNAL_SUSPEND` constant + a `suspendSignal`
      (`defineSignal`) + a `setHandler` in `src/workflow/agent-loop.ts`, mirroring the existing signals. When the
      operator suspends, the run loop parks at `status = "SUSPENDED"` on a Temporal `condition(...)` wait — ZERO
      compute, NOT a poll or `sleep` — until a resume request (or cancel) clears it, then transitions back to
      `RUNNING`. The park-check MUST sit where NO already-journaled step is re-executed on resume, and the
      park/unpark MUST be journaled so the audit trail shows the suspend and the resume.
    * A `RunHandle` method (`src/runner.ts`) that sends the suspend signal — the sibling of `approve`/`inject`/
      `cancel`, a thin signal sender. Wire whatever resume path you choose (extend the existing `chikory resume`,
      or add a resume signal) so a suspended run can be continued to terminal — YOUR design, but it MUST end the
      run at a normal terminal state with the SAME journaled steps.
    * Prove it with a REAL behavioral test that drives a LIVE Temporal-backed run (mirror the WP-123
      crash-recovery test and the WP-212 live inject test — do NOT mock the durable layer): start a run, suspend
      it after at least one journaled step, assert the run reaches `SUSPENDED` and does NOT advance while parked,
      resume it, and assert the run reaches a terminal state having re-executed ZERO journaled steps (no
      duplicate step entries / no duplicate spend). Reference `cmdSuspend` from the test so the outcome is
      greppable.

  CONSTRAINTS: strict TypeScript, ESM `.js` relative imports, named exports only; NO new dependency; do NOT change
  the `StepRecord`/`ExecutorAdapter`/`StepInput` shapes, and do NOT remove or repurpose the existing
  `SUSPENDED`/`RunStatus` values, the existing signals, or the budget-park path — EXTEND them additively. Reuse
  the `defineSignal`/`setHandler`/`condition` pattern and the journal; do not invent a second suspend mechanism or
  a second LLM/durable path. If a verification step reports a failing test or type error, READ the failure and fix
  the IMPLEMENTATION — do NOT weaken or delete any assertion.
repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true
acceptance_criteria:
  - id: AC-1
    description: >
      An operator can durably suspend/resume a run — `cmdSuspend` exists in `src/cli/commands.ts` with a
      `suspend` dispatch in `src/cli/main.ts`, a durable `SIGNAL_SUSPEND`/`suspendSignal` + handler in
      `src/workflow/agent-loop.ts` that parks the loop on a Temporal `condition` at `status = "SUSPENDED"`, a
      `RunHandle` suspend sender in `src/runner.ts`, and a real behavioral test drives the live suspend→resume
      path end-to-end. (OUTCOME anchors the goal NAMES as they appear in code; the test file layout is the
      executor's to choose — F-82/F-83.)
    check: >
      cd packages/sdk-ts &&
      grep -q 'cmdSuspend' src/cli/commands.ts &&
      grep -q 'suspend' src/cli/main.ts &&
      grep -Eq 'SIGNAL_SUSPEND|suspendSignal' src/workflow/agent-loop.ts &&
      grep -q 'condition' src/workflow/agent-loop.ts &&
      grep -q 'suspend' src/runner.ts &&
      grep -rq 'cmdSuspend' test/
  - id: AC-2
    description: >
      the SDK stays type- and lint-clean and the FULL existing suite — including the new live suspend/resume
      durable test — is green, proving the park is a real zero-compute durable wait, the resume re-executes no
      journaled step, and nothing outside the suspend surface regressed (no contract/StepRecord change).
    check: cd packages/sdk-ts && pnpm exec tsc --noEmit && pnpm exec eslint . && pnpm exec vitest run
