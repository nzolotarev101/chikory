  # worker's devbox env — call the toolchain directly, 120s cap per check.
  - id: AC-1
    description: the new chain-state reducer unit test passes
    check: pnpm install --prefer-offline --silent && pnpm --filter @chikory/sdk exec vitest run test/chain/advance.test.ts
  - id: AC-2
    description: >
      the complete TypeScript SDK suite remains green — proving the new pure
      module breaks no existing behavior
    check: pnpm --filter @chikory/sdk test
  - id: AC-3
    description: strict typecheck (covering test/**, WP-230) and lint are clean
    check: pnpm --filter @chikory/sdk typecheck && pnpm --filter @chikory/sdk lint
