name: dogfood-082-wp219-chain-replan-rung3-horizon
goal: >
  Advance the WP-219 CHAIN RUNTIME with the two capabilities `src/chain/chain-loop.ts` itself names
  as "remain deferred" ‚Äî D3 HALT-AND-REPLAN and STRUCTURED COMPACTION-NOTE handoff ‚Äî as a SINGLE
  `chikory run` under an ACTIVE bounded-work-unit policy, so this one run accumulates a genuine
  INTRA-RUN HORIZON of at least the policy floor of DURABLE CHECKPOINTS instead of collapsing into
  one executor session. Today a `FAILED` node unconditionally halts the chain
  (`deriveChainStatus` ‚Üí FAILED) and the S4 handoff carries only a git bundle + a static note; build
  the deferred behavior additively:

    * PART 1 ‚Äî PURE REPLAN DECISION: add a pure, deterministic, side-effect-free `decideReplan`
      function ‚Äî a sibling of the existing pure chain reducers `deriveChainStatus` / `advanceChain`
      (`src/chain/advance.ts`) ‚Äî that, given a `ChainRecord` with a just-`FAILED` node id and a
      bounded max-replan budget, returns whether to REPLAN the remaining (not-yet-sealed) nodes or
      HALT the chain terminally, plus the reason. Total function over its inputs: no I/O, no Temporal,
      no clock, no id-gen; a REPLAN is refused once the max-replan budget is exhausted (so a
      perpetually-failing node HALTs rather than looping forever). Unit-tested exhaustively (first
      failure under budget ‚Üí replan; budget exhausted ‚Üí halt; no failed node ‚Üí halt/none).

    * PART 2 ‚Äî PURE STRUCTURED COMPACTION NOTE: add a pure function that condenses a sealed
      predecessor node's outcome into a BOUNDED structured handoff note (the "structured compaction
      notes" `chain-loop.ts` defers) ‚Äî deterministic, size-bounded, no I/O ‚Äî to be carried into a
      successor node's context ALONGSIDE the existing artifact bundle, not replacing it. Unit-tested.

    * PART 3 ‚Äî REPLAN WIRE (depends on 1): call `decideReplan` from the chain loop's FAILED-node path
      (`src/chain/chain-loop.ts`) so that, instead of unconditionally halting, a REPLAN decision
      re-invokes the planner over the remaining goals, splices the revised nodes into the running
      chain, and journals a `node_replanned` control event; a HALT decision seals FAILED exactly as
      today. This MUST be additive: with the replan budget at zero the behavior is byte-for-byte the
      current halt-on-FAILED path, and the dogfood-079 chain `kill -9` ‚Üí `chikory chain resume`
      replay path MUST stay green.

    * PART 4 ‚Äî HANDOFF WIRE (depends on 2): thread the PART-2 structured compaction note into the S4
      handoff path (`src/chain/node-spec.ts` / `chain-loop.ts`) additively, so a successor node's
      context carries the predecessor's structured note in ADDITION to the git bundle. Do NOT change
      the shape of any frozen chain contract (`ChainRecord`, `NodeOutcome`, `ChainEntry`, `Plan`,
      `ChainNodeHandoff`) ‚Äî the note rides existing/optional fields, and `node_replanned` is at most
      an additive journal-event kind, never a mutation of an existing entry's shape.

    * PART 5 ‚Äî LIVE PROOF (depends on 3): add a LIVE Temporal chain test (reuse the existing
      live-chain harness ‚Äî `createChainActivities`, `createRunnerWorker`, the scripted registry +
      `waitFor` helpers, `describe.skipIf(address === null)` ‚Äî do NOT mock the workflow) that drives a
      REAL chain in which one node FAILS, asserts `decideReplan` fires a REPLAN, a `node_replanned`
      event is journaled, and the chain then reaches a SUCCESS terminal state; and asserts that with
      the replan budget at zero the SAME failing chain seals FAILED on the unchanged halt path.

  CONSTRAINTS: strict TypeScript, ESM `.js` relative imports, named exports only; NO new dependency;
  reuse `deriveChainStatus` / `advanceChain` / `readyNodes` ‚Äî do NOT re-implement chain state; do NOT
  change any frozen chain contract shape (`ChainRecord` / `NodeOutcome` / `ChainEntry` / `Plan` /
  `ChainNodeHandoff`); `decideReplan` and the compaction-note builder are NEW pure modules, the loop
  edits are additive, `node_replanned` is an additive journal-event kind. Do NOT weaken the WP-123
  crash-recovery, WP-206 suspend/resume, or the dogfood-079 chain kill‚Üíresume replay paths. If a
  verification step reports a failing test or type error, READ the failure and fix the
  IMPLEMENTATION ‚Äî do NOT weaken or delete any assertion.

repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true

# The rung-3 lever: force ‚â•5 durable checkpoints in ONE run even though codex one-shots.
bounded_work_unit:
  min_durable_steps: 5
  directive: >
    Advance exactly ONE of the five numbered PARTs of the goal in this increment, then stop and let
    the checkpoint seal ‚Äî do NOT declare the whole run complete until every PART has landed with its
    tests and the acceptance criteria pass. Prefer the next unstarted PART in dependency order
    (1 pure replan ‚Üí 2 pure note ‚Üí 3 replan wire ‚Üí 4 handoff wire ‚Üí 5 live proof).

acceptance_criteria:
  - id: AC-1
    description: >
      The pure `decideReplan` decision exists in the chain source ‚Äî a side-effect-free total function
      over a `ChainRecord` + failed-node id + a bounded replan budget, a sibling of the pure chain
      reducers. (OUTCOME symbol the goal NAMES ‚Äî `decideReplan` ‚Äî absent on HEAD, so a recursive grep
      cannot false-green on an incumbent file, F-90. Module/test layout is the executor's, F-82/F-83.)
    check: >
      cd packages/sdk-ts &&
      grep -rq 'decideReplan' src/chain/

  - id: AC-2
    description: >
      The durable chain loop HONORS the decision ‚Äî `decideReplan` is called from
      `src/chain/chain-loop.ts`'s FAILED-node path so a REPLAN re-enters instead of halting. (Same
      symbol, scoped to the loop file, proving the wire ‚Äî the def+wire pattern of dogfood-052/081.)
    check: >
      cd packages/sdk-ts &&
      grep -rq 'decideReplan' src/chain/chain-loop.ts

  - id: AC-3
    description: >
      A LIVE Temporal chain test exercises replan end-to-end. (F-97-SAFE, dogfood-081 lesson: not a
      bare symbol grep a UNIT test would false-green ‚Äî it requires a `test/chain/` file that
      references BOTH the net-new `decideReplan` symbol AND the LIVE-chain driver `createChainActivities`
      AND asserts the `node_replanned` outcome the goal names, so the LIVE replan test is actually
      enforced. All three are OUTCOME symbols the goal names; test filename is the executor's, F-82.)
    check: >
      cd packages/sdk-ts &&
      for f in $(grep -rl 'decideReplan' test/chain/ 2>/dev/null); do
        grep -q 'createChainActivities' "$f" && grep -q 'node_replanned' "$f" && { echo ok; break; };
      done | grep -q ok

  - id: AC-4
    description: >
      The SDK stays type- and lint-clean and the FULL existing suite ‚Äî including the new replan unit
      + live chain tests ‚Äî is green, proving the additive guarantee (no frozen chain-contract change;
      the WP-123 crash-recovery, WP-206 suspend/resume, and dogfood-079 chain kill‚Üíresume replay tests
      still pass, and the zero-budget path is the unchanged halt-on-FAILED behavior).
    check: cd packages/sdk-ts && pnpm exec tsc --noEmit && pnpm exec eslint . && pnpm exec vitest run

