acceptance_criteria:
  # Checks run by the judge inside the run workspace (fresh clone) under the
  # worker's devbox env ‚Äî call uv/ruff directly, 120s cap per check.
  - id: AC-1
    description: the new Memory Pointer parity test passes
    check: cd packages/sdk-py && uv sync --quiet && uv run pytest tests/test_memory_pointer.py -q
  - id: AC-2
    description: >
      the complete Python SDK suite remains green ‚Äî proving the new pure module
      breaks no existing behavior
    check: cd packages/sdk-py && uv run pytest -q
  - id: AC-3
    description: pyright typecheck and ruff lint + format are clean
    check: cd packages/sdk-py && uv run pyright && ruff check . && ruff format --check .
