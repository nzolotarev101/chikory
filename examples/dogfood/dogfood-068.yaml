name: dogfood-068-wp258-staleness-precheck-wire
goal: >
  Land WP-258 тАФ wire WP-256's spec-staleness gate into the live `chikory run` launch path so a dogfood
  whose goal targets an already-ЁЯЯв work package is WARNED about before it runs (the F-65 fix: dogfood-067
  landed the pure `assessSpecStaleness` decision with zero live consumers). Make exactly the changes below
  in packages/sdk-ts. Use strict TypeScript, ESM `.js` relative imports, named exports only, NO default
  exports, no new dependency. Do NOT change `types.ts`, any contract, schemas, the barrel `src/index.ts`,
  the chain runner, the Temporal workflow/agent-loop, or `src/cli/spec-staleness.ts` / `src/cli/wp-status.ts`
  (consume them, do not edit them). Run project commands sequentially inside the existing Devbox
  environment with bare `pnpm exec`. If a verification step reports a failing test or type error, READ the
  failure and fix the IMPLEMENTATION so every mandated assertion passes тАФ do NOT weaken, rephrase, or
  remove any mandated assertion (a grep enforces the symbols).

  FILE 1 тАФ packages/sdk-ts/src/cli/spec-staleness-precheck.ts (NEW pure module). It MUST
  `import { assessSpecStaleness } from "./spec-staleness.js";` (consume WP-256's decision тАФ do NOT
  reimplement it). Export (named exports only):

    export function extractTargetWpId(goal: string): string | null;
    export interface SpecStalenessPrecheckResult {
      targetWpId: string | null;
      stale: boolean;
      warning: string | null;
    }
    export function evaluateSpecStalenessPrecheck(input: { goal: string; planText: string }): SpecStalenessPrecheckResult;

  Semantics (exact):
    * `extractTargetWpId` returns the FIRST `WP-<digits>` token in `goal` (regex `/WP-\d+/`), or `null`
      when the goal names no work-package id. Pure; read only.
    * `evaluateSpecStalenessPrecheck`: `targetWpId = extractTargetWpId(input.goal)`. When `targetWpId` is
      null, return `{ targetWpId: null, stale: false, warning: null }` (nothing to check). Otherwise call
      `assessSpecStaleness({ targetWpId, planText: input.planText })`; set `stale = report.stale`; when
      `stale` is true, `warning` is a non-empty human string that INCLUDES the substring `stale` and the
      `targetWpId` (e.g. `` `spec targets WP-XXX which is already done (ЁЯЯв) тАФ this dogfood may be stale: <reason>` ``);
      when `stale` is false, `warning` is null. Return `{ targetWpId, stale, warning }`. Pure; do not
      mutate inputs. Add a short JSDoc. This is WARN-ONLY тАФ it returns a message, it never throws or exits.

  FILE 2 тАФ packages/sdk-ts/test/cli/spec-staleness-precheck.test.ts (NEW Vitest file, ESM `.js` relative
  import from `../../src/cli/spec-staleness-precheck.js`) encoding AT LEAST these cases verbatim (graded by
  a grep тАФ do not rephrase): a goal naming a target whose plan-text row is ЁЯЯв тЖТ `stale === true` and
  `warning` is a non-null string containing `"stale"`; a goal naming a target whose row is ЁЯЯб тЖТ
  `stale === false` and `warning === null`; a goal with NO `WP-` id тЖТ `targetWpId === null`,
  `stale === false`, `warning === null`; `extractTargetWpId("... WP-258 ...")` returns `"WP-258"`.

  FILE 3 тАФ packages/sdk-ts/src/cli/commands.ts (WIRE the live call-site тАФ this is the de-orphaning step):
    * Add an additive optional field to the existing `CliDeps` interface:
      `readPlanText?: () => Promise<string | null>;` (a best-effort plan.md reader, injectable for tests).
    * In `cmdRun`, AFTER `spec = parseTaskSpec(yamlText)` succeeds and BEFORE the existing
      `CHIKORY_SEED_BAD_DIFF_PATH` seam block, run the staleness precheck: read the plan text via
      `deps.readPlanText` if provided, else best-effort `await readFile("plan.md", "utf8")` wrapped in a
      try/catch returning null on failure (a missing plan.md must NOT break launch). When the plan text is
      non-null, call `evaluateSpecStalenessPrecheck({ goal: spec.goal, planText })` (imported from
      `./spec-staleness-precheck.js`) and, when its `warning` is non-null, emit it via the existing
      `ioPair.err(...)` channel. The launch then proceeds unchanged (WARN-ONLY тАФ never abort the run).
    * Do not change any other behavior of `cmdRun`, the seam blocks, or `hostAndFollow`.

  Keep the new module pure and minimal; keep the wire small and additive. The acceptance check greps
  `commands.ts` for `evaluateSpecStalenessPrecheck` and `readPlanText`, so the wire MUST exist тАФ the module
  cannot land orphaned (the F-65 lesson). The full existing SDK suite must stay green (the wire is additive
  and the default plan-read path is best-effort, so runs without a plan.md are unaffected).
