name: dogfood-102-wp309-cross-run-capacity-learning
goal: >
  Complete WP-309 in the Chikory TypeScript SDK by closing F-138: a REAL (non-injected) usage-limit hit must
  persist its learned window capacity to the CROSS-RUN endpoint ledger so a LATER run's pacing governor paces
  against it. Today `EndpointLedger.appendLimitObservation`
  (`packages/sdk-ts/src/journal/endpoint-ledger.ts`) has no `src/` caller: the real-limit site in
  `packages/sdk-ts/src/runner/activities.ts` (the branch that already journals a per-run `limit_observation` when
  `observation !== undefined`) writes NOTHING to the shared ledger, so `windowState(...).capacityTokens` stays
  undefined across runs and the WP-310 governor (`decideLimitPacing`) can only pace declared/injected windows.
  Deliver in FOUR ordered increments, ONE per durable step, each adding DISTINCT non-trivial working code + tests:

    * PART 1 â€” LEDGER WRITE ON A REAL HIT: at the real (non-injected) limit-signal path, for each declared quota
      window on the hit endpoint, persist a learned-capacity observation via `EndpointLedger.appendLimitObservation`
      (the consumed-tokens-at-hit = the ledger's in-window consumption sum at that moment; carry the observed reset
      timing when known). The INJECTED seam path (`classified.source === "injected"`) MUST remain unchanged (no
      ledger write). Tested: a real-shaped signal drives exactly one ledger observation per declared window; an
      injected signal drives none.

    * PART 2 â€” LEARNED CAPACITY IS READABLE CROSS-RUN: a test proves that after PART 1 persists an observation,
      a SEPARATE `EndpointLedger` instance opened on the SAME db path returns that value as
      `windowState(...).capacityTokens` for a declared window that carries NO `capacityTokens` of its own â€” i.e.
      the learning survives across ledger lifetimes (the cross-run boundary).

    * PART 3 â€” THE GOVERNOR PACES AGAINST THE LEARNED CAPACITY: a co-reference test feeds a declared window whose
      capacity is ONLY the learned value (zero declared/injected capacity) into `decideLimitPacing` and proves the
      decision is capacity-aware (throttle or predict-limit against the learned number), whereas the same window
      with no observation is `observe, never throttle`. This ties the PART-1 write to the WP-310 read.

    * PART 4 â€” REGRESSION: the FULL `packages/sdk-ts` suite (tsc + eslint + vitest) green; a run with no limit
      signal is byte-identical (no new ledger rows, no new journal entries); no frozen-contract shape change.

  CONSTRAINTS: additive only; writes ONLY inside `packages/sdk-ts/` (a `docs/components/router.md` doc-sync is
  permitted if the ledger contract changed); NO new dependency; NO key material. Each PART lands its own tests and
  does NOT break an earlier PART's tests; do NOT front-load a later PART (the judge compares the diff footprint
  against the active PART and WILL roll back). If a verification step reports a failing suite, READ the failure and
  fix the IMPLEMENTATION â€” never weaken or delete an assertion.

repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true

bounded_work_unit:
  min_durable_steps: 4
  directive: >
    Advance EXACTLY the ONE numbered PART named by this step's chunk â€” implement it and its tests, then stop and
    let the durable checkpoint seal. Do NOT front-load a later PART.
  work_chunks:
    - name: part-1-ledger-write-on-real-hit
      directive: "PART 1 ONLY: the real (non-injected) limit path calls EndpointLedger.appendLimitObservation once per declared window; injected seam writes none. Tests."
    - name: part-2-learned-capacity-readable-cross-run
      directive: "PART 2 ONLY: a fresh EndpointLedger on the same db path returns the persisted observation as windowState().capacityTokens. Test."
    - name: part-3-governor-paces-learned-capacity
      directive: "PART 3 ONLY: decideLimitPacing is capacity-aware against a window whose capacity is ONLY the learned value; observe-only without it. Co-reference test."
    - name: part-4-regression
      directive: "PART 4 ONLY: full packages/sdk-ts suite (tsc + eslint + vitest) green; no-limit run byte-identical; fix implementations, never weaken tests."

acceptance_criteria:
  - id: AC-1
    description: >
      The real-limit path gained a cross-run ledger writer â€” some `src/` file OTHER than the ledger definition now
      calls `appendLimitObservation`. (F-114-SAFE: greps the consumed CALL EXPRESSION, not a type name; absent on
      HEAD per the F-129 premise check â€” only `endpoint-ledger.ts` references it in `src/`.)
    check: >
      cd packages/sdk-ts &&
      grep -rlE 'appendLimitObservation\(' src | grep -v 'journal/endpoint-ledger.ts' | head -1 | grep -q .
  - id: AC-2
    description: >
      A test co-references the write and the WP-310 pacing DECISION â€” some `test/` file exercises BOTH
      `appendLimitObservation` (the cross-run write) AND `decideLimitPacing`, proving the learned capacity flows
      into the governor's decision, not a hand-built window. (F-97-SAFE co-reference; RED on HEAD â€” the existing
      `endpoint-ledger.test.ts` refs `windowState` but never `decideLimitPacing`; filename is the executor's.)
    check: >
      cd packages/sdk-ts &&
      for f in $(grep -rl 'appendLimitObservation' test/ 2>/dev/null); do
        grep -q 'decideLimitPacing' "$f" && { echo ok; break; };
      done | grep -q ok
  - id: AC-3
    description: >
      The SDK stays type- and lint-clean and the FULL existing suite is green, proving the change is additive
      (a no-limit run writes no new ledger rows and stays byte-identical).
    check: cd packages/sdk-ts && pnpm exec tsc --noEmit && pnpm exec eslint . && pnpm exec vitest run

