# Dogfood-025: WP-219 S2b — the plan meta-judge's PURE verdict-assembly half.
#
# WHY THIS IS THE PRIORITY: WP-219 (goal decomposition & run chaining, ADR-005)
# is the headline Phase-2 planner pillar. Its S2 PLANNER pure surface is complete
# (prompt half dogfood-022 `run-499218ef`; assembly half `buildPlan` dogfood-023
# `run-2d40ded5`), and the S2b plan META-JUDGE prompt half landed last run
# (dogfood-024 `run-28073328`: `planner/meta-judge-prompt.ts` —
# `PLAN_JUDGE_SYSTEM_PROMPT` + `PLAN_VERDICT_RESPONSE_SCHEMA` +
# `buildPlanJudgeMessages`, mirroring `judge/prompt.ts`). The remaining PURE S2b
# piece is the VERDICT-ASSEMBLY half: a pure `buildPlanVerdict` mirroring the
# judge's pure `buildVerdict` (`judge/harness.ts:49`), which turns the plan
# judge's schema-valid `{ kind, rationale }` reply into a validated `PlanVerdict`
# while folding the already-landed pure `planCoverageGaps` (`planner/coverage.ts`)
# in as the DETERMINISTIC OVERRIDE — code, not the LLM, forbids PROCEED when the
# plan drops a goal criterion (the reward-hacking guard analog of the judge's
# JD-4/JD-7 check overrides). This slice carves out that pure half; the non-pure
# plan-judge harness (router call + `JSON.parse` + this assembly) and the
# non-pure `GoalPlanner.decompose` wrapper are the later hand-design follow-ups.
#
# The `PlanVerdict`/`PlanVerdictKind` contract (`types.ts:475`) and the pure
# `planCoverageGaps(plan, goalCriteria): string[]` (`src/planner/coverage.ts`)
# are already frozen/landed, so this is a clean one-step pure dogfood — no
# contract/router/loop change.
#
# WP-203 S2 digest wiring remains BLOCKED: `CompactionResult.digestRef` is a
# Memory Pointer (WP-202), and the WP-202 store is not built yet.
#
# Zero-secrets launch:
#   node scripts/cli-judge-proxy.mjs 8787 gemini &
#   OPENAI_COMPAT_BASE_URL=http://127.0.0.1:8787 pnpm chikory run examples/dogfood/dogfood-025.yaml --watch
#
# Commit everything before launching — workspaces clone HEAD, so the run must
# see the frozen `Plan`/`PlanNode`/`PlanVerdict`/`PlanVerdictKind`/
# `AcceptanceCriterion` contracts in types.ts and the landed `planner/coverage.ts`
# (`planCoverageGaps`). Launch ONCE and watch to terminal (F-30). Run Devbox
# commands sequentially (F-22). F-11 is closed (dogfood-022/023/024): a clean
# one-step finish should seal SUCCESS with NO empty-diff probe step — watch the
# step count stay at 1.
name: dogfood-025-wp-219-plan-judge-verdict
goal: >
  Implement WP-219 S2b verdict-assembly half: the PURE `buildPlanVerdict`
  function (ADR-005 D2), mirroring the executor judge's pure verdict assembly
  (`judge/harness.ts`: `buildVerdict(form, criteriaHistory, opts): JudgeVerdict`)
  in structure. Build the deterministic step that turns the plan judge's
  schema-valid `{ kind, rationale }` reply into a validated `PlanVerdict`, folding
  the already-landed pure `planCoverageGaps` in as a deterministic coverage
  override. Do NOT make any LLM/router call, do NOT implement the plan-judge
  harness or `GoalPlanner.decompose`, do NOT call `JSON.parse`, do NOT build the
  prompt (it already exists in `planner/meta-judge-prompt.ts`), do NOT touch the
  router, agent-loop, planner prompt/assembly, judge code, `planner/coverage.ts`,
  or any contract/type/schema/journal format. Add no dependency. Add exactly one
  new source file, edit exactly one existing source file, and add exactly one new
  test file.

  1. packages/sdk-ts/src/planner/meta-judge-verdict.ts (new) — the pure
     plan-verdict assembly. Import `AcceptanceCriterion`, `Plan`, `PlanVerdict`,
     `PlanVerdictKind` (type-only) from "../types.js", and `planCoverageGaps`
     (value) from "./coverage.js". Export, all pure (no I/O, no mutation, no
     clock, no id generation), with short JSDoc citing WP-219 S2b and ADR-005 D2:
       - `interface PlanJudgeReply { kind: PlanVerdictKind; rationale: string }`
         — the plan judge's schema-valid reply (the object the later, non-pure
         harness parses out of the model response via the already-landed
         `PLAN_VERDICT_RESPONSE_SCHEMA`), mirroring how `buildVerdict` takes the
         already-parsed `JudgeForm`.
       - `buildPlanVerdict(reply: PlanJudgeReply, plan: Plan, goalCriteria:
         AcceptanceCriterion[]): PlanVerdict` — computes
         `uncoveredCriteria = planCoverageGaps(plan, goalCriteria)`, then applies
         the DETERMINISTIC COVERAGE OVERRIDE (the reward-hacking guard analog:
         code, not the LLM, decides the safety floor): when `uncoveredCriteria`
         is non-empty the plan CANNOT pass, so a `reply.kind` of `"PROCEED"` is
         downgraded to `"REVISE"` and the override is appended to the rationale
         (e.g. `"<reply.rationale> [coverage override: plan leaves goal criteria
         uncovered: <ids joined by ', '> — cannot PROCEED]"`); when
         `uncoveredCriteria` is empty, `reply.kind` and `reply.rationale` pass
         through unchanged. Returns exactly the frozen `PlanVerdict` shape
         `{ kind, rationale, uncoveredCriteria }` — no extra or missing field. Do
         NOT mutate `reply`, `plan`, `goalCriteria`, or the array
         `planCoverageGaps` returns.

  2. packages/sdk-ts/src/index.ts — add ONE re-export line for the new symbols,
     immediately after the existing
     `export { buildPlanJudgeMessages, PLAN_JUDGE_SYSTEM_PROMPT, PLAN_VERDICT_RESPONSE_SCHEMA } from "./planner/meta-judge-prompt.js";`
     line:
     `export { buildPlanVerdict, type PlanJudgeReply } from "./planner/meta-judge-verdict.js";`
     Add nothing else.

  3. packages/sdk-ts/test/planner/meta-judge-verdict.test.ts (new) — unit-test
     the pure assembler, importing `buildPlanVerdict` and `PlanJudgeReply` from
     "../../src/planner/meta-judge-verdict.js" and any types from
     "../../src/types.js". Build a valid two-node `Plan` fixture (node "N-1"
     with empty `dependsOn`, node "N-2" depending on "N-1"; each a non-empty
     `goal`, a non-empty `acceptanceCriteria` array, and a `budgetUsd`) whose
     nodes between them carry acceptance-criterion ids "AC-1" and "AC-2", plus a
     goal `AcceptanceCriterion[]` fixture. Cover and assert:
       - full coverage + `reply.kind === "PROCEED"`: with `goalCriteria` whose
         ids are all carried by some node, the verdict is `{ kind: "PROCEED" }`,
         `uncoveredCriteria` is empty, and `rationale === reply.rationale`
         (passes through unchanged);
       - coverage gap downgrades PROCEED: with a `goalCriteria` containing an id
         no node covers (e.g. "AC-3") and `reply.kind === "PROCEED"`, the verdict
         `kind` is `"REVISE"`, `uncoveredCriteria` contains the uncovered id, and
         the rationale mentions the uncovered id (override appended);
       - a non-PROCEED `reply.kind` is preserved: `reply.kind === "ESCALATE"`
         (or `"REVISE"`) with full coverage stays that kind and passes the
         rationale through;
       - the returned object has exactly the keys `kind`, `rationale`,
         `uncoveredCriteria` (the frozen `PlanVerdict` shape);
       - `buildPlanVerdict` does not mutate its inputs (e.g. `plan.nodes.length`
         and `goalCriteria.length` are unchanged after the call).

  After this slice, the plan meta-judge's pure surface is complete — prompt
  regime (dogfood-024) + verdict assembly (this run) — mirroring the executor
  judge's. Remaining WP-219 S2/S2b: the non-pure plan-judge harness (router call
  + `JSON.parse` over `PLAN_VERDICT_RESPONSE_SCHEMA` + `buildPlanVerdict`) and the
  non-pure `GoalPlanner.decompose` wrapper (route `buildPlannerMessages` → parse
  → `buildPlan`), both hand-design (TASK-PROTOCOL §4, LLM call), out of scope for
  this deterministic slice.

  Follow AGENTS.md: strict TypeScript, ESM `.js` import extensions, named
  exports only, no `any`, no default exports. The typecheck gate type-checks
  test/** (WP-230), so the new test must be type-correct. Run all Devbox
  verification commands sequentially.
repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true
