#   terminal instead of an untimed approval hang). That was the NAMED BLOCKER for the в‘¦ overnight-unattended rung.
#   With it landed, an unattended `work_chunks` run can finally run without an operator on hand.
#
# WHY THIS IS THE NEXT HEADLINE (в›” STALLED в‡’ ladder rung binding; rung stuck at 3 for 085/086).
#   `scripts/dogfood-progression.sh` is в›” STALLED (ladder rung 3 vs 3 across the trailing-3 headlines) and the
#   В§1.5 ladder-pace rule requires the next headline to CLIMB the next rung. The next rung is в‘¦ OVERNIGHT-UNATTENDED
