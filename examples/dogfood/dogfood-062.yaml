name: dogfood-062-wp202-memory-pointer-recall
goal: >
  Land the pure READ half of the Memory Pointer Pattern (WP-202): turn a context-facing memory
  pointer line back into its fields and dereference it through an injected store-excerpt function.
  The WRITE/render half is already landed in the SAME module — `shouldPointerize(bytes, policy)` and
  `formatPointerReference(ref): string` (which renders `[memory ${ref.kind} ${ref.id.slice(0, 12)}]
  ${ref.bytes}B — ${ref.summary}`, with a literal U+2014 em-dash " — " before the summary). This adds
  the exact INVERSE plus a recall helper. Change exactly these THREE files; change no other file, add
  no new dependency, and do NOT touch `types.ts` or any contract.

  1. packages/sdk-ts/src/runner/memory-pointer.ts  (extend — do not alter the existing exports)
     - Add an exported result interface (a LOCAL type — do NOT add it to `types.ts`):
         /** WP-202: the parsed fields of a context-facing memory pointer reference, the inverse of
          * `formatPointerReference`. `idPrefix` is the 12-char `ArtifactRef.id.slice(0, 12)` the
          * renderer emits, not the full content hash. */
         export interface ParsedPointerReference {
           kind: string;
           idPrefix: string;
           bytes: number;
           summary: string;
         }
     - Add the pure inverse parser:
         export function parsePointerReference(line: string): ParsedPointerReference | null
       It MUST be the exact inverse of `formatPointerReference`. Match the single-line format
       `[memory <kind> <idPrefix>] <bytes>B — <summary>` where `<kind>` and `<idPrefix>` are non-empty
       runs of non-space characters, `<bytes>` is one or more ASCII digits immediately followed by the
       literal `B`, the separator is the literal `" — "` (space, U+2014 EM DASH, space) the renderer
       uses, and `<summary>` is the remaining text (which MAY be empty and MAY itself contain spaces or
       a `—`). Return a `ParsedPointerReference` with `bytes` parsed via `Number.parseInt(..., 10)` on
       a match; return `null` for any line that does not match the format. A value produced by
       `formatPointerReference(ref)` must round-trip: `parsePointerReference(formatPointerReference(ref))`
       yields `{ kind: ref.kind, idPrefix: ref.id.slice(0, 12), bytes: ref.bytes, summary: ref.summary }`.
     - Add the pure recall helper that dereferences a pointer line through an injected excerpt source
       (the established `deps.runCheck`/`deps.loadAcceptanceChecks` dependency-injection pattern, so
       the test is hermetic and no real `ArtifactStore` is needed):
         export async function recallPointerExcerpt(
           line: string,
           excerptFn: (idPrefix: string, bytes: number) => Promise<string>,
         ): Promise<string | null>
       Parse `line` with `parsePointerReference`; if it is `null`, return `null` WITHOUT calling
       `excerptFn`; otherwise return `await excerptFn(parsed.idPrefix, parsed.bytes)`.
     - Add the same kind of short JSDoc the existing helpers carry above each new export.

  2. packages/sdk-ts/src/index.ts  (extend the existing memory-pointer re-export only)
     - The barrel already re-exports `shouldPointerize, formatPointerReference, type MemoryPointerPolicy`
       from `./runner/memory-pointer.js` (index.ts:115). Add `parsePointerReference`,
       `recallPointerExcerpt`, and `type ParsedPointerReference` to that SAME export statement. Change
       nothing else in the barrel.

  3. packages/sdk-ts/test/runner/memory-pointer.test.ts  (extend — do not weaken existing cases)
     - Add focused cases proving: (a) `parsePointerReference` round-trips a value produced by
       `formatPointerReference` (build an `ArtifactRef`, format it, parse it back, assert the four
       fields — `idPrefix` equals the 12-char `id.slice(0, 12)`); (b) it parses a hand-written valid
       line with a multi-word summary; (c) it returns `null` for at least two malformed lines (e.g. a
       missing `B` suffix, a missing `[memory ...]` prefix, or a hyphen `-` separator instead of the
       em-dash); (d) `recallPointerExcerpt` parses a valid line and returns the value of an injected
       `excerptFn` spy, asserting the spy was called with the parsed `idPrefix` and `bytes`; (e)
       `recallPointerExcerpt` returns `null` and does NOT call the spy for a malformed line. Follow the
       existing `memory-pointer.test.ts` structure; do not remove or weaken any existing assertion.

  Follow AGENTS.md and the sdk-ts conventions: strict TypeScript, ESM, named exports only, no default
  export, no new dependency, no `types.ts`/contract change. Run all Devbox verification commands
  sequentially. If a verification step reports a failing test or type error, READ the failure, fix the
  code, and continue — do NOT weaken, rephrase, or remove any mandated assertion (a grep enforces the
  symbols), and do NOT change the existing `shouldPointerize`/`formatPointerReference`/`MemoryPointerPolicy`
  exports.
