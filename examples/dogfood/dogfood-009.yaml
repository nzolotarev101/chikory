# Dogfood-009: WP-225 — de-flake the WP-217 milestone test
# (plan.md §6, queued from dogfood-007 F-19). The test
# `agent-loop.test.ts > incomplete empty-diff verdict keeps RUNNING and
# feeds rationale into the next step` flapped 2/13 host runs during the
# dogfood-007 review: its `waitFor` predicate releases on
# `wire.hits === 1 && currentStep === 1 && status === "RUNNING"` — the
# fake judge wire counts the hit at HTTP-response time, BEFORE the runner
# journals the verdict, so the next line's `running.lastVerdict` can still
# read `undefined`. Same sampled-vs-durable-state class as F-15, now in
# the test harness. It sits inside a judge-executed acceptance check, so it
# can spuriously fail a future run or harvest. One-line test change, no
# product code.
# No-contracts slice: a single test file, predicate-only.
#
# Zero-secrets launch (locally-authenticated CLIs; see DOGFOODING.md §2.2/§3.8):
#   node scripts/cli-judge-proxy.mjs 8787 gemini &
#   OPENAI_COMPAT_BASE_URL=http://127.0.0.1:8787 pnpm chikory run examples/dogfood/dogfood-009.yaml --watch
#
# ⚠ Commit everything before launching — the run workspace clones HEAD.
name: dogfood-009-wp-225-deflake-milestone-test
goal: >
  Implement WP-225 (plan.md §6): de-flake the WP-217 completion-milestone
  test by gating its `waitFor` predicate on the verdict being durably
  applied. Exactly one file changes —
  packages/sdk-ts/test/runner/agent-loop.test.ts — and nothing else; in
  particular DO NOT touch any file under packages/sdk-ts/src/, any other
  test, types.ts, schemas.ts, or the fixtures. This is a test-harness fix
  only: no product code, no new dependencies, no new or deleted tests, no
  change to any assertion.
  In the test titled "incomplete empty-diff verdict keeps RUNNING and
  feeds rationale into the next step", the `waitFor` predicate currently
  returns the report only when
  `wire.hits === 1 && report.currentStep === 1 && report.status ===
  "RUNNING"`. The fake judge wire increments `wire.hits` at HTTP-response
  time, before the runner has journaled the verdict, so the subsequent
  `expect(running.lastVerdict).toEqual({ kind: "PROCEED", atStep: 0 })`
  can observe `lastVerdict === undefined` and flap. Fix: extend that same
  predicate's boolean condition with `&& report.lastVerdict !== undefined`
  so `waitFor` only releases once the PROCEED verdict is durably visible
  on the status report. Change nothing else about the test — the title,
  the surrounding `setup`/`makeJudgedSpec` calls, every `expect`, the
  terminal-state and journal assertions all stay byte-identical. Follow
  AGENTS.md conventions: strict TypeScript, ESM imports with .js
  extensions.
repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true
acceptance_criteria:
  # Judge-executed in the run workspace (fresh clone), bare pnpm, 120 s cap
  # per check. Timed on host 2026-06-12: agent-loop.test.ts ≈ 5.3 s/run, so
  # the 8× stability loop ≈ 45 s + install; AC-2 ≈ 5 s; AC-3 ≈ 10 s.
  - id: AC-1
    description: >
      the milestone test is stable — agent-loop.test.ts passes 8 times in
      a row (the de-flake proof)
    check: pnpm install --prefer-offline --silent && for i in 1 2 3 4 5 6 7 8; do pnpm --filter @chikory/sdk exec vitest run test/runner/agent-loop.test.ts || exit 1; done
  - id: AC-2
    description: the rest of the runner + CLI surface is untouched in behavior
    check: pnpm --filter @chikory/sdk exec vitest run test/runner/verdict-gating.test.ts test/cli/cli.test.ts
  - id: AC-3
    description: strict typecheck and lint are clean
    check: pnpm --filter @chikory/sdk typecheck && pnpm --filter @chikory/sdk lint
budget_usd: 5
max_steps: 4
executor:
  adapter: codex
  family: openai
judge:
  # openai-compat = the keyless shim seam; real family = the shim backend
  # (gemini) — structurally different from the openai executor.
  family: openai-compat
  cadence: 2
  max_cost_share: 0.5
routing:
  stages:
    # plan/review unused by CLI executors in P1; code.model feeds `codex -m`.
    plan: { provider: openai-compat, model: gpt-5.5 }
    code: { provider: openai-compat, model: gpt-5.5 }
    review: { provider: openai-compat, model: gpt-5.5 }
    judge: { provider: openai-compat, model: gemini-3.1-pro-preview }
