name: dogfood-031-wp-207-context-window-pacing-decision
goal: >
  Add the WP-207 PURE context-window pacing decision to the TypeScript SDK as a
  local runner helper, with no runtime wiring. This is the pure predicate/decision
  that estimates whether the next step fits the configured context window and
  recommends `continue`, `compact`, or `park` before any agent-loop integration
  exists. It is the analog of `runner/budget.ts`, `runner/compaction.ts`,
  `runner/memory-pointer.ts`, and `cli/precheck.ts`: deterministic math first,
  side effects later.

  Do NOT change `types.ts`, schemas, TaskSpec parsing, the workflow/agent loop,
  activities, journal format, router, judge, executor prompts, or compaction
  wiring. Do NOT add dependencies. Do NOT read/write the filesystem, touch the
  network, call an LLM/router, read the clock, or use randomness.

  Implement exactly three tracked files:

  1. packages/sdk-ts/src/runner/pacing.ts — NEW pure module. Named exports only,
     strict TypeScript, no `any`, no default export. Define local types:
       - `ContextWindowUsage` with `currentInputTokens`, `currentOutputTokens`,
         `estimatedNextStepTokens`, and `contextWindowTokens` numbers.
       - `ContextWindowPacingPolicy` with `compactAtFraction` number.
       - `ContextWindowPacingDecision` with
         `action: "continue" | "compact" | "park"`,
         `projectedTokens`, `remainingTokens`, and `utilization` numbers.
     Export `decideContextWindowPacing(usage, policy): ContextWindowPacingDecision`.
     Behavior:
       - `projectedTokens = currentInputTokens + currentOutputTokens +
         estimatedNextStepTokens`.
       - `remainingTokens = contextWindowTokens - projectedTokens`.
       - `utilization = projectedTokens / contextWindowTokens`.
       - If `estimatedNextStepTokens > contextWindowTokens`, return `action:
         "park"` because even an empty window cannot fit the next step.
       - Else if `projectedTokens > contextWindowTokens * compactAtFraction`,
         return `action: "compact"`.
       - Else return `action: "continue"`.
       - Exactly-at-threshold continues (`>` not `>=`), matching the
         `shouldPointerize` threshold convention.
     Keep the function pure and leave inputs unmutated. Add concise JSDoc
     citing WP-207 / FA-3 / SE-2.

  2. packages/sdk-ts/src/index.ts — re-export `decideContextWindowPacing` and
     the three local types from `./runner/pacing.js`, next to the other runner
     pure helpers. Change nothing else.

  3. packages/sdk-ts/test/runner/pacing.test.ts — NEW focused Vitest file. Test
     at least:
       - under threshold returns `continue` and reports projected/remaining/
         utilization correctly;
       - exactly at `contextWindowTokens * compactAtFraction` still returns
         `continue`;
       - above the compact threshold returns `compact`;
       - `estimatedNextStepTokens > contextWindowTokens` returns `park`;
       - input objects are not mutated.

  After this slice, WP-207 has its pure window-fit decision ready for the
  non-pure runner integration that will later journal pacing decisions and tune
  compaction/checkpoint cadence. This slice must not change runtime behavior.
