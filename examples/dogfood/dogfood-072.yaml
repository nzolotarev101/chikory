    description: >
      the NEW pure module exists with the classifier, the interface, and the three verbatim infra prefixes, the
      barrel re-exports both symbols, and the behavioral test invokes `classifyPlanGateFailure` and asserts the
      PROCEED→null, infra→safeToReRun(true), substantive→safeToReRun(false), and anchored-match cases
    check: >
      cd packages/sdk-ts &&
      grep -q "classifyPlanGateFailure" src/chain/plan-gate-failure.ts &&
      grep -q "PLAN_GATE_INFRA_REASON_PREFIXES" src/chain/plan-gate-failure.ts &&
      grep -q "interface PlanGateFailureClass" src/chain/plan-gate-failure.ts &&
      grep -q "plan meta-judge LLM call failed after " src/chain/plan-gate-failure.ts &&
      grep -q "plan meta-judge reply was not valid JSON: " src/chain/plan-gate-failure.ts &&
      grep -q "plan meta-judge reply failed schema validation: " src/chain/plan-gate-failure.ts &&
      grep -q "startsWith" src/chain/plan-gate-failure.ts &&
      grep -q "classifyPlanGateFailure" src/index.ts &&
      grep -q "classifyPlanGateFailure(" test/chain/plan-gate-failure.test.ts &&
      grep -q "toBeNull" test/chain/plan-gate-failure.test.ts &&
      grep -q "transport error: fetch failed" test/chain/plan-gate-failure.test.ts &&
      pnpm exec vitest run test/chain/plan-gate-failure.test.ts
  - id: AC-2
    description: >
      the SDK stays type- and lint-clean and the full existing suite remains green — proving the change is
      additive (one new module + one barrel line + one new test) and no existing export, contract,
