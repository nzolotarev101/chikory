name: dogfood-072-wp233a-plan-gate-failure-classifier
goal: >
  Land the PURE plan-gate FAILURE CLASSIFIER for the durable chain planning layer (WP-233(a), the dogfood-041
  attempt-2 F-33 fix-half): a pure function that reads a plan-gate `PlanVerdict` and reports whether a
  non-PROCEED verdict is an INFRA/transport fault (the judge was unreachable — SAFE to re-run) or a SUBSTANTIVE
  plan rejection (the plan was genuinely rejected — NOT safe to blindly re-run). Today `runPlanJudgePass`
  (`src/planner/meta-judge-harness.ts`) folds a router FAILED into an ESCALATE `PlanVerdict` and downstream
  `planAndGateChain` cannot tell the two apart. This run builds ONLY the pure classifier; the
  `planAndGateChain` wire and the Plan-persistence/resume half are SEPARATE §4 follow-ups. Change exactly ONE
  new file plus ONE new test file. Add no new dependency, and do NOT touch `types.ts`, any contract,
  `meta-judge-harness.ts`, `chain.ts`, or any other existing file EXCEPT the barrel `src/index.ts` (one added
  re-export line). Use strict TypeScript, ESM `.js` relative imports, named exports only, NO default exports,
  and keep the function PURE (no I/O, clock, randomness, or input mutation). Run Devbox verification commands
  sequentially with bare `pnpm exec`. If a verification step reports a failing test or type error, READ the
  failure and fix the IMPLEMENTATION so every mandated assertion passes — do NOT weaken, rephrase, or remove
  any mandated assertion (a grep enforces the symbols, the infra prefixes, and the behavioral assertions).

  FILE 1 — packages/sdk-ts/src/chain/plan-gate-failure.ts (NEW). Import the `PlanVerdict` type only:

    import type { PlanVerdict } from "../types.js";

  Export an interface and the three infra-reason prefix constants and the classifier:

    * `export interface PlanGateFailureClass { kind: "infra" | "substantive"; safeToReRun: boolean; reason: string; }`
    * `export const PLAN_GATE_INFRA_REASON_PREFIXES: readonly string[]` = EXACTLY these three prefixes the
      harness emits (`meta-judge-harness.ts:80,98,109`), verbatim:
        - `"plan meta-judge LLM call failed after "`
        - `"plan meta-judge reply was not valid JSON: "`
        - `"plan meta-judge reply failed schema validation: "`
    * `export function classifyPlanGateFailure(verdict: PlanVerdict): PlanGateFailureClass | null` — behavior:
        - When `verdict.kind === "PROCEED"`, return `null` (a PROCEED is NOT a gate failure).
        - Otherwise (REVISE or ESCALATE), decide by the rationale: if `verdict.rationale` STARTS WITH any of
          `PLAN_GATE_INFRA_REASON_PREFIXES` (use `String.prototype.startsWith`, an ANCHORED prefix match — NOT
          `includes`, so a plan whose rationale merely QUOTES one of these phrases mid-sentence is NOT
          misclassified), return `{ kind: "infra", safeToReRun: true, reason: verdict.rationale }`.
        - Every other non-PROCEED verdict (a substantive REVISE/ESCALATE — e.g. a coverage-floor override
          `plan leaves goal criteria uncovered: …`) returns
          `{ kind: "substantive", safeToReRun: false, reason: verdict.rationale }`.
        - Do NOT mutate the input `verdict`.
      Add a JSDoc block on `classifyPlanGateFailure` citing WP-233(a) and the F-33 conflation it resolves, and
      note it mirrors the pure-first cadence of `assessLaunchModeMismatch`/`planLiteralGaps`.

  FILE 2 — packages/sdk-ts/src/index.ts (EDIT — add ONE re-export line next to the other `./chain/*`
  re-exports, around the existing `export { advanceChain, deriveChainStatus } from "./chain/advance.js";` /
  `export { renderChainTrace } from "./chain/trace.js";` lines):

    export { classifyPlanGateFailure, PLAN_GATE_INFRA_REASON_PREFIXES } from "./chain/plan-gate-failure.js";

  Do NOT change any other export or reorder the barrel.

  FILE 3 — packages/sdk-ts/test/chain/plan-gate-failure.test.ts (NEW Vitest file, ESM `.js` relative import of
  `{ classifyPlanGateFailure, PLAN_GATE_INFRA_REASON_PREFIXES } from "../../src/chain/plan-gate-failure.js"`).
  It MUST cover, using real `PlanVerdict` literals (graded by a grep — do not rephrase the calls or expected
  values):
    * a PROCEED verdict → `classifyPlanGateFailure(...)` returns `null` (assert `.toBeNull()`).
    * the exact F-33 transport ESCALATE — rationale
      `"plan meta-judge LLM call failed after 5 attempts: transport error: fetch failed"` →
      `{ kind: "infra", safeToReRun: true, ... }` (assert both `kind` `toBe("infra")` and `safeToReRun`
      `toBe(true)`).
    * a not-valid-JSON ESCALATE and a schema-validation ESCALATE (rationales beginning with the other two
      prefixes) → `kind: "infra"`, `safeToReRun: true`.
    * a SUBSTANTIVE coverage-floor REVISE — rationale
      `"plan leaves goal criteria uncovered: AC-1, AC-2"` → `{ kind: "substantive", safeToReRun: false }`
      (assert `safeToReRun` `toBe(false)`).
    * the ANCHOR discriminator: a substantive ESCALATE whose rationale merely CONTAINS an infra phrase mid-text
      (e.g. `"the plan proposes to test that the reply failed schema validation path works"`) is classified
      `substantive` / `safeToReRun: false`, NOT infra — proving `startsWith`, not `includes`.
    * no-mutation: snapshot the input verdict (e.g. `structuredClone` or a field copy) and assert it is
      unchanged after the call.
    * `PLAN_GATE_INFRA_REASON_PREFIXES` has length 3.

  Keep everything additive. The `planAndGateChain` consumer wire and the Plan-persistence/resume half are the
  separate WP-233(b) §4 follow-ups; do not add them here.
repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true
acceptance_criteria:
