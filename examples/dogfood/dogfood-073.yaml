name: dogfood-073-wp233b-plan-gate-notice-wire
goal: >
  Land the plan-gate FAILURE NOTICE RENDERER for the durable chain planning layer AND WIRE it (with the
  dogfood-072 `classifyPlanGateFailure` classifier) into `planAndGateChain` — WP-233(b) part 1, the F-33
  operator-facing fix. Today `planAndGateChain` (`src/cli/chain.ts`) folds EVERY non-PROCEED plan-gate verdict
  into `message: gated.verdict.rationale`, so an operator cannot tell an UNREACHABLE meta-judge (an infra fault
  — SAFE to re-run) from a genuinely REJECTED plan. This run builds a PURE renderer that turns a
  `PlanGateFailureClass` (from the landed `classifyPlanGateFailure`) into an operator-facing notice carrying the
  correct re-run guidance, then wires it at the gate-failure return so the distinction is visible. This run does
  NOT build the Plan-persistence/resume half (WP-233(b) part 2, a SEPARATE §4 follow-up). Change exactly ONE new
  module, ONE new test, and TWO existing files (the barrel `src/index.ts`, one added re-export line; and
  `src/cli/chain.ts`, the consumer wire). Add no new dependency, and do NOT touch `types.ts`, any contract,
  `meta-judge-harness.ts`, `plan-gate-failure.ts`, or any other existing file. Use strict TypeScript, ESM `.js`
  relative imports, named exports only, NO default exports, and keep the renderer PURE (no I/O, clock,
  randomness, or input mutation). Run Devbox verification commands sequentially with bare `pnpm exec`. If a
  verification step reports a failing test or type error, READ the failure and fix the IMPLEMENTATION so every
  mandated assertion passes — do NOT weaken, rephrase, or remove any mandated assertion.

  FILE 1 — packages/sdk-ts/src/chain/plan-gate-notice.ts (NEW). Import the classifier's result type only:

    import type { PlanGateFailureClass } from "./plan-gate-failure.js";

  Export the pure renderer:

    * `export function renderPlanGateFailureNotice(cls: PlanGateFailureClass): string` — behavior:
        - When `cls.kind === "infra"`, return a single-line notice that STARTS WITH the EXACT string
          `"plan gate could not reach the meta-judge — INFRA fault, SAFE to re-run: "` followed by `cls.reason`.
        - When `cls.kind === "substantive"`, return a single-line notice that STARTS WITH the EXACT string
          `"plan gate REJECTED the plan — NOT safe to re-run as-is: "` followed by `cls.reason`.
        - Do NOT mutate the input `cls`. Do NOT re-inspect the rationale — branch ONLY on `cls.kind` (the
          classification is authoritative; `renderPlanGateFailureNotice` trusts `classifyPlanGateFailure`).
      Add a JSDoc block citing WP-233(b) and the F-33 operator-facing conflation it resolves, and note it
      consumes the WP-233(a) `classifyPlanGateFailure` classifier.

  FILE 2 — packages/sdk-ts/src/index.ts (EDIT — add ONE re-export line next to the existing
  `export { classifyPlanGateFailure, PLAN_GATE_INFRA_REASON_PREFIXES } from "./chain/plan-gate-failure.js";`):

    export { renderPlanGateFailureNotice } from "./chain/plan-gate-notice.js";

  Do NOT change any other export or reorder the barrel.

  FILE 3 — packages/sdk-ts/src/cli/chain.ts (EDIT — the CONSUMER WIRE). Add the imports (top of file, next to the
  other `../` / `./` imports):

    import { classifyPlanGateFailure } from "../chain/plan-gate-failure.js";
    import { renderPlanGateFailureNotice } from "../chain/plan-gate-notice.js";

  In `planAndGateChain`, at the gate-failure return (the existing
  `if (gated.verdict.kind !== "PROCEED") { return { ok: false, phase: "gate", message: gated.verdict.rationale, verdict: gated.verdict, costUsd }; }`),
  compute the classified notice and use it as the `message`, falling back to the raw rationale only when the
  classifier returns null:

    const failureClass = classifyPlanGateFailure(gated.verdict);
    const message = failureClass ? renderPlanGateFailureNotice(failureClass) : gated.verdict.rationale;

  and return `{ ok: false, phase: "gate", message, verdict: gated.verdict, costUsd }`. Do NOT change any other
  return, the `phase: "plan"` branches, the `FamilyDiversityError` branch, or the PROCEED path.

  FILE 4 — packages/sdk-ts/test/chain/plan-gate-notice.test.ts (NEW Vitest file, ESM `.js` relative imports of
  `{ renderPlanGateFailureNotice } from "../../src/chain/plan-gate-notice.js"`,
  `{ classifyPlanGateFailure } from "../../src/chain/plan-gate-failure.js"`, and
  `type { PlanVerdict } from "../../src/types.js"`). Grade with REAL `PlanVerdict` literals composed through the
  classifier — do NOT hand-build `PlanGateFailureClass` stubs. It MUST cover:
    * the F-33 transport ESCALATE — rationale
      `"plan meta-judge LLM call failed after 5 attempts: transport error: fetch failed"` → pass through
      `classifyPlanGateFailure` → `renderPlanGateFailureNotice` → assert the result `.toContain("SAFE to re-run")`
      AND `.toContain("transport error: fetch failed")` (the reason is preserved).
    * a SUBSTANTIVE coverage-floor REVISE — rationale `"plan leaves goal criteria uncovered: AC-1, AC-2"` → pass
      through both functions → assert the result `.toContain("NOT safe to re-run")` AND
      `.toContain("plan leaves goal criteria uncovered")`.
    * polarity: assert the infra notice does NOT contain `"REJECTED"` and the substantive notice does NOT
      contain `"could not reach the meta-judge"` (the two branches never cross).
    * no-mutation: build a `PlanGateFailureClass` via `classifyPlanGateFailure`, snapshot it (field copy or
      `structuredClone`), call `renderPlanGateFailureNotice`, and assert the class object is unchanged.

  Keep everything additive except the single `chain.ts` message computation. The Plan-persistence/resume half is
  the separate WP-233(b) part 2 §4 follow-up; do not add it here.
