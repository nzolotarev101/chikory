#   * §1.1 Failure-surface: ✅ — a genuine 2-node chain (node B imports node A's symbol via the WP-239
#     handoff), launched with `chikory chain`, on the durable-execution thesis pillar; plausibly fails
#     (dogfood-041 burned 5 attempts on the chain path; planner-decompose + meta-judge gate are real
