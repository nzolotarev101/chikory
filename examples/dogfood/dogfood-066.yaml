name: dogfood-066-chain-wp256-spec-staleness
goal: >
  Implement exactly two sequential, diff-producing deliverables in packages/sdk-ts that together build
  the WP-256 launch-time spec-staleness gate (the fix for dogfood-065 F-60: a dogfood whose target WP is
  already done must be detectable before it runs). The second deliverable MUST depend on and import code
  from the first; do not combine them into one node, do not make them independent, and do not add a
  verification-only node. A strict acceptance test gates each node, and the real-time judge runs that
  test after every step (cadence 1). Use strict TypeScript, ESM `.js` relative imports, named exports
  only, NO default exports, no I/O / network / clock / randomness, no new dependencies. Do NOT change
  contracts, schemas, `types.ts`, the chain runner, the CLI command wiring, the barrel `src/index.ts`,
  or any unrelated file. Run project commands sequentially inside the existing Devbox environment. If a
  verification step reports a failing test or type error, READ the failure and fix the IMPLEMENTATION so
  every mandated assertion passes — do NOT weaken, rephrase, or remove any mandated assertion (a grep
  enforces them).

  Node A (independent predecessor): add a NEW pure module at
  packages/sdk-ts/src/cli/wp-status.ts that extracts a work-package's status icon from the plan.md
  markdown text. Export a status type and a pure parser (named exports only):

    export type WpStatus = "red" | "yellow" | "green";
    export function parseWpStatus(planText: string, wpId: string): WpStatus | null;

  Semantics (exact):
    * Split `planText` into lines. A WP STATUS lives only in a markdown TABLE ROW whose FIRST cell is
      the work-package id — a line that, after trimming, starts with `|`, and whose first pipe-delimited
      cell trims to EXACTLY `wpId`. A prose mention of the id (e.g. in a status paragraph) is NOT a
      match. The id match is EXACT: querying `WP-255` must NOT match a `WP-25` row and vice-versa.
    * For the FIRST matching row, read the THIRD pipe-delimited cell (the status column: row cells are
      `| <id> | <name> | <status> | <notes> |`) and return `"red"` if it contains 🔴, `"yellow"` if it
      contains 🟡, `"green"` if it contains 🟢. (Notes cells also contain those emojis — read the status
      cell only, never the notes.)
    * Return `null` when no table row matches `wpId`, or the matched row's status cell holds none of the
      three icons.
    * Pure: do not mutate inputs; read only. Add a short JSDoc.
  Add packages/sdk-ts/test/cli/wp-status.test.ts (NEW Vitest file, ESM `.js` relative import from
  `../../src/cli/wp-status.js`) encoding AT LEAST these cases verbatim (graded by a grep — do not
  rephrase the call or the expected literal): a 🟢 row for `WP-255` → `"green"`; a 🟡 row → `"yellow"`;
  a 🔴 row → `"red"`; the EXACT-MATCH discriminator — a fixture containing BOTH a `| WP-25 | … | 🔴 | …`
  row and a `| WP-255 | … | 🟢 | …` row, where `parseWpStatus(fixture, "WP-255")` returns `"green"`
  (NOT red); a prose-only mention of `WP-255` (no table row) → `null`; an absent id → `null`. Touch only
  those two files.

  Node B (dependent consumer): only after node A seals SUCCESS, add a NEW pure module at
  packages/sdk-ts/src/cli/spec-staleness.ts. It MUST `import { parseWpStatus, type WpStatus } from
  "./wp-status.js";` (node A's `wp-status.ts` is already present in node B's workspace via the WP-239
  handoff — build on it, do NOT recreate or reimplement it). Export (named exports only):

    export interface SpecStalenessInput { targetWpId: string; planText: string; }
    export interface SpecStalenessReport {
      targetWpId: string;
      status: WpStatus | null;
      stale: boolean;
      reason: string;
    }
    export function assessSpecStaleness(input: SpecStalenessInput): SpecStalenessReport;

  Semantics (exact): `status = parseWpStatus(input.planText, input.targetWpId)`; `stale = status ===
  "green"` (a dogfood targeting an already-🟢 work package is STALE — the F-60 condition); `reason` is a
  short human string — when status is null: `target <id> not found in plan`; when green:
  `target <id> already done (🟢) — spec is stale`; otherwise: `target <id> is <status> — spec is fresh`.
  Return `{ targetWpId, status, stale, reason }`. Pure; do not mutate inputs. Add a short JSDoc.
  Add packages/sdk-ts/test/cli/spec-staleness.test.ts (NEW Vitest file) encoding AT LEAST these cases
  verbatim (graded by a grep): a 🟢 row for the target → `stale === true`; a 🟡 row for the target →
  `stale === false`; an absent target → `status === null` and `stale === false`. Touch only those two
  files.

  Keep both functions pure and minimal. Build node B ON node A's handed-off module — the acceptance
  check greps `spec-staleness.ts` for `parseWpStatus`, so node B must IMPORT and CALL node A's parser,
  not duplicate it.
repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true
acceptance_criteria:
  - id: AC-1
    description: >
      independent node A adds only the wp-status module/test, exports `parseWpStatus` returning the
      red/yellow/green status of a WP's table row (exact-id, status-column, prose/absent → null), its
      mandated cases are present verbatim (grep-pinned, F-49), its focused test passes, and the SDK stays
      type- and lint-clean.
    check: >
      cd packages/sdk-ts &&
      grep -q "parseWpStatus" src/cli/wp-status.ts &&
      grep -q "parseWpStatus" test/cli/wp-status.test.ts &&
      grep -q '"green"' test/cli/wp-status.test.ts &&
      grep -q '"yellow"' test/cli/wp-status.test.ts &&
      grep -q '"red"' test/cli/wp-status.test.ts &&
      grep -q "WP-25" test/cli/wp-status.test.ts &&
      pnpm exec vitest run test/cli/wp-status.test.ts &&
      pnpm exec tsc --noEmit && pnpm exec eslint .
  - id: AC-2
    description: >
      dependent node B adds only the spec-staleness module/test, IMPORTS node A's `parseWpStatus` (the
      WP-239 handoff — grep-pinned in the source so it cannot be reimplemented), exports
      `assessSpecStaleness` returning `stale === true` exactly when the target WP is already 🟢, its
      mandated cases are present verbatim, its focused test passes, and the SDK stays type- and
      lint-clean.
    check: >
      cd packages/sdk-ts &&
      grep -q "parseWpStatus" src/cli/spec-staleness.ts &&
      grep -q "assessSpecStaleness" src/cli/spec-staleness.ts &&
      grep -q "assessSpecStaleness" test/cli/spec-staleness.test.ts &&
      grep -q "stale" test/cli/spec-staleness.test.ts &&
      grep -q "true" test/cli/spec-staleness.test.ts &&
      grep -q "false" test/cli/spec-staleness.test.ts &&
      pnpm exec vitest run test/cli/spec-staleness.test.ts &&
      pnpm exec tsc --noEmit && pnpm exec eslint .
