#     prose mention of the WP must NOT match), EXACT wpId-cell match (`WP-25` must not match `WP-255`),
#     3rd-column status extraction, emoji→enum mapping, not-found→null, no input mutation.
#   * §1.2 Product-progress: ✅ — the landed diff advances REAL open plan.md §6 WP-256 (🔴, the F-60 fix
#     queued by THIS review): the launch-time staleness decision that would have refused dogfood-065. The
