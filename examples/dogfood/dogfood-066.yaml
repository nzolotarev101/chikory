# Launch with `chikory chain` (durable multi-node chain, NOT a single `run`).
#
# WHY THIS IS NEXT (2026-06-29): dogfood-065 review found the pure-first headline cadence is EXHAUSTED
# and now actively HARMFUL — WP-254 and WP-255 both landed 🟢 (operator §4 follow-ups), and dogfood-065's
