name: dogfood-065-wp255-step-deadline
goal: >
  Land the pure STEP-DEADLINE telemetry descriptor half of WP-255 (the loop-integrity / cost-control
  reliability surface). dogfood-064's step was killed for exceeding its `maxSeconds=600` wall-clock cap
  but ran 24m32s = 2.45× the cap before it died, and the kill zeroed its token/cost telemetry so the
  trace shows only `0/0` tokens and `$0.00` — the overrun is INVISIBLE (F-59). This adds the pure value
  the killed-step journal entry and `chikory trace` SHOULD render to make an overrun observable: the
  elapsed wall-clock, whether it overran the cap, by what ratio (the 2.45× figure), and the remaining
  budget. Change exactly these THREE files; change no other file, add no new dependency, and do NOT
  touch `types.ts` or any contract. Do NOT modify `runBounded`/`process.ts`, the executor adapters, or
  the agent loop — the tree-reap and the killed-step journal wire are the SEPARATE §4 follow-ups.

  1. packages/sdk-ts/src/runner/step-deadline.ts  (NEW FILE — a pure module, the `pacing.ts` /
     `seam-precheck.ts` pure-decision analog)
     - Add an exported input type (LOCAL to this module — do NOT add it to `types.ts`):
         /** WP-255: the wall-clock facts of a step that hit (or may hit) its per-step `maxSeconds`
          * cap. `startedAtMs` and `endedAtMs` are epoch-millisecond timestamps (the runner's step
          * start and the moment it stopped/was killed); `maxSeconds` is the per-step wall-clock cap
          * (`StepLimits.maxSeconds`). */
         export interface StepDeadlineInput {
           startedAtMs: number;
           endedAtMs: number;
           maxSeconds: number;
         }
     - Add an exported result type (LOCAL to this module):
         /** WP-255: the derived deadline telemetry the killed-step journal entry + `chikory trace`
          * render so a cap overrun is VISIBLE instead of masked by zeroed token/cost counters. */
         export interface StepDeadlineStatus {
           elapsedSeconds: number;
           maxSeconds: number;
           overran: boolean;
           remainingSeconds: number;
           overrunRatio: number;
         }
     - Add the pure descriptor with the same short JSDoc shape the existing pacing helper carries:
         export function describeStepDeadline(input: StepDeadlineInput): StepDeadlineStatus
       Semantics (exact):
         * `elapsedSeconds` = `(endedAtMs - startedAtMs) / 1000`, CLAMPED to be at least 0 (a negative
           span from clock skew or a bad timestamp reads 0, never negative). Do NOT round — return the
           exact fractional seconds.
         * `maxSeconds` = the input `maxSeconds`, passed through unchanged.
         * `overran` = `elapsedSeconds > maxSeconds` (STRICTLY greater — a step that ends exactly at the
           cap did NOT overrun).
         * `remainingSeconds` = `maxSeconds - elapsedSeconds`, CLAMPED to be at least 0 (an overrun
           reads 0 remaining, never negative).
         * `overrunRatio` = `elapsedSeconds / maxSeconds`, GUARDED: when `maxSeconds` is 0 (or negative)
           return `0` instead of dividing (no `Infinity`/`NaN`). A step that ran 2.45× its cap reads
           `2.45...` here.
         * Pure: do NOT mutate `input`; read only.

  2. packages/sdk-ts/src/index.ts  (extend the barrel — add a NEW re-export only)
     - Add a re-export of `describeStepDeadline` and `type StepDeadlineInput`, `type StepDeadlineStatus`
       from `./runner/step-deadline.js`, following the existing pacing / `summarizePacing` re-export
       style (a named `export { … } from "./runner/step-deadline.js";` statement). Change nothing else
       in the barrel; do NOT alter any existing export.

  3. packages/sdk-ts/test/runner/step-deadline.test.ts  (NEW FILE — follow the existing
     `pacing.test.ts` structure)
     - Add focused cases proving: (a) the F-59 overrun — `startedAtMs: 0`, `endedAtMs: 1_472_000`,
       `maxSeconds: 600` → `elapsedSeconds 1472`, `overran true`, `remainingSeconds 0`, and
       `overrunRatio` ≈ `2.4533…` (assert with `toBeCloseTo`); (b) an UNDER-cap step —
       `endedAtMs: 300_000`, `maxSeconds: 600` → `elapsedSeconds 300`, `overran false`,
       `remainingSeconds 300`, `overrunRatio 0.5`; (c) the EXACTLY-AT-cap boundary —
       `endedAtMs: 600_000`, `maxSeconds: 600` → `overran false`, `remainingSeconds 0`,
       `overrunRatio 1`; (d) a NEGATIVE span (clock skew, `endedAtMs` < `startedAtMs`) clamps
       `elapsedSeconds` to 0, `remainingSeconds` to `maxSeconds`, `overran false`, `overrunRatio 0`;
       (e) the `maxSeconds: 0` guard returns `overrunRatio 0` (NOT `Infinity`/`NaN`); (f) the input
       object is NOT mutated (snapshot the input, call the descriptor, assert `toEqual` the snapshot).
       Follow the existing `pacing.test.ts` structure; this is a new file, so import
       `describeStepDeadline` (and the types as needed) from `../../src/runner/step-deadline.js`.

  Follow AGENTS.md and the sdk-ts conventions: strict TypeScript, ESM, named exports only, no default
  export, no new dependency, no `types.ts`/contract change. Run all Devbox verification commands
  sequentially. If a verification step reports a failing test or type error, READ the failure, fix the
  code, and continue — do NOT weaken, rephrase, or remove any mandated assertion (a grep enforces the
  symbols), and do NOT modify `runBounded`/`process.ts`, the executor adapters, or the agent loop.
