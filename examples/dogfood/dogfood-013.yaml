# Dogfood-013: WP-208 slice 2 — pure `slackPayloadFor` formatter
# (plan.md §6; second slice of WP-208 "checkpoint notifications"). Slice 1
# (dogfood-012, run-ea31f96c) added the pure `notificationsFor` derivation
# (JournalEntry[] + NotificationPolicy → ordered Notification[]). This slice
# adds the next PURE half of delivery: a function that maps a single
# `Notification` to the Slack message body `{ text }` the webhook POST will
# carry, with a trigger-specific emoji prefix. The actual side-effectful
# delivery (the `fetch` to the `slackWebhookEnv` webhook, desktop ping) and
# the runner call-site that invokes notificationsFor + dispatches are DEFERRED
# to slice 3 (non-pure — touches the runner loop). Same pure-derivation shape
# as dogfood-010/011/012 and WP-225: two files, no contracts, no journal kind,
# no product wiring.
#
# Picked because it is the next 🟢/no-contracts slice off the §6 queue (the
# WP-209 trace-footer vein is exhausted; WP-209 OTel + the queue-head
# WP-219/WP-221/WP-218-s2 are design- or contract-gated, hand-done first per
# TASK-PROTOCOL §4). slice 3's delivery is non-pure, so this pure formatter is
# the last 🟢 slice of WP-208.
#
# ⚠ PRECONDITION — STRICT: dogfood-012 (WP-208 slice 1) MUST be committed on
# HEAD before launching. The run workspace clones HEAD, and this slice imports
# the `Notification` TYPE from `./notifications.js`; if notifications.ts is
# still uncommitted in the working tree the clone will not contain it and the
# import (and AC-3 typecheck) will fail. Commit
# packages/sdk-ts/src/runner/notifications.ts + its test (and this report)
# first.
#
# Zero-secrets launch (locally-authenticated CLIs; see DOGFOODING.md §2.2/§3.8):
#   node scripts/cli-judge-proxy.mjs 8787 gemini &
#   OPENAI_COMPAT_BASE_URL=http://127.0.0.1:8787 pnpm chikory run examples/dogfood/dogfood-013.yaml --watch
#
# ⚠ Commit everything before launching — the run workspace clones HEAD.
name: dogfood-013-wp-208-slack-payload-for
goal: >
  Implement WP-208 slice 2 (plan.md §6): add a PURE Slack-payload formatter.
  Exactly two NEW files are created and nothing else changes — in particular
  DO NOT touch types.ts, schemas.ts, taskspec.ts, the runner/ agent loop,
  notifications.ts (slice 1, already on HEAD), any existing src file, or any
  existing test, and add no dependency. Do NOT perform any network/IO — this
  slice is pure formatting only; the actual webhook POST and the runner
  call-site are a later slice.

  Create packages/sdk-ts/src/runner/notification-delivery.ts exporting:

    export function slackPayloadFor(notification: Notification): { text: string }

  Import the `Notification` interface as a TYPE import from
  "./notifications.js" (it was added by slice 1 and is on HEAD). The function
  returns a Slack message body whose `text` is the notification's `message`
  prefixed by a trigger-specific emoji and a single space:

    - trigger === "escalate" → `🚨 ${message}`
    - trigger === "milestone" → `✅ ${message}`
    - trigger === "terminal" → `🏁 ${message}`

  Implement the emoji lookup as a `const` record typed
  `Record<Notification["trigger"], string>` mapping
  { escalate: "🚨", milestone: "✅", terminal: "🏁" }, then return
  `{ text: `${EMOJI[notification.trigger]} ${notification.message}` }`. Do not
  handle any other trigger value (the union is exhaustive) and add no other
  exports.

  Create packages/sdk-ts/test/runner/notification-delivery.test.ts — a PURE
  unit test (no Temporal, no runner harness; it must pass standalone) using
  vitest (`import { describe, expect, test } from "vitest";`). Import
  `slackPayloadFor` from "../../src/runner/notification-delivery.js". Add
  exactly three tests in a `describe("slackPayloadFor (WP-208)", …)` block,
  each constructing a minimal `Notification` inline and asserting `toEqual`:
    1. { trigger: "escalate", atStep: 1, message: "ESCALATE at step 1: needs human" }
       → { text: "🚨 ESCALATE at step 1: needs human" }
    2. { trigger: "milestone", atStep: 2, message: "milestone PROCEED at step 2" }
       → { text: "✅ milestone PROCEED at step 2" }
    3. { trigger: "terminal", atStep: null, message: "terminal: SUCCESS" }
       → { text: "🏁 terminal: SUCCESS" }
  Import the `Notification` type from "../../src/runner/notifications.js" if
  you annotate the fixtures.

  Follow AGENTS.md conventions: strict TypeScript, ESM imports with `.js`
  extensions, named exports only, no default export.
repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true
acceptance_criteria:
  # Judge-executed in the run workspace (fresh clone), bare pnpm, 120 s cap
  # per check. The Temporal global-setup skips when the `temporal` binary is
  # absent (the clone has no devbox), so the pure tests run in well under a
  # second; install dominates AC-1. Host-timed 2026-06-13 on the identical
  # surface: notification-delivery test ≈ 1.3 s, notifications + trace ≈ 2.4 s,
  # typecheck + lint ≈ 4 s.
  - id: AC-1
    description: >
      the new slackPayloadFor unit tests pass (escalate/milestone/terminal
      emoji-prefixed Slack payloads)
    check: pnpm install --prefer-offline --silent && pnpm --filter @chikory/sdk exec vitest run test/runner/notification-delivery.test.ts
  - id: AC-2
    description: >
      slice 1 and the CLI surface are untouched — the notificationsFor tests
      and the trace suite still pass (the new module has no call-sites, so
      nothing else can change)
    check: pnpm --filter @chikory/sdk exec vitest run test/runner/notifications.test.ts test/cli/trace.test.ts
  - id: AC-3
    description: strict typecheck and lint are clean
    check: pnpm --filter @chikory/sdk typecheck && pnpm --filter @chikory/sdk lint
budget_usd: 5
max_steps: 4
