# Dogfood-021: WP-221 Slice B — runner detects the executor's completion claim
# (dogfood-003/018/019/020 F-11; the cost win, every run taxed 5–35%).
#
# WHY THIS IS THE PRIORITY: every run pays an empty-diff "completion probe" step
# (F-11) — 19 data points, 5.4%–35.1% of run cost — because the productive step
# emits no completion signal, so the loop takes one more no-op step that the
# judge then grades. Slice A (dogfood-019) already made the trigger honor it:
# `isCompletionMilestone(record)` fires an off-cadence judge pass when
# `record.status === "SUCCESS" && (diffRef.bytes === 0 || claimsComplete === true)`.
# Nothing sets `claimsComplete` yet — this slice does, end-to-end.
#
# HAND-DONE FIRST (already landed at HEAD — do NOT re-touch): the vendor-neutral
# completion-marker protocol. `COMPLETION_MARKER` ("CHIKORY_TASK_COMPLETE") is
# exported from src/executors/step.ts, and renderStepPrompt (src/executors/prompt.ts)
# instructs the wrapped agent to end its final message with that line iff the task
# is fully complete. This slice implements the runner-side CONSUMPTION only.
#
# Zero-secrets launch:
#   node scripts/cli-judge-proxy.mjs 8787 gemini &
#   OPENAI_COMPAT_BASE_URL=http://127.0.0.1:8787 pnpm chikory run examples/dogfood/dogfood-021.yaml --watch
#
# Commit the dogfood-020 docs AND the hand-done protocol scaffold (step.ts marker
# + prompt.ts instruction) before launching; workspaces clone HEAD, so the run
# must see `COMPLETION_MARKER`. Launch ONCE and watch to terminal (F-30). Run
# Devbox commands sequentially (F-22).
name: dogfood-021-wp-221-completion-claim-detection
goal: >
  Implement WP-221 Slice B: make `runCliStep` detect the executor's completion
  marker and populate `StepRecord.claimsComplete`, so the already-wired
  `isCompletionMilestone` (Slice A) judges the productive step directly and the
  empty-diff probe step (F-11) disappears. The completion-marker protocol is
  already landed by hand — `COMPLETION_MARKER` is exported from
  packages/sdk-ts/src/executors/step.ts and the step prompt already instructs the
  agent to emit it. Do NOT modify prompt.ts, the `COMPLETION_MARKER` value, or any
  contract/type/schema/journal format. Add no dependency. Modify exactly two source
  files and add exactly one new test file.

  1. packages/sdk-ts/src/executors/step.ts — add an exported pure function
     `claimsCompleteFromSummary(summary: string): boolean` that returns true iff at
     least one line of `summary` (split on newlines, each line trimmed) equals
     `COMPLETION_MARKER` exactly. A bare substring match inside a longer line must
     NOT count — the marker must stand alone on its own line (per the prompt
     contract). Keep it pure (no I/O, no mutation); give it a short JSDoc citing
     WP-221 and F-11. Then, in the SUCCESS branch where the record is built
     (`record = { ...base, status: "SUCCESS" }`), set
     `claimsComplete: claimsCompleteFromSummary(parsed.summary)`. Do NOT set
     `claimsComplete` on the FAILED branches (a failed step's completion claim is
     moot, and `isCompletionMilestone` already gates on SUCCESS). Change nothing
     else in the file.

  2. packages/sdk-ts/src/executors/index.ts — re-export `claimsCompleteFromSummary`
     and `COMPLETION_MARKER` from the existing
     `export { ... } from "./step.js";` block (the one that already re-exports
     `runCliStep`, `SPAN_STEP`, `ParsedCliResult`). Add nothing else.

  3. packages/sdk-ts/test/executors/completion-marker.test.ts (new) — unit-test
     `claimsCompleteFromSummary`, importing it and `COMPLETION_MARKER` from
     "../../src/executors/step.js". Cover and assert each case:
       - a summary that is exactly the marker → true;
       - the marker on its own line after other text
         (e.g. `"Implemented the feature.\n" + COMPLETION_MARKER`) → true;
       - the marker on its own line but indented / trailing-whitespaced
         (e.g. `"   " + COMPLETION_MARKER + "  "`) → true (trimmed match);
       - an empty summary → false;
       - the marker as a substring inside a sentence
         (e.g. `"I will emit " + COMPLETION_MARKER + " once tests pass"`) → false;
       - a normal summary with no marker → false.
     Build the marker strings from the imported `COMPLETION_MARKER` constant (do
     not hardcode the literal), so the test tracks the protocol if the value changes.

  After this slice, a step whose agent emits the marker yields
  `record.claimsComplete === true`, `isCompletionMilestone` fires the judge on that
  productive step, and a PROCEED with all criteria passing seals SUCCESS without the
  extra probe step. (An end-to-end agent-loop test that asserts the probe step is
  gone needs a fake executor that emits the marker through the loop — that is a
  documented follow-up, out of scope for this deterministic unit slice.)

  Follow AGENTS.md: strict TypeScript, ESM `.js` import extensions, named exports
  only, no `any`, run all Devbox verification commands sequentially. The typecheck
  gate now type-checks test/** (WP-230), so the new test must be type-correct.
repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true
acceptance_criteria:
  - id: AC-1
    description: >
      the new completion-marker detection test passes (all cases)
    check: pnpm install --prefer-offline --silent && pnpm --filter @chikory/sdk exec vitest run test/executors/completion-marker.test.ts
  - id: AC-2
    description: >
      the complete TypeScript SDK suite remains green — proving the new
      claimsComplete threading breaks no adapter/conformance behavior
    check: pnpm --filter @chikory/sdk test
  - id: AC-3
    description: strict typecheck (now covering test/**, WP-230) and lint are clean
    check: pnpm --filter @chikory/sdk typecheck && pnpm --filter @chikory/sdk lint
budget_usd: 5
max_steps: 4
executor:
  adapter: codex
  family: openai
judge:
  family: openai-compat
  cadence: 2
  max_cost_share: 0.5
routing:
  stages:
    plan: { provider: openai-compat, model: gpt-5.5 }
    code: { provider: openai-compat, model: gpt-5.5 }
    review: { provider: openai-compat, model: gpt-5.5 }
    judge: { provider: openai-compat, model: gemini-3.1-pro-preview }
