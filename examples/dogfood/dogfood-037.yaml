# Dogfood-037: WP-219 S6 — the PURE chain-trace renderer. Implement
# `renderChainTrace(record, entries)` in `packages/sdk-ts/src/chain/trace.ts`,
# the chain-level analog of the per-run `renderTrace` (`src/cli/trace.ts`):
# render a `ChainRecord` (plan tree + per-node run + outcome) as legible text.
#
# WHY THIS IS THE PRIORITY (refocused 2026-06-20): the dogfood queue had drifted
# into mechanical WP-201 parity ports (dogfood-035/036, and the WP-207 pacing
# parity this spec used to hold). The real critical path is the WP-219 durable
# chain executor (ADR-005 §S3). The S3-pure reducer landed (dogfood-038), and the
# S3-WIRING substrate was just hand-landed (TASK-PROTOCOL §4): the chain store
# (`ChainJournal`/`chainRecordFrom`, `src/chain/store.ts`), the `chainLoop`
# Temporal workflow, and the chain activities that emit `node_started`/
# `node_sealed`. That substrate UNBLOCKS S6 — there is now a chain journal to
# render. S6 is the one DOGFOODABLE pure slice that falls out of the chain
# executor (ADR-005 §Consequences marks it "🟢"): the chain's forensics surface,
# the chain analog of `chikory trace`, and a P2-exit-gate input (the 24h chain
# must be legible in trace). It is the sibling of the landed pure per-run
# renderer and of the WP-203 S4 compaction-trace case (dogfood-026).
#
# Zero-secrets launch:
#   node scripts/cli-judge-proxy.mjs 8787 gemini &
#   OPENAI_COMPAT_BASE_URL=http://127.0.0.1:8787 pnpm chikory run examples/dogfood/dogfood-037.yaml --watch
#
# Commit everything before launching — workspaces clone HEAD, so the run MUST see
# the hand-landed S3-wiring substrate (`src/chain/store.ts` exporting
# `ChainJournal`/`chainRecordFrom`/`ChainEntry`, the frozen `ChainRecord`/
# `NodeOutcome` contract, and `src/chain/advance.ts` from dogfood-038). If those
# are still uncommitted on the working tree, commit them first or the run sees a
# tree without the types this slice consumes. Launch ONCE and watch to terminal
# (F-30). Run Devbox commands sequentially (F-22). F-11 is closed
# (dogfood-022..038): a clean one-step finish should seal SUCCESS with NO
# empty-diff probe step — watch the step count stay at 1.
name: dogfood-037-wp-219-s6-chain-trace-renderer
goal: >
  Implement the WP-219 S6 PURE chain-trace renderer — `renderChainTrace`, the
  chain-level analog of the per-run `renderTrace` (`src/cli/trace.ts`). Given a
  `ChainRecord` (the chain state — plan tree, node→run map, per-node outcomes)
  and the chain journal's `ChainEntry[]`, return a single multi-line string a
  person who didn't run the chain can read to reconstruct it. This is a pure
  string-building function with NO I/O.

  Do NOT make any LLM/router call, do NOT read/write the filesystem, do NOT touch
  the network, clock, or randomness, do NOT implement new runtime behavior in the
  chain executor / agent loop / runner / Temporal workflow, do NOT change
  `types.ts`, `schemas.ts`, or any contract model (the `ChainRecord` / `Plan` /
  `NodeOutcome` contract and the `ChainEntry` / `ChainJournal` store already
  landed — reuse them, do NOT redefine them), and do NOT add CLI command wiring
  (the `chikory trace` chain branch is the hand-design follow-up). Add exactly one
  new source file and one new test file, and edit exactly one existing file
  (`src/index.ts`) for the re-export — three files total, no other file changed.

  1. packages/sdk-ts/src/chain/trace.ts — a NEW pure module, TypeScript strict,
     ESM, named exports only, no default export. It must perform NO I/O, clock
     read, randomness, or input mutation. Import `ChainRecord` and `PlanNode`
     type-only from `../types.js`, and `ChainEntry` type-only from `./store.js`.
     JSDoc the export citing WP-219 / ADR-005 §S6. Mirror the pure-renderer shape
     of `src/cli/trace.ts` `renderTrace`:
       - `export function renderChainTrace(record: ChainRecord, entries: ChainEntry[]): string`
         — builds an array of lines joined by "\n", in this order:
           1. A header line:
              `chain <record.planId> · <record.status> · <N> nodes · <S>/<N> succeeded`
              where `N = record.plan.nodes.length` and `S` = the count of
              `record.plan.nodes` whose `record.nodeOutcomes[node.id]?.status`
              is `"SUCCESS"`.
           2. A `goal: <record.plan.goal>` line.
           3. A rule line of "─" repeated 60 times.
           4. One row per node in `record.plan.nodes` ORDER (not outcome order),
              each:
              `<nodeId> · depends-on <deps> · run <run> · <outcomeCell>`
              where `<deps>` is `node.dependsOn.join(",")` or `"—"` when empty;
              `<run>` is `record.nodeRuns[node.id]` or `"—"` when absent; and
              `<outcomeCell>` derives from `record.nodeOutcomes[node.id]`:
                - absent            → `· pending`
                - status "SUCCESS"  → `✓ SUCCESS (<verdict>)`
                - status "FAILED"   → `⛔ FAILED (<verdict>)`
              using the outcome's `verdict` (a `VerdictKind`) inside the parens.
           5. A totals footer line:
              `totals: nodes <N> · succeeded <S> · failed <F> · pending <P>`
              where `F` = nodes whose outcome status is `"FAILED"`, `P` = nodes
              with no outcome, and `N = S + F + P`.
           6. IF the chain journal holds a `terminal` `ChainEntry` whose payload
              `status === "FAILED"` with a non-empty `reason`, append a final
              line `failed: <reason>`. (Read the terminal entry from `entries`;
              a chain with no terminal entry, or a SUCCESS terminal, appends
              nothing.)
         Pure: reads only its two arguments, returns the joined string, no
         mutation, no I/O. Keep any small glyph/cell helper local and unexported.

  2. packages/sdk-ts/src/index.ts — re-export `renderChainTrace` from
     `./chain/trace.js`, alongside the existing chain re-exports (the
     `advanceChain` / `chainRecordFrom` block). Change nothing else.

  3. packages/sdk-ts/test/chain/trace.test.ts — a NEW vitest file importing
     `renderChainTrace` from the package barrel (`../../src/index.js`) and the
     `ChainRecord` / `ChainEntry` / `NodeOutcome` types from the barrel or
     `../../src/types.js` as needed. Build a small `ChainRecord` over a 3-node
     plan (`N-1` → `N-2` → `N-3` dependency chain) with a builder so the cases
     read clearly. Assert at least:
       - header — for a record with one SUCCESS outcome among 3 nodes, the first
         line contains `3 nodes` and `1/3 succeeded` and the record's `planId`
         and `status`.
       - node rows in plan order — the output lists `N-1`, `N-2`, `N-3` in that
         order; a node with a SUCCESS outcome renders `✓ SUCCESS (PROCEED)` and
         shows its `nodeRuns` run id; a node with no outcome renders `· pending`
         and `run —`; a node with no deps renders `depends-on —`.
       - failed node — a `{ status: "FAILED", verdict: "HALT" }` outcome renders
         `⛔ FAILED (HALT)`.
       - totals footer — `totals: nodes 3 · succeeded 1 · failed 1 · pending 1`
         for a record with one SUCCESS, one FAILED, one absent outcome.
       - terminal reason — when `entries` includes a `terminal` ChainEntry with
         `{ status: "FAILED", reason: "chain stuck" }`, the output ends with a
         `failed: chain stuck` line; when there is no terminal entry, no
         `failed:` line appears.

  After this slice, the chain has a pure, unit-tested forensics renderer — the
  `chikory trace` analog for a chain, ready for the non-pure CLI wiring (the
  `chikory trace <chain-id>` branch that loads the `ChainJournal` and calls
  `renderChainTrace`), which is the hand-design follow-up (TASK-PROTOCOL §4). No
  runtime behavior changes in this slice.

  Follow AGENTS.md: TypeScript strict, ESM, named exports, no default export, no
  new dependency. Run all Devbox verification commands sequentially.
repos:
