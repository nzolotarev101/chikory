    check: pnpm install --prefer-offline --silent && pnpm --filter @chikory/sdk exec vitest run test/chain/trace.test.ts
  - id: AC-2
    description: >
      the complete TypeScript SDK suite remains green — proving the new pure
      module breaks no existing behavior
