# Dogfood-037: WP-201 Python-SDK parity — port the PURE WP-207 context-window
# pacing helper (`decide_context_window_pacing`) to `packages/sdk-py`, the Python
# parity of the TS pure surface that landed in dogfood-031
# (`packages/sdk-ts/src/runner/pacing.ts`).
#
# WHY THIS IS THE PRIORITY: the WP-202 / CM-3 Memory Pointer pure surface now
# exists in BOTH SDKs (TS dogfood-028, Python dogfood-036 `run-51645fbb`). With
# the TS pure backlog thin, the standing dogfoodable thread is WP-201 Python
# parity (🟢, plan.md §6): vendor-neutral dual-SDK is a launch requirement and
# the core contracts already landed in `sdk-py` (dogfood-002 `run-2899005b`).
# WP-207 context-window pacing is a context-rot mitigation lever (project.md:
# model perf degrades over long sessions; first-class mitigation required) — the
# direct Python parity of dogfood-031's pure pacing decision, mirroring the
# source-of-truth TS module `packages/sdk-ts/src/runner/pacing.ts`. The
# dogfood-030/035/036 parity pattern exactly. No contract change — `pacing.ts`
# uses only LOCAL types (`ContextWindowUsage`/`ContextWindowPacingPolicy`/
# `ContextWindowPacingDecision`), none in `types.ts`, so the Python port keeps
# them local too.
#
# Zero-secrets launch:
#   node scripts/cli-judge-proxy.mjs 8787 gemini &
#   OPENAI_COMPAT_BASE_URL=http://127.0.0.1:8787 pnpm chikory run examples/dogfood/dogfood-037.yaml --watch
#
# Commit everything before launching — workspaces clone HEAD, so the run must
# see the dogfood-031 TS module (the parity source-of-truth). Launch ONCE and
# watch to terminal (F-30). Run Devbox commands sequentially (F-22). F-11 is
# closed (dogfood-022..036): a clean one-step finish should seal SUCCESS with NO
# empty-diff probe step — watch the step count stay at 1.
name: dogfood-037-wp-201-python-context-window-pacing-parity
goal: >
  Port the WP-207 PURE context-window pacing helper to the Python SDK (plan.md
  WP-201) — the Python parity of the TS module landed in dogfood-031
  (`packages/sdk-ts/src/runner/pacing.ts`, the source-of-truth artifact): a pure
  decision function that, given the current token usage and a pacing policy,
  decides whether the next local runner step should `continue`, trigger
  `compact`ion, or `park` (cannot fit). This is a pure arithmetic + branch
  decision with NO I/O.

  Do NOT make any LLM/router call, do NOT read/write the filesystem, do NOT touch
  the network, clock, or randomness, do NOT implement new runtime behavior in
  `runner.py`/`judge.py`/`router.py`, do NOT change `types.py` or any contract
  model, and do NOT add the non-pure agent-loop/journal integration (that is the
  hand-design follow-up). Add exactly one new source file and one new test file,
  and edit exactly one existing file (`__init__.py`) for the re-export — three
  files total, no other file changed.

  1. packages/sdk-py/src/chikory/pacing.py — a NEW pure module, Python 3.11+,
     fully type-annotated, async-free (pure sync), ruff-clean, no `Any`, no new
     dependency. Docstring each export citing WP-207 / WP-201. It must perform NO
     I/O, clock read, randomness, or input mutation, and must MIRROR the TS
     module `packages/sdk-ts/src/runner/pacing.ts` behavior exactly:
       - A `ContextWindowUsage` value with int fields `current_input_tokens`,
         `current_output_tokens`, `estimated_next_step_tokens`,
         `context_window_tokens` (the Python parity of the TS
         `ContextWindowUsage` interface; a `@dataclass(frozen=True)` is fine —
         keep it local to this module, do NOT add it to `types.py`).
       - A `ContextWindowPacingPolicy` value with a single float field
         `compact_at_fraction` (the parity of the TS interface; local
         `@dataclass(frozen=True)`).
       - A `ContextWindowPacingDecision` value with fields
         `action: Literal["continue", "compact", "park"]`,
         `projected_tokens: int`, `remaining_tokens: int`,
         `utilization: float` (the parity of the TS interface; local
         `@dataclass(frozen=True)`).
       - `def decide_context_window_pacing(usage: ContextWindowUsage, policy: ContextWindowPacingPolicy) -> ContextWindowPacingDecision:`
         — the parity of the TS `decideContextWindowPacing`. Compute
         `projected_tokens = usage.current_input_tokens + usage.current_output_tokens + usage.estimated_next_step_tokens`,
         `remaining_tokens = usage.context_window_tokens - projected_tokens`,
         `utilization = projected_tokens / usage.context_window_tokens`, and
         `compact_threshold = usage.context_window_tokens * policy.compact_at_fraction`.
         Then, in this exact order (the TS branch order):
           1. if `usage.estimated_next_step_tokens > usage.context_window_tokens`
              → `action="park"` (a single step cannot fit the whole window);
           2. elif `projected_tokens > compact_threshold` → `action="compact"`
              (strict `>`, the parity of the TS `>`);
           3. else → `action="continue"`.
         Every branch returns a decision carrying the same computed
         `projected_tokens` / `remaining_tokens` / `utilization`. Pure and
         deterministic, no I/O.

  2. packages/sdk-py/src/chikory/__init__.py — re-export
     `ContextWindowUsage`, `ContextWindowPacingPolicy`,
     `ContextWindowPacingDecision`, and `decide_context_window_pacing` from
     `.pacing`, following the existing re-export + `__all__` convention in that
     file (add them to `__all__`). Change nothing else.

  3. packages/sdk-py/tests/test_pacing.py — a NEW pytest file importing
     `ContextWindowUsage`, `ContextWindowPacingPolicy`,
     `ContextWindowPacingDecision`, and `decide_context_window_pacing` from
     `chikory`, asserting at least:
       - continue — with a policy `compact_at_fraction=0.8` and usage well under
         the threshold (e.g. input 1000, output 500, next 1000, window 10000),
         `action == "continue"`, and `projected_tokens == 2500`,
         `remaining_tokens == 7500`, `utilization == 0.25`;
       - compact — usage whose projected tokens exceed the compact threshold but
         whose next-step alone still fits the window (e.g. input 7000, output
         1000, next 1000, window 10000, fraction 0.8 → projected 9000 > 8000)
         → `action == "compact"`;
       - compact boundary — projected exactly AT the threshold continues
         (e.g. projected 8000 with threshold 8000 → `action == "continue"`,
         strict `>` not `>=`);
       - park — `estimated_next_step_tokens` greater than the whole window
         (e.g. next 12000, window 10000) → `action == "park"`, even when the
         other fields would otherwise read as compact/continue (the park branch
         takes precedence);
       - arithmetic — for one case assert `remaining_tokens` can be negative
         when projected exceeds the window, proving it is a raw subtraction, not
         clamped.

  After this slice, the WP-207 context-window pacing pure surface exists in BOTH
  SDKs as pure, unit-tested helpers — the TS/Python parity WP-201 requires —
  ready for the non-pure agent-loop integration + journal wiring, which is the
  hand-design follow-up (TASK-PROTOCOL §4). No runtime behavior changes in this
  slice.

  Follow AGENTS.md: Python 3.11+, fully type-annotated, ruff-clean (lint +
  format), pyright-clean, no new dependencies, no default mutable args. Run all
  Devbox verification commands sequentially.
repos:
