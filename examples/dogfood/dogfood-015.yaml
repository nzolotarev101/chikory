# Dogfood-015: WP-219 S3 pure half — `readyNodes` chain sequencing
# (plan.md §6; ADR-005 / docs/spec/ADR-005-goal-decomposition-run-chaining.md).
# The ADR-005 slice-1 contracts (Plan/PlanNode/ChainRecord, landed by hand in
# `d56f35a`) froze the types; this is the FIRST dogfood that codes against
# them. It carves the pure half of the S3 chain executor: the dependency-
# resolution primitive the executor loops on — given a Plan and the set of
# completed node ids, return the nodes that are ready to run next (all deps
# satisfied, not themselves done), preserving plan order. Pure function, no
# IO, no contracts change, two NEW files — same shape as dogfood-010…014.
#
# The non-pure S3 work (the chain executor that actually dispatches ready
# nodes as TaskSpec runs, carries checkpoint state forward, halts-and-replans)
# is a later, runner-touching slice; this pure primitive is its testable core.
#
# ⚠ PRECONDITION — STRICT: the ADR-005 slice-1 contracts MUST be on HEAD
# (commit `d56f35a` — `Plan`/`PlanNode` in `types.ts`). The run workspace
# clones HEAD; this slice imports those TYPES from `../types.js`. They are
# committed, so the precondition holds — just don't reset past `d56f35a`.
#
# Zero-secrets launch (locally-authenticated CLIs; see DOGFOODING.md §2.2/§3.8):
#   node scripts/cli-judge-proxy.mjs 8787 gemini &
#   OPENAI_COMPAT_BASE_URL=http://127.0.0.1:8787 pnpm chikory run examples/dogfood/dogfood-015.yaml --watch
#
# ⚠ Commit everything before launching — the run workspace clones HEAD.
name: dogfood-015-wp-219-ready-nodes
goal: >
  Implement WP-219 S3 pure half (plan.md §6; ADR-005): add a PURE chain-
  sequencing primitive. Exactly two NEW files are created and nothing else
  changes — in particular DO NOT touch types.ts, schemas.ts, taskspec.ts, the
  runner/ agent loop, or any existing src file or test, and add no dependency.
  Do NOT perform any network/IO — this is pure dependency resolution only; the
  chain executor that dispatches nodes as runs is a later, non-pure slice.

  Create packages/sdk-ts/src/chain/sequencing.ts exporting:

    export function readyNodes(plan: Plan, completed: string[]): PlanNode[]

  Import the `Plan` and `PlanNode` interfaces as TYPE imports from
  "../types.js" (they were added by the ADR-005 slice-1 contracts and are on
  HEAD). The function returns, in `plan.nodes` order, every node that is ready
  to run next: a node is ready iff it is NOT itself in `completed` AND every id
  in its `dependsOn` array IS in `completed`. Implement it as:

    const done = new Set(completed);
    return plan.nodes.filter(
      (node) => !done.has(node.id) && node.dependsOn.every((dep) => done.has(dep)),
    );

  Add no other exports.

  Create packages/sdk-ts/test/chain/sequencing.test.ts — a PURE unit test (no
  Temporal, no runner harness; it must pass standalone) using vitest
  (`import { describe, expect, test } from "vitest";`). Import `readyNodes`
  from "../../src/chain/sequencing.js" and the `Plan` type from
  "../../src/types.js". Build one inline `Plan` fixture with three nodes — N-1
  (dependsOn []), N-2 (dependsOn ["N-1"]), N-3 (dependsOn ["N-1","N-2"]) — each
  node a minimal `PlanNode` (id, goal, acceptanceCriteria: [{ id: "AC-1",
  description: "x" }], dependsOn, budgetUsd: 5), plan id "plan-1", goal "g",
  createdAt "2026-06-13T00:00:00.000Z". Add a `describe("readyNodes (WP-219)",
  …)` block with exactly four tests, asserting the returned node ids via
  `.map((n) => n.id)` and `toEqual`:
    1. readyNodes(plan, [])                  → ["N-1"]
    2. readyNodes(plan, ["N-1"])             → ["N-2"]
    3. readyNodes(plan, ["N-1", "N-2"])      → ["N-3"]
    4. readyNodes(plan, ["N-1", "N-2", "N-3"]) → []

  Follow AGENTS.md conventions: strict TypeScript, ESM imports with `.js`
  extensions, named exports only, no default export.
repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true
acceptance_criteria:
  # Judge-executed in the run workspace (fresh clone), bare pnpm, 120 s cap
  # per check. Host-timed 2026-06-13 on the identical surface: sequencing test
  # ≈ 1.0 s, contracts ≈ 1.0 s, typecheck + lint ≈ 4 s; install dominates AC-1.
  - id: AC-1
    description: >
      the new readyNodes unit tests pass (dependency resolution: dep-free,
      single-dep, multi-dep, all-complete)
    check: pnpm install --prefer-offline --silent && pnpm --filter @chikory/sdk exec vitest run test/chain/sequencing.test.ts
  - id: AC-2
    description: >
      the frozen Plan/PlanNode contracts the new module imports are intact —
      the contract conformance suite still passes (the new module has no
      call-sites, so nothing else can change)
    check: pnpm --filter @chikory/sdk exec vitest run test/contracts.test.ts
  - id: AC-3
    description: strict typecheck and lint are clean
    check: pnpm --filter @chikory/sdk typecheck && pnpm --filter @chikory/sdk lint
budget_usd: 5
max_steps: 4
executor:
  adapter: codex
  family: openai
judge:
  # openai-compat = the keyless shim seam; real family = the shim backend
  # (gemini) — structurally different from the openai executor.
  family: openai-compat
  cadence: 2
  max_cost_share: 0.5
routing:
  stages:
    # plan/review unused by CLI executors in P1; code.model feeds `codex -m`.
    plan: { provider: openai-compat, model: gpt-5.5 }
    code: { provider: openai-compat, model: gpt-5.5 }
    review: { provider: openai-compat, model: gpt-5.5 }
    judge: { provider: openai-compat, model: gemini-3.1-pro-preview }
