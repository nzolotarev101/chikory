# Dogfood-022: WP-218 pure token-budget gate math — the token twin of the USD gate.
#
# WHY THIS IS NEXT: WP-221 Slice B (dogfood-021) plumbed the F-11 cost win;
# closure is now an observation away — watch THIS run for the retired probe step.
# Meanwhile the best remaining pure, contract-landed slice is the WP-218 token
# gate math, the original dogfood-021 before it was reprioritized behind the F-11
# win (2026-06-14, see the plan.md WP-218 row). The USD budget gate already has a
# pure pair — `estimateNextStepCost` / `budgetBreached` in runner/budget.ts. The
# token-denominated budget contract (`TaskSpec.budgetTokens`) is already landed
# (types.ts:81, schemas.ts:186). This slice adds the token TWIN of that math so a
# future (hand-wired) pre-step gate can HALT on token spend — making CG-2 real on
# $0-metered subscription runs (the F-9 blind meter). PURE math + unit tests only;
# the gate wiring + HALT-event shape are a separate, hand-done follow-up.
#
# Zero-secrets launch:
#   node scripts/cli-judge-proxy.mjs 8787 gemini &
#   OPENAI_COMPAT_BASE_URL=http://127.0.0.1:8787 pnpm chikory run examples/dogfood/dogfood-022.yaml --watch
#
# Commit dogfood-021 docs + the staged WP-221 Slice B source before launching —
# workspaces clone HEAD. Launch ONCE and watch to terminal (F-30). Run Devbox
# commands sequentially (F-22).
name: dogfood-022-wp-218-token-budget-math
goal: >
  Implement the WP-218 pure token-budget gate math — the token-denominated twin
  of the existing USD gate in packages/sdk-ts/src/runner/budget.ts. The contract
  `TaskSpec.budgetTokens` is already landed; this slice adds only the pure
  predicates and their re-export and unit tests, mirroring the USD pair exactly.
  Do NOT touch the agent loop, the pre-step gate, any HALT/budget_event shape, or
  any contract/type/schema/journal format. Add no dependency. Modify exactly two
  source files and one existing test file.

  1. packages/sdk-ts/src/runner/budget.ts — add two exported pure functions that
     mirror the existing USD pair in the same file:
       - `estimateNextStepTokens(stepTokens: readonly number[]): number` —
         identical shape to `estimateNextStepCost`: empty history → 0; otherwise
         the mean of the last `ESTIMATE_WINDOW` (5) entries × `ESTIMATE_SAFETY_FACTOR`
         (1.5). Reuse the existing `ESTIMATE_WINDOW` / `ESTIMATE_SAFETY_FACTOR`
         constants — do NOT redefine them.
       - `tokenBudgetBreached(spentTokens: number, budgetTokens: number, estimate: number): boolean` —
         identical shape to `budgetBreached`: `remaining = budgetTokens - spentTokens`;
         return `remaining <= 0 || remaining < estimate`.
     Keep both pure (no I/O, no mutation). Give each a one-line JSDoc citing
     WP-218 and CG-2 (match the file's existing comment style). Change nothing
     else in the file — leave the USD functions and constants exactly as they are.

  2. packages/sdk-ts/src/index.ts — in the existing
     `export { … } from "./runner/budget.js";` block (the one that already
     re-exports `budgetBreached` and `estimateNextStepCost`), add
     `estimateNextStepTokens` and `tokenBudgetBreached`. Add nothing else.

  3. packages/sdk-ts/test/runner/budget-gate.test.ts — extend the existing pure
     `describe("budget estimate math (WP-124)", …)` block (do NOT add a new top-
     level describe, do NOT touch the Temporal-backed `describe.skipIf` suite)
     with two new `test(...)` cases importing the two new functions from
     "../../src/index.js" alongside the existing budget imports:
       - token rolling-mean: `estimateNextStepTokens([])` → `0`;
         `estimateNextStepTokens([1000])` → `1500`; and only the last 5 of 6 are
         averaged (e.g. `[1e9, 1000, 1000, 1000, 1000, 1000]` → `1500`), using
         `toBeCloseTo(…, 6)` to mirror the USD test's tolerance style;
       - token breach: `tokenBudgetBreached(1000, 1000, 0)` → `true` (remaining 0);
         `tokenBudgetBreached(0, 1000, 0)` → `false`;
         `tokenBudgetBreached(990, 1000, 15)` → `true` (remaining 10 < estimate 15).

  After this slice the runner has a pure, unit-tested token-budget predicate pair
  ready for a future pre-step gate to call — exactly as the USD pair feeds the
  current gate. (Wiring the predicate into the pre-step gate and firing a token
  HALT via the decided additive `budget_event` shape — `cause?: "usd" | "tokens"`
  + optional `remainingTokens?` — is the hand-done follow-up, out of scope here.)

  Follow AGENTS.md: strict TypeScript, ESM `.js` import extensions, named exports
  only, no `any`, run all Devbox verification commands sequentially. The typecheck
  gate covers test/** (WP-230), so the extended test must be type-correct.
repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true
acceptance_criteria:
  - id: AC-1
    description: >
      the budget-gate pure math suite passes, now including the two new
      token-budget cases
    check: pnpm install --prefer-offline --silent && pnpm --filter @chikory/sdk exec vitest run test/runner/budget-gate.test.ts -t "budget estimate math"
  - id: AC-2
    description: >
      the complete TypeScript SDK suite remains green — proving the new token
      predicates and re-export break nothing
    check: pnpm --filter @chikory/sdk test
  - id: AC-3
    description: strict typecheck (covering test/**, WP-230) and lint are clean
    check: pnpm --filter @chikory/sdk typecheck && pnpm --filter @chikory/sdk lint
budget_usd: 5
max_steps: 4
