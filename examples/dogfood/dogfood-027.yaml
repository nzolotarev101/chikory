# SUCCESS with NO empty-diff probe step ‚Äî watch the step count stay at 1.
name: dogfood-027-wp-228-baseline-precheck
goal: >
  Implement WP-228 Slice 1: the PURE launch-baseline-precheck DECISION ‚Äî a pure
  function that, given the exit codes of a task spec's acceptance `check`s run
  against the clean baseline, decides whether the baseline already satisfies the
  goal (so the run would be redundant, dogfood-017 F-25). This is the direct
  analog of the judge's pure `buildVerdict` and the planner's pure
  `buildPlanVerdict`: a pure transform from already-collected facts to a
  validated verdict object. Do NOT make any LLM/router call, do NOT run or spawn
  any check / `child_process` / shell, do NOT touch the router, agent-loop,
  journal writer, runner, CLI command wiring (`run`/`commands.ts`/`main.ts`), or
  any contract/type/schema in `types.ts`, do NOT add a `--force` flag or any CLI
  flag, do NOT wire this into the launch path (that EXECUTION + warn/refuse
  wiring is the non-pure hand-design follow-up). Define the result types LOCALLY
  in the new module (the `PlanJudgeReply` precedent in
  `planner/meta-judge-verdict.ts`) ‚Äî add NOTHING to `types.ts`. Add no
  dependency. Add exactly one new source file and one new test file, and edit
  exactly one existing file (the barrel `src/index.ts`) for a single re-export ‚Äî
  three files total, no other file changed.

  1. packages/sdk-ts/src/cli/precheck.ts ‚Äî a NEW pure module, named exports
     only, strict TypeScript, ESM `.js` import extensions, no `any`, no default
     export. JSDoc each export citing WP-228 / dogfood-017 F-25. It needs no
     imports from `../types.js` (the inputs are plain check results), and must
     perform NO I/O, clock read, randomness, or mutation of its inputs:
       - `export interface PrecheckCheckResult { id: string; exitCode: number }`
         ‚Äî one acceptance check's id and the exit code it produced when run
         against the clean baseline (0 ‚áí already passing).
       - `export interface BaselinePrecheckResult` with EXACTLY these fields, in
         this order:
           - `satisfied: boolean` ‚Äî true iff there is at least one check AND
             every check has `exitCode === 0` (the baseline already meets the
             whole goal ‚Äî a redundant run);
           - `passedIds: string[]` ‚Äî ids of checks with `exitCode === 0`, input
             order preserved;
           - `failedIds: string[]` ‚Äî ids of checks with `exitCode !== 0`, input
             order preserved (the work the run still has to do);
           - `summary: string` ‚Äî a single human-readable line for the launch
             warning.
       - `export function evaluateBaselinePrecheck(results: readonly
         PrecheckCheckResult[]): BaselinePrecheckResult` ‚Äî pure. Partition
         `results` into `passedIds`/`failedIds` by `exitCode === 0`, preserving
         input order and NOT mutating `results` or its elements (build fresh
         arrays). Compute `satisfied = results.length > 0 &&
         failedIds.length === 0`. Build `summary` as:
           - empty input (`results.length === 0`) ‚áí
             `"no acceptance checks to precheck"` and `satisfied === false`;
           - `satisfied` true ‚áí
             `` `baseline already satisfies all ${results.length} acceptance checks ‚Äî the goal may already be done` ``;
           - otherwise ‚áí
             `` `${passedIds.length}/${results.length} acceptance checks already pass; ${failedIds.length} still failing` ``.
         Return exactly the `BaselinePrecheckResult` shape ‚Äî no extra or missing
         field.

  2. packages/sdk-ts/src/index.ts ‚Äî add EXACTLY ONE re-export line, immediately
     after the `buildPlanVerdict` re-export (`index.ts:71`):
       `export { evaluateBaselinePrecheck, type PrecheckCheckResult, type BaselinePrecheckResult } from "./cli/precheck.js";`
     Change nothing else in the barrel.

  3. packages/sdk-ts/test/cli/precheck.test.ts ‚Äî a NEW Vitest file importing
     `evaluateBaselinePrecheck` and the two types from
     "../../src/cli/precheck.js", with a `describe("evaluateBaselinePrecheck",
     ‚Ä¶)` block asserting at least these cases:
       - all checks pass ‚Äî `[{ id: "AC-1", exitCode: 0 }, { id: "AC-2", exitCode:
         0 }]` ‚áí `satisfied === true`, `passedIds` deep-equals `["AC-1",
         "AC-2"]`, `failedIds` deep-equals `[]`, and `summary` contains
         `"all 2 acceptance checks"`;
       - some fail ‚Äî `[{ id: "AC-1", exitCode: 0 }, { id: "AC-2", exitCode: 1 }]`
         ‚áí `satisfied === false`, `passedIds` deep-equals `["AC-1"]`, `failedIds`
         deep-equals `["AC-2"]`, and `summary` contains `"1/2"`;
       - all fail ‚Äî every `exitCode !== 0` ‚áí `satisfied === false`,
         `passedIds` deep-equals `[]`;
       - empty input ‚Äî `[]` ‚áí `satisfied === false`, `passedIds`/`failedIds`
         both `[]`, `summary` equals `"no acceptance checks to precheck"`;
       - purity ‚Äî the input array (and its element objects) is not mutated:
         capture the array length and an element before the call and assert
         unchanged afterward.
     Keep fixtures type-correct against `PrecheckCheckResult`.

  After this slice, the redundant-run guard's DECISION half is a pure,
  unit-tested function ready for the non-pure launch-path wiring (run each
  acceptance `check` against the clean baseline ‚Üí `evaluateBaselinePrecheck` ‚Üí
  warn, or refuse unless `--force`), which is the hand-design follow-up
  (TASK-PROTOCOL ¬ß4). No CLI behavior changes in this slice.

  Follow AGENTS.md: strict TypeScript, ESM `.js` import extensions, named
  exports only, no `any`, no default exports. The typecheck gate type-checks
  test/** (WP-230), so the new test must be type-correct. Run all Devbox
  verification commands sequentially.
repos:
