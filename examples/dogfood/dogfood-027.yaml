# Dogfood-027: WP-228 S1 ‚Äî the pure launch-baseline-precheck decision
# (`evaluateBaselinePrecheck`).
#
# WHY THIS IS THE PRIORITY: WP-219's entire PURE surface is landed (S2 planner
# prompt+assembly dogfood-022/023, S2b plan meta-judge prompt+verdict-assembly
# dogfood-024/025) and its remainder is non-pure / hand-design (the `decompose`
# wrapper + plan-judge harness ‚Äî router call + `JSON.parse`, TASK-PROTOCOL ¬ß4),
# so NOT dogfoodable yet. WP-203's remaining slices are blocked or later: the S2
# digest wiring stays BLOCKED on the WP-202 Memory Pointer store
# (`CompactionResult.digestRef`); S3 recall-tier projection has no frozen pure
# contract; the S4 trace renderer just landed (dogfood-026 `run-f9d699d4`). The
# next clean PURE dogfood is WP-228 (üü°) ‚Äî the launch-baseline precheck (dogfood-
# 017 F-25): before step 1, run the spec's acceptance `check`s against the clean
# baseline; if they ALL already pass, the goal may already be done ‚Üí warn/refuse
# (the guard that would have stopped dogfood-017 from burning $1.41 against an
# already-landed WP). The check-EXECUTION (`child_process`) and the CLI
# warn/`--force` wiring are non-pure / hand-design (TASK-PROTOCOL ¬ß4, done by
# hand later); THIS slice is only the PURE DECISION over already-collected check
# results ‚Äî the exact analog of the judge's pure `buildVerdict` and the planner's
# pure `buildPlanVerdict` (a pure function turning collected facts into a
# validated verdict object). Local result types only (the `PlanJudgeReply`
# precedent, `planner/meta-judge-verdict.ts`) ‚Äî NO contract/`types.ts` change, so
# it needs nothing un-landed and no hand-design first.
#
# Zero-secrets launch:
#   node scripts/cli-judge-proxy.mjs 8787 gemini &
#   OPENAI_COMPAT_BASE_URL=http://127.0.0.1:8787 pnpm chikory run examples/dogfood/dogfood-027.yaml --watch
#
# Commit everything before launching ‚Äî workspaces clone HEAD, so the run must
# see the current `src/cli/` (no `precheck.ts` yet) and `src/index.ts`.
# Launch ONCE and watch to terminal (F-30). Run Devbox commands sequentially
