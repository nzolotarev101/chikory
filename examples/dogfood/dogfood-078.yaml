name: dogfood-078-wp250-window-park-durable-suspend
goal: >
  Close WP-250: when the pacing decision returns action `park` — the SINGLE next step's estimated tokens
  exceed the context window, so folding accumulated history CANNOT make it fit — the run must durably SUSPEND
  at ZERO compute instead of folding-and-continuing INTO a guaranteed-overflow step, and later resume to a
  normal terminal state without re-executing any already-journaled step. Today the workflow loop treats `park`
  and compact identically (agent-loop.ts:430, underPressure = pacing.action !== "continue") and charges
  the overflow step. Close that gap by REUSING the existing durable-park machinery (the WP-206 operator-suspend
  condition wait + control_event journal at agent-loop.ts:199, and the WP-243 budget-park cause
  precedent), NOT by inventing a second suspend mechanism or a second LLM/durable path.

  OUTCOME (what "done" means — the HOW is yours to design; this decomposes into sequential deliverables):
    * A PURE decision that separates a fold-and-continue compact from a must-suspend `park`: a `park` action
      (next step cannot fit even after compaction) maps to "durably suspend"; continue/compact do NOT. Pure,
      typed, tested — the sibling of decideContextWindowPacing, reading only the pacing result.
    * When the loop hits a `park` action, it durably parks the run at status = SUSPENDED on a Temporal
      condition wait (ZERO compute, NOT a poll or sleep), journaling the park with a DISTINCT window
      cause — cause: window — so the audit trail distinguishes a window park from an operator suspend
      (WP-206) and a budget breach (WP-243). The park-check MUST sit where NO already-journaled step is
      re-executed on resume.
    * The operator surface (chikory status / --watch) reports the window-park state and an ACTIONABLE
      unblock hint (shrink the next step or start a fresh-context resume), mirroring how the budget halt
      surfaces its top-up command.
    * A resume path continues a window-parked run to a NORMAL terminal state with the SAME journaled steps
      (no duplicate step entries / no duplicate spend), preserving any folded digest.
    * Prove it with a REAL behavioral test that drives a LIVE Temporal-backed run (mirror the WP-123
      crash-recovery, WP-212 inject, and WP-206 suspend tests — do NOT mock the durable layer): use the FROZEN
      debug.contextWindowTokens seam to force a deterministic `park`, assert the run reaches SUSPENDED at
      zero compute and does NOT advance while parked, resume it, and assert it reaches a terminal state having
      re-executed ZERO journaled steps. Reference contextWindowTokens from the test so the outcome is
      greppable.

  CONSTRAINTS: strict TypeScript, ESM .js relative imports, named exports only; NO new dependency; do NOT
  change the StepRecord/JournalEntry/pacing-decision (decideContextWindowPacing) contract SHAPES, and do
  NOT remove or repurpose the existing SUSPENDED/RunStatus values, the existing signals, the operator-suspend
  path (WP-206), or the budget-park path (WP-243) — EXTEND them additively. Reuse the condition/control_event
  park machinery and the frozen debug.contextWindowTokens seam; do not invent a second suspend mechanism, a
  second durable path, or read the window size from env. If a verification step reports a failing test or type
  error, READ the failure and fix the IMPLEMENTATION — do NOT weaken or delete any assertion.
repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true
acceptance_criteria:
  - id: AC-1
    description: >
      A context-window `park` durably suspends the run and is resumable — the workflow parks at
      `status = "SUSPENDED"` on a Temporal `condition` when the pacing action is `park`, journals the park with
      a DISTINCT `window` cause (separate from the WP-206 operator suspend and the WP-243 budget breach), and a
      real behavioral test drives the live park→resume path end-to-end through the frozen
      `debug.contextWindowTokens` seam, asserting zero journaled-step re-execution on resume. (OUTCOME anchors
      the symbols the goal NAMES — `window` cause, `contextWindowTokens` seam, `SUSPENDED` status — as they
      appear in code; the module/test layout is the executor's to choose — F-82/F-83.)
    check: >
      cd packages/sdk-ts &&
      grep -q 'window' src/workflow/agent-loop.ts &&
      grep -q 'SUSPENDED' src/workflow/agent-loop.ts &&
      grep -q 'condition' src/workflow/agent-loop.ts &&
      grep -rq 'contextWindowTokens' test/ &&
      grep -rq 'SUSPENDED' test/
  - id: AC-2
    description: >
      the SDK stays type- and lint-clean and the FULL existing suite — including the new live context-window
      park/resume durable test — is green, proving the park is a real zero-compute durable wait, the resume
      re-executes no journaled step, and nothing outside the window-park surface regressed (no
      contract/StepRecord/pacing-decision shape change).
    check: cd packages/sdk-ts && pnpm exec tsc --noEmit && pnpm exec eslint . && pnpm exec vitest run
