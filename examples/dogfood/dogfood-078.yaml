#
# Pre-launch discipline:
#   * COMMIT EVERYTHING first — the workspace clones HEAD (F-30: launch ONCE). The dogfood-077 review edits AND
#     the STAGED WP-206 delivery (13 files) must be committed so HEAD is lint-GREEN before the clone (the clone
#     must pass this run's own AC `eslint .`).
#   * F-45: any NEW test file this run creates MUST be ABSENT on HEAD (the window-park durable test is net-new).
#   * F-76/F-80/F-85 (codex): a multi-node chain WILL take a while; do NOT raise `budget_usd`/`max_steps`
#     mid-run to rescue it; RECORD any per-node step-cap overrun (F-85 → WP-268).
