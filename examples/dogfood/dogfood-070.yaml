name: dogfood-070-wp261-launch-mode-mismatch-precheck
goal: >
  Land the WP-261 launch-mode-mismatch precheck — a pure decision that catches the dogfood-069 F-70 failure
  mode (a spec authored as a single `chikory run` is launched via `chikory chain`, re-triggering the F-64
  planner paraphrase). Add exactly TWO new files in packages/sdk-ts: a pure module + its test. Mirror the
  existing `src/cli/spec-staleness-precheck.ts` shape exactly (pure, named exports only, an `export interface`
  result type, an object-param decision function, no contract change). Change no other file, add no new
  dependency, and do NOT touch `types.ts`, any contract, the barrel `src/index.ts`, the chain runner,
  `src/cli/commands.ts`, or `spec-staleness-precheck.ts`. Use strict TypeScript, ESM `.js` relative imports,
  named exports only, NO default exports, no I/O / network / clock / randomness. Run Devbox verification
  commands sequentially with bare `pnpm exec`. If a verification step reports a failing test or type error,
  READ the failure and fix the IMPLEMENTATION so every mandated assertion passes — do NOT weaken, rephrase,
  or remove any mandated assertion (a grep enforces the symbols, literals, and interface shape).

  FILE 1 — packages/sdk-ts/src/cli/launch-mode-precheck.ts (NEW pure module). Export (named exports only):

    export interface LaunchModeMismatch {
      intendedSingleRun: boolean;
      launchedAsChain: boolean;
      warning: string;
    }
    export function detectIntendedSingleRun(specText: string): boolean;
    export function assessLaunchModeMismatch(input: {
      intendedSingleRun: boolean;
      launchedAsChain: boolean;
    }): LaunchModeMismatch | null;

  Semantics (exact):
    * `detectIntendedSingleRun` returns `true` when `specText` carries the conventional single-run marker the
      dogfood specs use — i.e. it matches, CASE-INSENSITIVELY, ANY of: the phrase `NOT a chain`, OR
      `single \`chikory run\``, OR `Launch with \`chikory run\``. Returns `false` otherwise (a spec with no
      such marker, e.g. a genuine `chikory chain` spec). Pure; read only.
    * `assessLaunchModeMismatch` returns a non-null `LaunchModeMismatch` EXACTLY when
      `input.intendedSingleRun === true && input.launchedAsChain === true` (the F-70 condition) — the returned
      object echoes both input booleans and carries a `warning` string that contains the substring
      `chikory chain` and the substring `single \`chikory run\``. In EVERY other case (intended single-run but
      launched as a run; a genuine chain spec launched as a chain; neither) it returns `null`. Pure; do NOT
      mutate `input`.
    * Add a short JSDoc on each export explaining it is the WP-261 launch-mode guard and the
      `evaluateSpecStalenessPrecheck` analog.

  FILE 2 — packages/sdk-ts/test/cli/launch-mode-precheck.test.ts (NEW Vitest file, ESM `.js` relative import
  from `../../src/cli/launch-mode-precheck.js`, plus `import type { LaunchModeMismatch } from
  "../../src/cli/launch-mode-precheck.js";`) encoding AT LEAST these cases verbatim (graded by a grep — do not
  rephrase the call, the object-literal argument, or the expected literal):
    * `detectIntendedSingleRun` true on a marker: `detectIntendedSingleRun("# Launch with \`chikory run\`, NOT
      a chain.")` → `true`.
    * `detectIntendedSingleRun` false with no marker: `detectIntendedSingleRun("Decompose this goal into two
      dependent nodes.")` → `false`.
    * the F-70 MISMATCH case returns a non-null result with a populated `warning` FIELD (call with an OBJECT
      literal, assert the field): `const result = assessLaunchModeMismatch({ intendedSingleRun: true,
      launchedAsChain: true });` then assert `result` is not null and `result?.warning` contains both
      `chikory chain` and `single \`chikory run\``, and `result?.intendedSingleRun === true`.
    * launched-correctly → null: `assessLaunchModeMismatch({ intendedSingleRun: true, launchedAsChain: false
      })` → `null`.
    * the DISCRIMINATOR — a genuine chain spec launched as a chain is NOT a mismatch:
      `assessLaunchModeMismatch({ intendedSingleRun: false, launchedAsChain: true })` → `null`.
    * no mutation: snapshot the `input` object before calling `assessLaunchModeMismatch`, assert it is
      unchanged after.

  Keep both functions pure and minimal. The `assessLaunchModeMismatch` decision is the WP-261 guard; the wire
  that calls it inside `cmdChain` and warns/refuses on a non-null result is the SEPARATE §4 follow-up — do NOT
  wire it here.
repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true
acceptance_criteria:
  - id: AC-1
    description: >
      the pure `detectIntendedSingleRun` + `assessLaunchModeMismatch` decision lands in a new
      `src/cli/launch-mode-precheck.ts` with the EXACT `LaunchModeMismatch` interface shape (the `warning`
      result field — grep-pinned, anti-F-67) and the object-param call, its mandated cases present verbatim
      (incl. the F-70 mismatch case and the genuine-chain discriminator), and its focused test passes
    check: >
      cd packages/sdk-ts &&
      grep -q "detectIntendedSingleRun" src/cli/launch-mode-precheck.ts &&
      grep -q "assessLaunchModeMismatch" src/cli/launch-mode-precheck.ts &&
      grep -q "interface LaunchModeMismatch" src/cli/launch-mode-precheck.ts &&
      grep -q "LaunchModeMismatch" test/cli/launch-mode-precheck.test.ts &&
      grep -q "assessLaunchModeMismatch({" test/cli/launch-mode-precheck.test.ts &&
      grep -q "intendedSingleRun: true" test/cli/launch-mode-precheck.test.ts &&
      grep -q ".warning" test/cli/launch-mode-precheck.test.ts &&
      grep -q "NOT a chain" test/cli/launch-mode-precheck.test.ts &&
      pnpm exec vitest run test/cli/launch-mode-precheck.test.ts
  - id: AC-2
    description: >
      the SDK stays type- and lint-clean and the full existing suite remains green — proving the precheck is
      additive (a new pure module + test) and no existing export, contract, the barrel, `commands.ts`, or
      `spec-staleness-precheck.ts` changed
    check: cd packages/sdk-ts && pnpm exec tsc --noEmit && pnpm exec eslint . && pnpm exec vitest run
