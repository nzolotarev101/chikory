#     run's own AC `eslint .`).
#   * The two target files MUST NOT already exist on HEAD (confirmed absent 2026-06-30) — else the clone
#     already satisfies the goal → empty diff → FAILED (dogfood-044 F-45).
#   * F-49: each AC `check` greps the mandated symbols/literals/shape verbatim BEFORE vitest, so the executor
