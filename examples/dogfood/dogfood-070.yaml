# LAUNCH WITH `chikory run` (single durable run, NOT `chikory chain`). NO seam env.
# ⚠️ HONOR THE LAUNCH MODE THIS TIME: dogfood-067/068/069 were all authored single-`run` and all launched
#    as `chikory chain`; dogfood-069 (F-70) PROVED that divergence re-triggers the F-64 planner paraphrase
#    and cost 63% of the run. This spec is the guard for exactly that mistake — launch it correctly:
#      bash scripts/dogfood.sh examples/dogfood/dogfood-070.yaml
#
# WHY THIS IS NEXT (2026-06-30): dogfood-069 surfaced F-70 — a spec authored single-`run` (its header says
# "NOT a chain" three times, *because a chain re-risks F-64*) was launched as a `chikory chain` for the THIRD
# run in a row (067/068/069); the chain planner paraphrased the full goal into a 2-sentence node goal that
# DROPPED 32 of 35 grep-pinned literals, steps 1-2 burned ~$1.72 (63% of the $2.73 run) failing AC-1, and the
# run survived only because the F-49 grep pins persisted into the acceptance criteria. WP-261 is the launcher
# guard that refuses/warns when a single-`run`-authored spec is invoked via `chikory chain`. The pure half is
# a deterministic decision in the EXACT shape of the landed `evaluateSpecStalenessPrecheck` / `extractTargetWpId`
# (`src/cli/spec-staleness-precheck.ts`, the WP-258 sibling): detect the single-run intent from the spec text,
# and flag the mismatch when the launch mode disagrees. This run lands that decision. The §4 follow-up
# (operator-landed, like every prior pure half's wire) calls it inside `cmdChain` and warns (or refuses pending
# `--force`) when the mismatch is non-null — turning F-70 from a silent costly divergence into a caught one.
#
# Single `chikory run` (NOT a chain): one cohesive pure module + its test in one workspace; a chain would
# re-risk the very F-64 paraphrase F-70 is about (and the goal does not genuinely decompose). A single run
# hands the FULL goal — every mandated symbol/literal/interface field — straight to the executor, no planner
# paraphrase, so the F-64 trap is absent.
#
# F-67 HARDENING: dogfood-068 shipped a precheck whose result type DROPPED a mandated field and used POSITIONAL
# args past a name-only grep AC. So this goal pins the EXACT interface shape AND the object-param call, and
# AC-1 greps the test for the object-literal call `assessLaunchModeMismatch({` + a result-FIELD access
# (`.warning`) + the `LaunchModeMismatch` type name — not just the function name.
#
# Gate verdicts (applied inline, dogfood-review §5, on CURRENT HEAD `361c4b4`):
#   * §1.1 Failure-surface: ✅ — cross-file (NEW pure module + its test, 2 files); real failure surface —
#     single-run-intent detection across the conventional marker phrasings, the mismatch TRUTH TABLE (only
#     intended-single-run AND launched-as-chain is a mismatch; a genuine chain spec launched as a chain is
#     NOT), null-when-aligned, no input mutation. Real BUG surface — F-70 cost 63% of dogfood-069. 1–3 steps
#     plausible. Not a 1-file deterministic port — it is the guard for a recurring costly defect.
#   * §1.2 Product-progress: ✅ — advances REAL open plan.md §6 WP-261 (🔴), queued by the dogfood-069 review.
#     The decision is WP-261's OWN real code (the launcher-guard's pure half, the `evaluateSpecStalenessPrecheck`
#     analog); the `cmdChain` wire is the SEPARATE §4 follow-up. Net-new real product code (both files absent on
#     HEAD, confirmed 2026-06-30) — NOT throwaway scaffolding.
#   * §1.3 Mission-critical: ✅ PROCEED — F-70 is a fresh, triply-evidenced (067/068/069), costly bug surface;
#     the slice hosts the fix in WP-261's own real code (not busy, not scaffold-hosted). The §1.3 veto does not
#     fire: every remaining CORE-PILLAR slice is a §4 operator-landed wire (WP-257 REVISE wire, WP-202/210 act
#     wires) — no thesis-stressing real-WP PURE slice is unblocked to displace this. Recorded verdict: ✅ PROCEED.
#
# Zero-secrets launch (no API keys; CLI-OAuth judge via the shim; NO seam vars). The script auto-starts the
# `agy`/Antigravity proxy for the gemini judge:
#   devbox shell
#   bash scripts/dogfood.sh examples/dogfood/dogfood-070.yaml
# (Manual path: `node scripts/cli-judge-proxy.mjs 8787 agy &`, set
#  `OPENAI_COMPAT_BASE_URL=http://127.0.0.1:8787`, then
#  `pnpm chikory run examples/dogfood/dogfood-070.yaml --watch`. `chikory run` validates the spec first.)
#
# Pre-launch discipline:
#   * COMMIT EVERYTHING first — the workspace clones HEAD (F-30: launch ONCE). This review's report +
#     living-doc edits + the dogfood-069 delivery (`literal-preservation.ts` + test) are STAGED/uncommitted;
