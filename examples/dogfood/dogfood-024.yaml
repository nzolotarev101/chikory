# Dogfood-024: WP-219 S2b — the plan meta-judge's PURE prompt half.
#
# WHY THIS IS THE PRIORITY: WP-219 (goal decomposition & run chaining, ADR-005)
# is the headline Phase-2 planner pillar. Its S2 PLANNER pure surface is now
# complete — the prompt half (`planner/prompt.ts`, dogfood-022 `run-499218ef`)
# and the assembly half (`planner/assemble.ts` `buildPlan`, dogfood-023
# `run-2d40ded5`) both landed. The remaining S2 piece, the non-pure
# `GoalPlanner.decompose` wrapper (router call + `JSON.parse`), is hand-design
# (TASK-PROTOCOL §4, NF-1 LLM call). The NEXT pure dogfood is S2b: the plan
# META-JUDGE (ADR-005 D2) that grades a decomposed `Plan` against the goal's
# acceptance criteria and emits a `PlanVerdict` (PROCEED → run the plan; REVISE
# → re-plan; ESCALATE → human). Like the executor judge, it is an LLM judge
# whose model family must differ from the planner's (`PlanInput.family`, D2) —
# so it has a PURE prompt half mirroring `judge/prompt.ts` exactly as the
# planner's prompt half did. This slice carves out that prompt half; its
# verdict-assembly half (a pure `buildPlanVerdict` mirroring `buildVerdict`,
# folding the already-landed pure `planCoverageGaps` coverage check) and the
# non-pure harness (router call + parse) are the later follow-ups.
#
# The `PlanVerdict`/`PlanVerdictKind` contract (`types.ts:473`) and the pure
# `planCoverageGaps` (`src/planner/coverage.ts`) are already frozen/landed, so
# this is a clean one-step pure dogfood — no contract/router/loop change.
#
# WP-203 S2 digest wiring remains BLOCKED: `CompactionResult.digestRef` is a
# Memory Pointer (WP-202), and the WP-202 store is not built yet.
#
# Zero-secrets launch:
#   node scripts/cli-judge-proxy.mjs 8787 gemini &
#   OPENAI_COMPAT_BASE_URL=http://127.0.0.1:8787 pnpm chikory run examples/dogfood/dogfood-024.yaml --watch
#
# Commit everything before launching — workspaces clone HEAD, so the run must
# see the frozen `Plan`/`PlanNode`/`PlanInput`/`PlanVerdict`/`AcceptanceCriterion`
# contracts in types.ts and the landed `planner/prompt.ts` + `planner/assemble.ts`.
# Launch ONCE and watch to terminal (F-30). Run Devbox commands sequentially
# (F-22). F-11 is closed (dogfood-022/023): a clean one-step finish should seal
# SUCCESS with NO empty-diff probe step — watch the step count stay at 1.
name: dogfood-024-wp-219-plan-judge-prompt
goal: >
  Implement WP-219 S2b: the PURE prompt half of the plan meta-judge
  (ADR-005 D2), mirroring the executor judge's pure prompt half
  (`judge/prompt.ts`: `JUDGE_SYSTEM_PROMPT` + `JUDGE_FORM_RESPONSE_SCHEMA` +
  `buildJudgeMessages`) symbol-for-symbol. Build the deterministic prompt regime
  that turns a decomposed `Plan` plus the goal's acceptance criteria into the
  `Message[]` the (later, non-pure) plan-judge harness sends to the router. Do
  NOT make any LLM/router call, do NOT implement the plan-judge harness, do NOT
  call `JSON.parse`, do NOT assemble a `PlanVerdict`, do NOT touch the router,
  agent-loop, planner prompt/assembly, judge code, or any contract/type/schema/
  journal format. Add no dependency. Add exactly one new source file, edit
  exactly one existing source file, and add exactly one new test file.

  1. packages/sdk-ts/src/planner/meta-judge-prompt.ts (new) — the pure plan-judge
     prompt regime. Import `AcceptanceCriterion`, `Message`, `Plan`, `PlanNode`
     (type-only) from "../types.js". Export, all pure (no I/O, no mutation, no
     clock, no id generation), with short JSDoc citing WP-219 S2b and ADR-005 D2:
       - `PLAN_VERDICT_RESPONSE_SCHEMA` (`as const`) — the JSON Schema handed to
         the router as `responseSchema`, mirroring `PlanVerdict` (`types.ts:475`):
         an object with `additionalProperties: false`, `required: ["kind",
         "rationale", "uncoveredCriteria"]`, properties `kind` (a string enum of
         exactly the three `PlanVerdictKind` values `"PROCEED"`, `"REVISE"`,
         `"ESCALATE"`), `rationale` (`{ type: "string" }`), and
         `uncoveredCriteria` (`{ type: "array", items: { type: "string" } }`).
       - `PLAN_JUDGE_SYSTEM_PROMPT: string` — a `[ ... ].join("\n")` block in the
         `JUDGE_SYSTEM_PROMPT` idiom, framing the model as an INDEPENDENT plan
         reviewer that did not write the plan and has no stake in it passing.
         State that its only job is to judge whether the decomposed plan is a
         sound, complete decomposition of the goal — every goal acceptance
         criterion covered by ≥1 node, dependencies coherent, node scopes
         self-contained — and to choose exactly one verdict `kind`: `PROCEED`
         (plan is sound, run it), `REVISE` (fixable structural/coverage gaps,
         re-plan), or `ESCALATE` (ambiguous or unsound enough to need a human).
         Require it to (a) reason before answering and put that reasoning in
         `rationale`, (b) list in `uncoveredCriteria` every goal criterion id no
         node covers (empty on PROCEED). Do NOT judge code/quality (no diff is
         in scope) — only the plan's structure and coverage. End with the
         standard "Respond with a single JSON object matching the requested
         schema." line.
       - `interface PlanJudgePromptInput { plan: Plan; goalCriteria: AcceptanceCriterion[] }`
         — the decomposed plan under review plus the goal-level acceptance
         criteria the plan must cover.
       - `buildPlanJudgeMessages(input: PlanJudgePromptInput): Message[]` —
         returns exactly two messages `[system, user]`: the system message
         `{ role: "system", content: PLAN_JUDGE_SYSTEM_PROMPT }`, and a user
         message whose content (a `[ ... ].join("\n")` block, the
         `buildJudgeMessages` idiom) renders, under clear `##` section headers:
         the plan's `goal`; the GOAL ACCEPTANCE CRITERIA the plan must cover
         (a private helper rendering `- <id>: <description>` per criterion, or
         `(none defined)` when empty — mirror `renderCriteria` in
         `judge/prompt.ts`); and the PLAN NODES (a private helper rendering each
         `PlanNode` as its `id`, `goal`, `dependsOn` list, `budgetUsd`, and the
         ids of its own `acceptanceCriteria`). Do NOT mutate `input` or any of
         its fields.

  2. packages/sdk-ts/src/index.ts — add ONE re-export line for the new symbols,
     immediately after the existing
     `export { buildPlan, type BuildPlanOptions } from "./planner/assemble.js";`
     line:
     `export { buildPlanJudgeMessages, PLAN_JUDGE_SYSTEM_PROMPT, PLAN_VERDICT_RESPONSE_SCHEMA } from "./planner/meta-judge-prompt.js";`
     Add nothing else.

  3. packages/sdk-ts/test/planner/meta-judge-prompt.test.ts (new) — unit-test the
     pure prompt builder, importing `buildPlanJudgeMessages`,
     `PLAN_JUDGE_SYSTEM_PROMPT`, and `PLAN_VERDICT_RESPONSE_SCHEMA` from
     "../../src/planner/meta-judge-prompt.js" and any types from
     "../../src/types.js". Build a valid two-node `Plan` fixture (node "N-1"
     with empty `dependsOn`, node "N-2" depending on "N-1"; each a non-empty
     `goal`, a non-empty `acceptanceCriteria` array, and a `budgetUsd`) and a
     goal `AcceptanceCriterion[]` fixture. Cover and assert:
       - `buildPlanJudgeMessages` returns exactly two messages, `[system, user]`
         in that order, with `role`s `"system"` then `"user"`;
       - the system message content `=== PLAN_JUDGE_SYSTEM_PROMPT`;
       - the user content contains the plan `goal`, every goal criterion's id,
         each plan node's id, and at least one node's `budgetUsd` rendered;
       - empty `goalCriteria` renders `(none defined)` and does not throw;
       - `PLAN_VERDICT_RESPONSE_SCHEMA.required` contains `"kind"`,
         `"rationale"`, and `"uncoveredCriteria"`, and the `kind` property's
         enum equals exactly `["PROCEED", "REVISE", "ESCALATE"]`;
       - `buildPlanJudgeMessages` does not mutate the input plan (e.g.
         `plan.nodes.length` is unchanged after the call).

  After this slice, the plan meta-judge's pure prompt regime is landed, mirroring
  the executor judge's. Remaining S2b: the pure verdict-assembly half (a
  `buildPlanVerdict` mirroring `buildVerdict`, folding the landed pure
  `planCoverageGaps` into `PlanVerdict.uncoveredCriteria`) — the next pure
  sub-slice — then the non-pure plan-judge harness (router call + `JSON.parse`)
  and the non-pure `GoalPlanner.decompose` wrapper, both hand-design
  (TASK-PROTOCOL §4), out of scope for this deterministic slice.

  Follow AGENTS.md: strict TypeScript, ESM `.js` import extensions, named
  exports only, no `any`, no default exports. The typecheck gate type-checks
  test/** (WP-230), so the new test must be type-correct. Run all Devbox
  verification commands sequentially.
repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true
acceptance_criteria:
  - id: AC-1
    description: >
      the new plan-judge-prompt test passes (all cases)
    check: pnpm install --prefer-offline --silent && pnpm --filter @chikory/sdk exec vitest run test/planner/meta-judge-prompt.test.ts
  - id: AC-2
    description: >
      the complete TypeScript SDK suite remains green — proving the new module
      breaks no existing behavior
    check: pnpm --filter @chikory/sdk test
  - id: AC-3
    description: strict typecheck (covering test/**, WP-230) and lint are clean
    check: pnpm --filter @chikory/sdk typecheck && pnpm --filter @chikory/sdk lint
budget_usd: 5
max_steps: 4
executor:
  adapter: codex
  family: openai
judge:
  family: openai-compat
  cadence: 2
  max_cost_share: 0.5
routing:
