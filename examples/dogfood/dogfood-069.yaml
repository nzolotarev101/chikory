name: dogfood-069-wp257-literal-preservation-verifier
goal: >
  Land the WP-257 chain-planner literal-preservation verifier â€” a pure decision that catches the F-64/F-67
  failure mode (the chain planner paraphrases each node's goal and DROPS verbatim/grep-pinned literals the
  parent goal mandated). Add exactly TWO new files in packages/sdk-ts: a pure module + its test. Mirror the
  existing `src/planner/coverage.ts` `planCoverageGaps` shape exactly (pure, type-only `Plan` import, no
  contract change). Change no other file, add no new dependency, and do NOT touch `types.ts`, any contract,
  the barrel `src/index.ts`, the chain runner, the planner harness, or `coverage.ts`. Use strict TypeScript,
  ESM `.js` relative imports, named exports only, NO default exports, no I/O / network / clock / randomness.
  Run Devbox verification commands sequentially with bare `pnpm exec`. If a verification step reports a
  failing test or type error, READ the failure and fix the IMPLEMENTATION so every mandated assertion
  passes â€” do NOT weaken, rephrase, or remove any mandated assertion (a grep enforces the symbols and
  literals).

  FILE 1 â€” packages/sdk-ts/src/planner/literal-preservation.ts (NEW pure module). Import the `Plan` type
  ONLY (`import type { Plan } from "../types.js";`). Export (named exports only):

    export function extractGoalLiterals(goalText: string): string[];
    export function planLiteralGaps(plan: Plan): string[];

  Semantics (exact):
    * `extractGoalLiterals` returns the inner text of every SINGLE-BACKTICK-delimited span (`` `...` ``) in
      `goalText`, in FIRST-SEEN order, DE-DUPLICATED (a literal repeated in the goal appears once). Empty
      array when the goal pins no backtick literals. These are the "mandated literals" the planner must
      preserve. Pure; read only.
    * `planLiteralGaps` returns the mandated literals from `extractGoalLiterals(plan.goal)` that NO node in
      `plan.nodes` PRESERVES, in `plan.goal` first-seen order. A literal `L` is PRESERVED by a node iff `L`
      occurs in that `node.goal` as an EXACT TOKEN â€” i.e. not immediately flanked by a word character or a
      hyphen (so a literal `WP-25` is NOT preserved by a node goal that contains only `WP-255`, and
      vice-versa â€” this exact-token rule is the discriminator that HALTed dogfood-066). A literal is a GAP
      iff it is preserved by ZERO nodes. Empty array â‡’ every mandated literal survived into some node goal
      (the planner-output PROCEED precondition). Pure; do not mutate `plan` or its arrays.
    * Add a short JSDoc on each export explaining it is the WP-257 planner-output guardrail and the
      `planCoverageGaps` analog.

  FILE 2 â€” packages/sdk-ts/test/planner/literal-preservation.test.ts (NEW Vitest file, ESM `.js` relative
  import from `../../src/planner/literal-preservation.js`) encoding AT LEAST these cases verbatim (graded by
  a grep â€” do not rephrase the call or the expected literal):
    * `extractGoalLiterals` dedup + order: a goal text pinning `` `parseWpStatus` ``, then `` `Plan` ``, then
      `` `parseWpStatus` `` again â†’ `["parseWpStatus", "Plan"]`.
    * a goal with NO backtick literal â†’ `extractGoalLiterals(...)` returns `[]`.
    * full preservation â†’ `planLiteralGaps(plan)` returns `[]`: build a `Plan` whose `goal` pins
      `` `parseWpStatus` `` and `` `assessSpecStaleness` `` and whose two nodes' `goal`s each contain one of
      those tokens.
    * a DROPPED literal is returned: a `Plan` whose `goal` pins `` `assessSpecStaleness` `` but where no
      `node.goal` contains it â†’ `planLiteralGaps(plan)` includes `"assessSpecStaleness"`.
    * the EXACT-TOKEN discriminator: a `Plan` whose `goal` pins `` `WP-25` `` and whose only node's `goal`
      contains `WP-255` (but not `WP-25` as a standalone token) â†’ `planLiteralGaps(plan)` returns `["WP-25"]`
      (the `WP-255` substring must NOT count as preserving `WP-25`).
    * no mutation: snapshot the `plan` (and its `nodes`) before calling `planLiteralGaps`, assert it is
      unchanged after.

  Keep both functions pure and minimal. The `planLiteralGaps` verifier is the WP-257 guardrail; the wire
  that calls it inside `runPlannerPass`/`buildPlan` and REVISEs on a non-empty result is the SEPARATE Â§4
  follow-up â€” do NOT wire it here.
