# Dogfood-061: WP-249 fix-clause (c) — `chikory land --verify` re-runs the run's OWN acceptance
# checks against the LANDED commit (close the dogfood-060 F-57 green-dashboard/red-main gap).
# Launch with `chikory run` (single durable run). NO seam env.
#
# WHY THIS IS NEXT (2026-06-28): dogfood-060 (WP-215 S5) landed a textbook judge-evidence wire, but
# its review surfaced 🔴 F-57 → WP-249 ESCALATED — the most serious finding of the campaign and a
# THESIS-RELEVANT one: the harvest commit `821cae5` swept 2 unrelated uncommitted host files the run
# never wrote into the delivery, and those files FAIL `eslint .`, so `main` went RED on AC-2's own
# lint gate WHILE the dashboard read ✅ PROCEED 2/2. The judge was honest — it grades the run's
# workspace CLONE — but NOTHING re-runs the run's acceptance `check`s against the COMMIT THAT ACTUALLY
# LANDS. The product's entire thesis is "real-time quality gates that catch bad changes before they
# land"; F-57 proved the dogfood loop's OWN land step has no such gate on the landed tree. This run
# closes that gap on real product code: `chikory land --verify` today reruns only the four GENERIC
# `VERIFY_COMMANDS` (`devbox run build/lint/typecheck/test`, `src/cli/land.ts:19-24,115-126`); this
# threads the run's OWN journaled `acceptanceCriteria[].check`s into the same `--verify` gate, run
# against the landed commit's tree, FAIL-CLOSED (keep the commit, exit 1) on any red — so a land that
# would break the landed AC is refused, not rubber-stamped.
#
# This is a CROSS-FILE wire on the WP-220 landing primitive (the gate-before-land seam), NOT a 1-file
# port — a legitimate failable headline: the new acceptance-check source must default to reading the
# run journal (`new Journal(journalPath(args.dataDir, args.runId)).getRun()?.task.acceptanceCriteria`,
# the `requireSpec` shape in `runner/activities.ts:136-139`) yet stay INJECTABLE via `LandDeps` (the
# established `deps.runCheck` pattern) so the test is hermetic; the gate must run AFTER the existing
# VERIFY_COMMANDS, reuse the same `runCheck(command, repo)` against the landed `repo` tree, keep the
# commit on red (the existing `--verify` keep-commit contract), and the success line/JSON must report
# the count. Several real ways to get it subtly wrong (run against the wrong tree, fail-open on a
# missing journal, drop the commit on red, count wrong).
#
# Gate verdicts (applied inline in the dogfood-060 review, dogfood-review §5):
#   * §1.1 Failure-surface: ✅ — cross-file (`src/cli/land.ts` + `test/cli/land.test.ts`), 2–4 steps
#     plausible; real failure surface (journal-default vs injectable source, run-against-landed-tree,
#     fail-closed keep-commit, ordering after VERIFY_COMMANDS, the count). Not a deterministic port.
#   * §1.2 Product-progress: ✅ — the landed diff is REAL open plan.md §6 WP-249 (🔴) product code on
#     `chikory land` (the WP-220 landing primitive / gate-before-land thesis seam), the documented
#     fix-clause (c) the dogfood-060 review added. NOT invented disposable scaffolding.
#   * §1.3 Mission-critical: ✅ PROCEED — addresses the highest-priority 🔴 (a broken-build, green-
#     dashboard regression) AND dogfoods the product's CORE thesis ("catch bad changes before they
#     land") on the loop's own landing step. The judge-security pillar's dogfoodable surface is
#     EXHAUSTED for now — the secret (S1→S2→S3) + dependency (S4→S5) evidence chain is complete and
#     the deterministic dependency/secret OVERRIDE that consumes it is §4-walled (operator-landed,
#     touches verdict/override logic, TASK-PROTOCOL §4); WP-210 act half (`scoringMethod` contract
#     change) and WP-250 (park→durable-suspend control-flow) are equally §4-walled; WP-254 is a
#     hard-to-spec measurement fix. WP-249 (c) is the strongest UNBLOCKED real-product slice.
#
# Live-read note (NOT friction): this run lands via the dogfood harvest, not necessarily via the very
# `chikory land --verify` path it extends — the unit test is the proof of the new gate's behavior
# (a failing acceptance check refuses the land), exactly as the S2/S5 evidence sections were unit-
# proven rather than fired live. Do NOT seed a failing check into the run's own land to force a live
# refusal — that is scaffold-hosted busy work.
#
# Zero-secrets launch (no API keys; CLI-OAuth judge via the shim; NO seam vars):
#   node scripts/cli-judge-proxy.mjs 8787 gemini &
#   OPENAI_COMPAT_BASE_URL=http://127.0.0.1:8787 \
#     pnpm chikory run examples/dogfood/dogfood-061.yaml --watch
#
# Pre-launch discipline:
#   * COMMIT EVERYTHING first — the workspace clones HEAD (F-30: launch ONCE). The dogfood-060
#     delivery + the F-57 eslint-disable fix + this review's doc edits are uncommitted on the working
#     tree; commit them so the tree is clean before this run clones (and so HEAD is lint-GREEN — the
#     F-57 fix MUST be on HEAD or this run's own AC-2 `eslint .` fails on the poisoned clone).
#   * F-49: each AC `check` `grep`s the mandated symbols verbatim BEFORE vitest, so the executor cannot
#     skip the wire or stub the gate.
#   * Run Devbox commands sequentially (F-22). The AC toolchain is Temporal-free (grep + vitest + tsc +
#     eslint), well under the 120 s judge cap.
name: dogfood-061-wp249-land-acceptance-regate
goal: >
  Extend `chikory land --verify` so it ALSO re-runs the landed run's OWN journaled acceptance
  `check`s against the LANDED commit's working tree — closing the dogfood-060 F-57 gap where the
  Agent-as-a-Judge graded the run's clean workspace CLONE but nothing re-gated the COMMIT THAT
  ACTUALLY LANDED (a lint-broken `main` shipped with the dashboard green). Today `--verify` reruns
  only the four generic `VERIFY_COMMANDS` (`src/cli/land.ts:19-24`, the `devbox run
  build/lint/typecheck/test` loop at `:115-126`); this adds the run's acceptance criteria to the
  SAME `--verify` gate, FAIL-CLOSED (keep the commit, exit 1) on any red.

  Change exactly these TWO files; change no other file, add no new dependency.

  1. packages/sdk-ts/src/cli/land.ts
     - Add an INJECTABLE acceptance-check source to `LandDeps`, mirroring the existing optional
       `runCheck` dep:
         /** WP-249: the landed run's own acceptance `check` commands, re-run against the landed
          * commit under `--verify`. Defaults to reading them from the run journal. */
         loadAcceptanceChecks?: (runId: string, dataDir: string | undefined) => string[];
     - Provide the default (used when `deps.loadAcceptanceChecks` is undefined) that reads the run's
       TaskSpec from its journal and returns the non-empty `check` strings, mirroring `requireSpec`
       in `src/runner/activities.ts:136-139`:
         open `new Journal(journalPath(dataDir, runId))` (import `Journal` from `../journal/journal.js`
         and `journalPath` from `../runner/paths.js`), read `journal.getRun()?.task.acceptanceCriteria
         ?? []`, and return `.filter((c) => typeof c.check === "string" && c.check.trim() !== "")
         .map((c) => c.check as string)`. If there is no run row, return `[]` (no acceptance checks to
         re-gate — do NOT throw; the generic VERIFY_COMMANDS gate still ran).
     - Inside the existing `if (args.verify === true) { ... }` block, AFTER the `VERIFY_COMMANDS`
       loop completes green, run the acceptance gate:
         const acceptanceChecks = (deps.loadAcceptanceChecks ?? defaultLoadAcceptanceChecks)(
           args.runId, args.dataDir);
         for (const check of acceptanceChecks) {
           if (!args.json) out(`acceptance: ${check}`);
           try { runCheck(check, repo); }
           catch {
             err(`chikory: acceptance check failed against landed commit: ${check}`);
             err(`chikory: commit kept: ${sha} — inspect with: git -C ${repo} show ${sha}`);
             return 1;
           }
         }
       Run each check against the LANDED tree (`repo`), reusing the SAME `runCheck(command, cwd)`
       helper the VERIFY_COMMANDS loop uses. Keep the commit on red (return 1 AFTER the commit is
       made — the existing `--verify` keep-commit contract), exactly like the VERIFY_COMMANDS failure
       path at `:120-124`.
     - On the success path, when `args.verify === true`, also surface the acceptance count:
       in the non-json branch print `acceptance: ${acceptanceChecks.length}/${acceptanceChecks.length}
       checks green` (next to the existing `verified: …` line); in the json branch add
       `acceptanceChecks: acceptanceChecks.length` to the emitted object (next to `verified: true`).
       Change nothing else in the land flow; the `args.verify !== true` paths stay byte-identical.

  2. packages/sdk-ts/test/cli/land.test.ts  (extend)
     - Add a focused case proving the gate re-runs the run's acceptance checks against the landed
       commit and PASSES: drive `chikory land <runId> --verify` with an injected
       `loadAcceptanceChecks: () => ["grep -q SOMETHING file"]` (or any string) and an injected
       `runCheck` that succeeds for every command; assert exit code 0, that the success output
       contains `acceptance: 1/1 checks green`, and that the land commit exists on the branch.
     - Add a focused case proving FAIL-CLOSED: inject `loadAcceptanceChecks: () => ["__ac_fails__"]`
       and a `runCheck` that throws ONLY for `"__ac_fails__"` (and succeeds for the VERIFY_COMMANDS
       so the generic gate passes first); assert the command exits 1, that `err` contains
       `acceptance check failed against landed commit`, and that the land commit is STILL PRESENT on
       the branch (the keep-commit contract — re-`git rev-parse` the branch HEAD). Follow the
       existing `land.test.ts` fixture/`cli()`/`LandDeps`-injection structure; do not weaken or
       remove any existing assertion.

  Follow AGENTS.md and the sdk-ts conventions: strict TypeScript, ESM, named exports only, no default
  export, no new dependency. Run all Devbox verification commands sequentially. If a verification step
  reports a failing test or type error, READ the failure, fix the code, and continue — do NOT weaken,
  rephrase, or remove any mandated assertion (a grep enforces them), do NOT change the generic
  `VERIFY_COMMANDS` behavior or the `args.verify !== true` paths, and do NOT touch `types.ts` or the
  journal/TaskSpec contracts.
repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true
acceptance_criteria:
  - id: AC-1
    description: >
      `chikory land --verify` re-runs the run's own journaled acceptance checks against the landed
      commit — `land.ts` adds the injectable `loadAcceptanceChecks` dep with a journal-reading default
      and a fail-closed `acceptance check failed against landed commit` gate inside the `--verify`
      block, and the new land tests prove both the passing (`acceptance: N/N checks green`) and the
      fail-closed keep-commit paths
    check: >
      cd packages/sdk-ts &&
      grep -q "loadAcceptanceChecks" src/cli/land.ts &&
      grep -q "acceptance check failed against landed commit" src/cli/land.ts &&
      grep -q "checks green" src/cli/land.ts &&
      grep -q "loadAcceptanceChecks" test/cli/land.test.ts &&
      pnpm exec vitest run test/cli/land.test.ts
  - id: AC-2
    description: >
      the SDK stays type- and lint-clean and the full existing suite remains green — proving the gate
      is additive and the generic VERIFY_COMMANDS / non-verify land paths are unchanged
    check: cd packages/sdk-ts && pnpm exec tsc --noEmit && pnpm exec eslint . && pnpm exec vitest run
budget_usd: 5
max_steps: 4
executor:
  adapter: codex
  family: openai
judge:
  family: openai-compat
  cadence: 1
  max_cost_share: 0.5
routing:
  stages:
    plan: { provider: openai-compat, model: gpt-5.5 }
    code: { provider: openai-compat, model: gpt-5.5 }
    review: { provider: openai-compat, model: gpt-5.5 }
    judge: { provider: openai-compat, model: gemini-3.1-pro-preview }
