#     * a LIVE Temporal proof in-suite (`test/chain/chain-completion-review-live.test.ts`) ‚Äî the committed
#       regression; this dogfood is the REAL-CHAIN observation on top.
#
# CLASS / LADDER. class=product. Ladder retired at rung 5 (P2 exit, dogfood-096); rung-4-shape P3 completion.
#   The STALLED axis this MOVES is the flat multi-run/horizon axis: this is a REAL `chikory chain` run (‚â•3
