name: dogfood-103-wp311-chain-completion-review
goal: >
  Prove the ALREADY-LANDED WP-311 chain-completion aggregate design review on a REAL Chikory chain of THREE
  dependent nodes, and advance the chain-observability surface while doing so. This campaign validates the
  committed chain runner; do NOT redesign or modify the chain runner, the completion-review substrate, chain
  contracts, schemas, ADRs, or the harvest scripts inside this run (the running worker loaded them at start).

  The planner MUST emit a LINEAR three-node topology on ONE shared design goal ‚Äî "give `chikory trace
  <chain-id>` a per-node design-summary surface": node B `dependsOn` node A, node C `dependsOn` node B. Each
  node produces a NON-EMPTY code-and-test diff inside `packages/sdk-ts/`; do not add a verification-only node.

    * NODE A ‚Äî add a pure `src/chain/design-summary.ts` exporting the named function
      `summarizeNodeDesign(outcome)` that turns one `NodeOutcome` into a bounded one-line design-summary
      string (node id ¬∑ status ¬∑ a size-capped reason). Add `test/chain/design-summary.test.ts` with a focused
      passing test. Touch only those two files.

    * NODE B ‚Äî add a pure `renderChainDesignSummary(record)` (same file or a sibling) that folds every
      `NodeOutcome` through `summarizeNodeDesign` into a deterministic multi-line block in plan order, mirroring
      `renderChainTrace`'s per-node section. Add its focused test. Import node A's function via a `.js` relative
      ESM import ‚Äî it must be present via the chain handoff, not recreated.

    * NODE C ‚Äî wire `renderChainDesignSummary` into the `chikory trace <chain-id>` render (`src/chain/trace.ts`
      / the CLI trace branch) as an ADDITIVE section, so a chain trace shows the per-node design summary;
      no-op/legacy chains still render byte-identically. Add its focused test importing BOTH predecessors'
      symbols. Touch only the trace surface + test.

  CONSTRAINTS: additive only; strict TypeScript, ESM `.js` relative imports, named exports, no default exports,
  no I/O, no new dependency, no key material; run project commands sequentially inside the existing devbox
  environment. Each node lands its own test and does NOT break an earlier node's tests. Do NOT touch
  `chain-loop.ts`, `completion-review.ts`, `advance.ts`, `store.ts` reducers, or any frozen contract.

repos:
  - url: /Users/nikitazolotarev/repos/chikory
    writable: true

acceptance_criteria:
  - id: AC-1
    description: >
      Node A landed a pure per-node design summariser ‚Äî some `src/chain/` file OTHER than trace.ts gained a
      `summarizeNodeDesign(` caller/definition. (F-114-safe: greps the CALL/def expression, not a type name.)
    check: >
      cd packages/sdk-ts &&
      grep -rlE 'summarizeNodeDesign\(' src/chain | grep -v 'chain/trace.ts' | head -1 | grep -q .
  - id: AC-2
    description: >
      Nodes A+B+C are co-referenced ‚Äî the trace surface renders the chain design summary: `renderChainDesignSummary`
      exists AND `src/chain/trace.ts` (or the CLI trace branch) references it. (F-97-safe co-reference.)
    check: >
      cd packages/sdk-ts &&
      grep -rlE 'renderChainDesignSummary\(' src | grep -q . &&
      grep -rlE 'renderChainDesignSummary' src/chain/trace.ts src/cli/commands.ts 2>/dev/null | head -1 | grep -q .
  - id: AC-3
    description: >
      The three new chain design-summary tests pass and the SDK stays type- and lint-clean. (SCOPED vitest run
      ‚Äî fits the judge per-check cap; the harvest verify-pack ¬ß3 runs the full suite uncapped. F-141 lesson.)
    check: >
      cd packages/sdk-ts &&
      pnpm exec tsc --noEmit && pnpm exec eslint src/chain/design-summary.ts src/chain/trace.ts &&
      pnpm exec vitest run test/chain/design-summary.test.ts

budget_usd: 30
max_steps: 12

# CONTEXT-ROT (WP-203/WP-207): auto-calibrated window (F-125 mechanism, live-proven 095-099, 101).
pacing:
  mode: auto
  autoCalibrate: true

# UNATTENDED (WP-271): operator-free; a genuine ESCALATE seals a resumable FAILED (WP-520).
unattended:
  escalation: seal_resumable_failed

executor:
  adapter: codex
  family: openai

judge:
  family: openai-compat
  cadence: 2
  max_cost_share: 0.5

routing:
  stages:
    plan: { provider: openai-compat, model: gpt-5.6-sol xhigh }
    code: { provider: openai-compat, model: gpt-5.6-sol xhigh }
    review: { provider: openai-compat, model: gpt-5.6-sol xhigh }
    judge: { provider: openai-compat, model: gemini-3.1-pro-preview }
