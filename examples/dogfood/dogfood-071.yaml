name: dogfood-071-wp261-cmdchain-launch-mode-wire
goal: >
  Wire WP-261's landed launch-mode guard into the `chikory chain` launch path so a single-`run`-authored spec
  invoked via `chikory chain` is REFUSED (loud warning + non-zero exit) BEFORE any planner/meta-judge LLM cost
  is spent â€” the dogfood-070 F-72 fix. This is the SEPARATE Â§4 wire the dogfood-070 spec deferred; it is the
  direct analog of the already-landed `cmdRun` spec-staleness wire (`src/cli/commands.ts:240-246`). Change
  exactly ONE existing file plus ONE new test file. Add no new dependency, and do NOT touch `types.ts`, any
  contract, the barrel `src/index.ts`, `commands.ts`, `spec-staleness-precheck.ts`, or
  `launch-mode-precheck.ts` (this run CONSUMES the last, it does not edit it). Use strict TypeScript, ESM `.js`
  relative imports, named exports only, NO default exports. Run Devbox verification commands sequentially with
  bare `pnpm exec`. If a verification step reports a failing test or type error, READ the failure and fix the
  IMPLEMENTATION so every mandated assertion passes â€” do NOT weaken, rephrase, or remove any mandated assertion
  (a grep enforces the call-site symbols, the env var, and the behavioral assertion).

  FILE 1 â€” packages/sdk-ts/src/cli/chain.ts (EDIT the existing `cmdChain` function). Add, at the TOP of the
  file with the other `./`-relative imports:

    import { assessLaunchModeMismatch, detectIntendedSingleRun } from "./launch-mode-precheck.js";

  Then INSIDE `cmdChain`, AFTER the `spec = parseTaskSpec(yamlText)` block succeeds and BEFORE the
  "1+2: decompose the goal and gate the plan" step (i.e. before `createRouter` / `planAndGateChain` â€” so the
  refusal costs ZERO LLM spend), insert the guard:

    * Compute `const launchModeMismatch = assessLaunchModeMismatch({ intendedSingleRun:
      detectIntendedSingleRun(yamlText), launchedAsChain: true });` â€” pass the RAW `yamlText` (the single-run
      marker convention lives in the spec's header comment, NOT `spec.goal`), and `launchedAsChain: true`
      because this is the `chikory chain` command.
    * When `launchModeMismatch !== null` AND the escape hatch env var
      `process.env["CHIKORY_ALLOW_LAUNCH_MODE_MISMATCH"]` is unset or empty, emit `launchModeMismatch.warning`
      via `ioPair.err(...)`, then emit a second `ioPair.err(...)` line telling the operator to relaunch with
      `chikory run` or set `CHIKORY_ALLOW_LAUNCH_MODE_MISMATCH=1` to override, and `return 1` â€” refusing the
      launch before the planner runs.
    * When `launchModeMismatch === null` (a genuine chain spec with no single-run marker) OR the override env
      var is set to a non-empty value, DO NOT return early â€” fall through to the existing decompose/gate/host
      path unchanged. Do not alter any other behavior of `cmdChain`.

  FILE 2 â€” packages/sdk-ts/test/cli/chain-launch-mode.test.ts (NEW Vitest file, ESM `.js` relative import of
  `{ cmdChain } from "../../src/cli/chain.js"`). It MUST invoke `cmdChain` against a real temp spec file and
  assert the refusal behaviorally (graded by a grep â€” do not rephrase the call or the expected substrings):
    * Write a temp yaml spec file whose TEXT contains the single-run marker `NOT a chain` (a minimal but
      parse-valid `TaskSpec`: `name`, a `goal`, `repos`, `acceptance_criteria`, `executor`, `judge`, `routing`
      â€” reuse the shape of an existing dogfood spec so `parseTaskSpec` succeeds).
    * Delete the `CHIKORY_ALLOW_LAUNCH_MODE_MISMATCH` env var for the refuse case (save/restore it around the
      test). Invoke `const code = await cmdChain({ file: <temp spec path>, watch: false, json: false, dataDir:
      <temp dir> }, { err: (line) => errLines.push(line) });` capturing `err` output into a `errLines: string[]`.
    * Assert `expect(code).toBe(1);` and that the captured `errLines.join("\n")` contains BOTH the substring
      `chikory chain` AND the substring `single \`chikory run\`` (the mandated `warning` substrings) â€” proving
      the wire actually REFUSED and emitted the guard warning, WITHOUT reaching the router (no Temporal / no
      network â€” the guard returns before `createRouter`).
    * Clean up the temp file/dir after the test.

  Keep the wire minimal and additive. Do NOT add a new CLI flag or edit the argument parser (`main.ts`); the
  `CHIKORY_ALLOW_LAUNCH_MODE_MISMATCH` env var is the override, mirroring the existing `CHIKORY_*` seam
  convention. The genuine-chain and override paths stay covered by the landed
  `assessLaunchModeMismatch`/`detectIntendedSingleRun` unit tests.
