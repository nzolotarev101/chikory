      cd packages/sdk-ts &&
      grep -q "normalizeGEvalScore" src/judge/scoring.ts &&
      grep -q "aggregateGEval" src/judge/scoring.ts &&
      grep -q "scoring.js" src/judge/index.ts &&
      pnpm exec vitest run test/judge/scoring.test.ts
  - id: AC-2
