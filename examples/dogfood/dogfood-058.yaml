    description: >
      the pure G-Eval scoring primitive lands and is re-exported from the judge barrel —
      `scoring.ts` exports `normalizeGEvalScore` and `aggregateGEval`, `src/judge/index.ts`
      re-exports the new module, and the new focused test proves normalization + clamping +
      custom scale, the weighted-mean aggregate, the threshold-inclusive boundary, and the
      empty / non-positive-weight degenerate paths
