name: dogfood-058-wp210-geval-scoring
goal: >
  Land the pure G-Eval scoring primitive for the Agent-as-a-Judge harness (WP-210): a
  self-contained module that turns per-criterion numeric scores into a single normalized
  aggregate plus a pass/fail decision against a threshold — the continuous-score analog of the
  binary criteria/rubric verdict (`buildVerdict`). This is an ADDITIVE pure slice — do NOT change
  `buildVerdict`, `computeVerdict`, the judge prompt/harness/rubric, `types.ts`, the journal
  payloads, or any verdict/override logic; the `scoringMethod` TaskSpec field and the live judge
  wire that consumes this reducer are a SEPARATE follow-up, NOT part of this run.

  Change exactly these THREE files (one new source module, the judge barrel, one new test file);
  change no other file, add no new dependency, and make no I/O, network, clock, or randomness call
  (the reducer is PURE — it reads only its arguments).

  1. packages/sdk-ts/src/judge/scoring.ts  (NEW)
     - Export three local result/input types (named exports, no default; do NOT touch `types.ts`):
         export interface GEvalCriterionScore { id: string; score: number; weight?: number; }
         export interface GEvalAggregateOptions { threshold: number; scaleMin?: number; scaleMax?: number; }
         export interface GEvalScore { weightedMean: number; normalized: number; passed: boolean; }
     - Export a pure normalizer with a doc comment citing WP-210:
         export function normalizeGEvalScore(raw: number, scaleMin = 1, scaleMax = 5): number
       Clamp `raw` to [scaleMin, scaleMax], then return `(clamped - scaleMin) / (scaleMax - scaleMin)`
       so the result is in [0, 1]. If `scaleMax <= scaleMin` return 0 (guard the divide-by-zero).
     - Export a pure aggregator:
         export function aggregateGEval(scores: GEvalCriterionScore[], opts: GEvalAggregateOptions): GEvalScore
       Let `scaleMin = opts.scaleMin ?? 1`, `scaleMax = opts.scaleMax ?? 5`. Treat a missing
       `weight` as 1 and IGNORE any entry whose effective weight is <= 0. For each remaining entry,
       clamp its `score` to [scaleMin, scaleMax]. If there are NO positive-weight entries, return
       `{ weightedMean: scaleMin, normalized: 0, passed: 0 >= opts.threshold }`. Otherwise
       `weightedMean = sum(clampedScore * weight) / sum(weight)` (on the raw scale),
       `normalized = normalizeGEvalScore(weightedMean, scaleMin, scaleMax)`, and
       `passed = normalized >= opts.threshold` (threshold INCLUSIVE). Pure — reads only its args.
       Named exports only, no default, strict TS / ESM.

  2. packages/sdk-ts/src/judge/index.ts
     - Add a re-export block for the new module, mirroring the existing blocks
       (e.g. `export { normalizeGEvalScore, aggregateGEval, type GEvalCriterionScore,
       type GEvalAggregateOptions, type GEvalScore } from "./scoring.js";`). ESM `.js` specifier.
       Change nothing else in the barrel.

  3. packages/sdk-ts/test/judge/scoring.test.ts  (NEW)
     - A new Vitest file importing `normalizeGEvalScore`, `aggregateGEval`, and the types from
       `../../src/judge/scoring.js`. It must encode AT LEAST these cases:
       - `normalizeGEvalScore(5)` is `1`; `normalizeGEvalScore(1)` is `0`; `normalizeGEvalScore(3)` is `0.5`.
       - clamping: `normalizeGEvalScore(7)` is `1` and `normalizeGEvalScore(0)` is `0` (out-of-range raw clamps).
       - a custom scale: `normalizeGEvalScore(7, 0, 10)` is `0.7`.
       - a single criterion at the top of the scale passes: `aggregateGEval([{ id: "a", score: 5 }],
         { threshold: 0.7 })` has `normalized` `1` and `passed` `true`.
       - a single criterion at the bottom fails: `aggregateGEval([{ id: "a", score: 1 }],
         { threshold: 0.7 })` has `normalized` `0` and `passed` `false`.
       - weighted mean: `aggregateGEval([{ id: "a", score: 5, weight: 3 }, { id: "b", score: 1, weight: 1 }],
         { threshold: 0.7 })` has `weightedMean` `4` and `normalized` `0.75` and `passed` `true`.
       - threshold is INCLUSIVE: `aggregateGEval([{ id: "a", score: 4 }], { threshold: 0.75 })`
         has `normalized` `0.75` and `passed` `true`.
       - empty input: `aggregateGEval([], { threshold: 0.7 })` has `weightedMean` `1`, `normalized` `0`,
         `passed` `false`.
       - non-positive weights are ignored: `aggregateGEval([{ id: "a", score: 5, weight: 0 },
         { id: "b", score: 4, weight: 2 }], { threshold: 0.7 })` has `weightedMean` `4` and `passed` `true`.
       Do not weaken or loosen any assertion.

  Follow AGENTS.md and the sdk-ts conventions: strict TypeScript, ESM, named exports only, no
  default export, no new dependency. Run all Devbox verification commands sequentially. If a
  verification step reports a failing test or type error, READ the failure, fix the code, and
  continue — do NOT weaken, rephrase, or remove any mandated assertion (a grep enforces them), do
  NOT change `buildVerdict`/`computeVerdict` or any verdict/override/journal logic, and do NOT touch
  `types.ts`.
