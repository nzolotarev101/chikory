[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "chikory"
version = "0.0.1"
description = "Vendor-neutral SDK for long-running software agents with durable execution and Agent-as-a-Judge"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
  "httpx>=0.27.0",
  "anyio>=4.4.0",
  "pydantic>=2.7.0",
]

[dependency-groups]
dev = [
  "pytest>=8.2.0",
  "pytest-asyncio>=0.23.0",
  "pyright>=1.1.390",
]

[tool.hatch.build.targets.wheel]
packages = ["src/chikory"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "ANN", "ASYNC"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.pyright]
include = ["src", "tests"]
pythonVersion = "3.11"
